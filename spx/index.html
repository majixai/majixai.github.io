<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2196F3">
  <meta name="description" content="Realtime S&P 500 chart and closing projection">
  <title>SPX Live</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #131722; color: #d1d4dc; font-family: Calibri, sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #stats { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 12px; background: #1e2336; border-bottom: 1px solid #2a2e3f; align-items: center; }
    .stat { background: #252a3d; border-radius: 6px; padding: 6px 12px; font-size: 13px; }
    .stat span { font-weight: bold; }
    .up { color: #26a69a; }
    .down { color: #ef5350; }
    .neutral { color: #9e9e9e; }
    #chart { flex: 1; }
    #loading { padding: 10px 12px; font-size: 12px; color: #9e9e9e; }
  </style>
</head>
<body>

<div id="stats">
  <div class="stat">SPX <span id="price">—</span></div>
  <div class="stat">Signal <span id="signal">—</span></div>
  <div class="stat">Proj. Close <span id="proj">—</span></div>
  <div class="stat">↑ Prob <span id="prob">—</span></div>
  <div class="stat">Market <span id="mkt">—</span></div>
  <div id="loading">Loading…</div>
</div>

<div id="chart">
  <div class="tradingview-widget-container" style="height:100%;width:100%">
    <div id="tv-chart" style="height:100%;width:100%"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
    {
      "autosize": true,
      "symbol": "SP:SPX",
      "interval": "5",
      "timezone": "America/New_York",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "withdateranges": true,
      "allow_symbol_change": false,
      "container_id": "tv-chart"
    }
    </script>
  </div>
</div>

<script>
  const PROJECTION_URL = '../sp_closing_projection/latest_projection.json';
  const REFRESH_MS = 60000;

  function fmt(n, dec) { return n != null ? Number(n).toFixed(dec ?? 2) : '—'; }
  function cls(sig) { return sig === 'BULLISH' ? 'up' : sig === 'BEARISH' ? 'down' : 'neutral'; }

  function render(d) {
    document.getElementById('price').textContent = '$' + fmt(d.current_price);
    const sig = d.signal ?? '—';
    const sigEl = document.getElementById('signal');
    sigEl.textContent = sig;
    sigEl.className = cls(sig);
    document.getElementById('proj').textContent = '$' + fmt(d.closing_projection?.projected_close);
    document.getElementById('prob').textContent = fmt(d.closing_projection?.probability_above_current, 1) + '%';
    const ms = d.market_state;
    const mktEl = document.getElementById('mkt');
    mktEl.textContent = ms?.is_open ? 'Open' : 'Closed';
    mktEl.className = ms?.is_open ? 'up' : 'neutral';
    document.getElementById('loading').textContent = 'Updated ' + new Date(d.timestamp).toLocaleTimeString();
  }

  async function load() {
    try {
      const r = await fetch(PROJECTION_URL + '?t=' + Date.now());
      if (!r.ok) throw new Error(r.status);
      render(await r.json());
    } catch (e) {
      document.getElementById('loading').textContent = 'Data unavailable';
    }
  }

  load();
  setInterval(load, REFRESH_MS);

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
