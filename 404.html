<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2c3e50">
  <title>404 — Page Not Found | MajixAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    :root { --primary: #2c3e50; --accent: #06d6a0; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #e8f0fe 0%, #d0e4f7 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
    }
    .code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -.05em;
    }
    .code span { color: var(--accent); }
    h1 { font-size: 1.6rem; color: var(--primary); margin: .5rem 0 1rem; }
    p.lead { color: #555; max-width: 480px; }
    .attempted-path {
      font-family: monospace;
      background: rgba(0,0,0,.07);
      padding: .25rem .6rem;
      border-radius: .4rem;
      font-size: .95rem;
      word-break: break-all;
    }
    .suggestions { margin-top: 2rem; max-width: 600px; width: 100%; }
    .suggestions h2 { font-size: 1rem; color: #666; margin-bottom: .8rem; }
    #suggest-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; }
    #suggest-list li a {
      display: inline-block;
      padding: .35rem .9rem;
      background: #fff;
      border: 2px solid #dde4f0;
      border-radius: 999px;
      font-size: .85rem;
      color: var(--primary);
      text-decoration: none;
      transition: border-color .2s, background .2s;
    }
    #suggest-list li a:hover { border-color: var(--accent); background: #f0faf6; }
    .actions { margin-top: 2rem; display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>

  <div class="code">4<span>0</span>4</div>
  <h1>Page Not Found</h1>
  <p class="lead">
    The path <span class="attempted-path" id="path-display">/</span> doesn't exist.
    Maybe the router can help?
  </p>

  <div class="suggestions" id="suggestions" style="display:none">
    <h2><i class="fa fa-lightbulb"></i> Did you mean…</h2>
    <ul id="suggest-list"></ul>
  </div>

  <div class="actions">
    <a href="/" class="btn btn-primary">
      <i class="fa fa-house"></i> Home
    </a>
    <a href="/router/" class="btn btn-outline-secondary">
      <i class="fa fa-route"></i> Open Router
    </a>
  </div>

<script type="module">
  // Display the attempted path
  const attempted = location.pathname;
  document.getElementById('path-display').textContent = attempted;

  // Try to load the router and suggest similar routes
  try {
    const { router } = await import('/router/router.js');
    await router.ready();

    // Extract the first path segment as search token
    const token = attempted.replace(/\//g, ' ').trim().split(/\s+/)[0] || '';
    const results = token ? router.search(token).slice(0, 6) : router.routes.slice(0, 6);

    if (results.length > 0) {
      const list = document.getElementById('suggest-list');
      results.forEach(r => {
        const li = document.createElement('li');
        const a  = document.createElement('a');
        a.href = `https://majixai.github.io${r.path}`;
        a.textContent = r.name;
        li.appendChild(a);
        list.appendChild(li);
      });
      document.getElementById('suggestions').style.display = 'block';
    }
  } catch {
    // Router unavailable — degrade gracefully, links to home still work
  }
</script>
</body>
</html>
