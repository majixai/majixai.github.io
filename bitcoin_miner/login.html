<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <span class="icon" id="login-app-icon">🔐</span>
      <h1 id="login-app-name">Login</h1>
      <p id="login-subtitle">Enter your credentials below and click <strong>Sign In</strong> when you are ready.</p>
    </div>

    <div class="alert" id="login-alert" role="alert" aria-live="polite"></div>

    <form id="login-form" novalidate autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required
          autofocus>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required>
          <button
            type="button"
            class="btn-toggle-pw"
            id="toggle-password"
            aria-label="Show password"
            title="Show / hide password">
            <span id="toggle-pw-icon">👁</span>
          </button>
        </div>
      </div>

      <div class="form-row remember-row">
        <label class="checkbox-label" for="remember-me">
          <input type="checkbox" id="remember-me" name="remember-me">
          <span>Remember me for 30 days</span>
        </label>
      </div>

      <div class="api-credentials">
        <div class="api-title">NiceHash API (optional)</div>
        <div class="form-group">
          <label for="nh-api-key">Key</label>
          <input type="text" id="nh-api-key" name="nh-api-key" autocomplete="off" placeholder="NiceHash API Key">
        </div>
        <div class="form-group">
          <label for="nh-api-secret">Secret</label>
          <input type="password" id="nh-api-secret" name="nh-api-secret" autocomplete="off" placeholder="NiceHash API Secret">
        </div>
        <div class="form-group">
          <label for="nh-org-id">Org ID</label>
          <input type="text" id="nh-org-id" name="nh-org-id" autocomplete="off" placeholder="NiceHash Organization ID">
        </div>
        <div class="form-group">
          <label for="nh-balance-currency">Balance currency</label>
          <input type="text" id="nh-balance-currency" name="nh-balance-currency" value="BTC" autocomplete="off" placeholder="BTC">
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>

    <div class="login-divider"></div>

    <div class="login-info">
      <p>🔒 Passwords are hashed with SHA-256 and sessions are stored locally in your browser. No data is sent to a server.</p>
    </div>

    <div class="login-footer">
      <span>MajixAI &mdash; Standalone Login</span>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
