<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Machine Overlay</title>
    <style>
        :root {
            --frame-color: #a16a1c;
            --frame-glow: rgba(255, 215, 0, 0.7);
            --dark-bg: #1a1a2e;
            --darker-bg: #16213e;
            --panel-bg: rgba(0, 0, 0, 0.65);
            --light-text: #ecf0f1;
            --win-color: #2ecc71;
            --jackpot-color: #FFD700;
            --button-color: #e67e22;
            --button-hover: #f39c12;
            --symbol-height: 120px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: transparent;
            color: var(--light-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── Jackpot Ticker ──────────────────────────────────────────────── */
        #jackpotTicker {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: linear-gradient(90deg, #1a1a2e, #b8860b, #1a1a2e);
            color: var(--jackpot-color);
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            padding: 6px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 200;
            border-bottom: 2px solid var(--jackpot-color);
            animation: tickerGlow 3s ease-in-out infinite alternate;
        }
        @keyframes tickerGlow {
            from { box-shadow: 0 2px 10px rgba(255,215,0,0.3); }
            to   { box-shadow: 0 2px 25px rgba(255,215,0,0.9); }
        }

        /* ── Streak Banner ──────────────────────────────────────────────── */
        #streakBanner {
            position: fixed;
            top: 40px; right: 16px;
            background: var(--panel-bg);
            border: 2px solid #ff4500;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #ff6a00;
            display: none;
            z-index: 150;
            animation: streakPulse 1s ease-in-out infinite alternate;
        }
        @keyframes streakPulse {
            from { box-shadow: 0 0 6px rgba(255, 100, 0, 0.4); }
            to   { box-shadow: 0 0 18px rgba(255, 100, 0, 0.9); }
        }
        #streakBanner.visible { display: block; }

        /* ── Main Slot Machine ──────────────────────────────────────────── */
        #slotMachineContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #slotMachine {
            background: linear-gradient(145deg, var(--dark-bg), var(--darker-bg));
            border: 8px solid var(--frame-color);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 0 40px var(--frame-glow), inset 0 0 20px rgba(0,0,0,0.5);
            min-width: 360px;
            position: relative;
        }

        /* Inner glow ring that pulses during jackpot */
        #slotMachine.jackpot-mode {
            animation: jackpotRing 0.6s ease-in-out infinite alternate;
        }
        @keyframes jackpotRing {
            from { box-shadow: 0 0 20px rgba(255,215,0,0.5), inset 0 0 20px rgba(0,0,0,0.5); }
            to   { box-shadow: 0 0 60px rgba(255,215,0,1.0), inset 0 0 20px rgba(0,0,0,0.5); }
        }

        /* ── Reels ──────────────────────────────────────────────────────── */
        #reelsContainer {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 10px;
            border: 3px solid var(--darker-bg);
        }

        .reel {
            flex: 1;
            height: var(--symbol-height);
            overflow: hidden;
            border-radius: 6px;
            background: #1a1a1a;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.7);
            position: relative;
        }
        /* Shimmer highlight lines on reels */
        .reel::before, .reel::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: rgba(255,255,255,0.12);
            z-index: 2;
            pointer-events: none;
        }
        .reel::before { top: 0; }
        .reel::after  { bottom: 0; }

        .reel-symbols {
            position: absolute;
            top: 0; left: 0; width: 100%;
            will-change: transform;
        }

        .symbol {
            height: var(--symbol-height);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: bold;
            user-select: none;
        }
        .symbol.symbol-BAR { font-size: 22px; color: #b0bec5; letter-spacing: -1px; }
        .symbol.symbol-7   { font-size: 48px; color: #ef5350; }

        /* Win-line indicator across center of reels */
        #winLine {
            position: absolute;
            top: calc(50% + 16px);
            left: 10px;
            right: 10px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.7), transparent);
            pointer-events: none;
            z-index: 10;
        }

        /* ── Result / Status Display ────────────────────────────────────── */
        #resultDisplay {
            min-height: 3.5rem;
            text-align: center;
            font-size: 1.15rem;
            font-weight: bold;
            padding: 8px 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            position: relative;
        }
        #resultDisplay.visible { opacity: 1; }

        #winDisplay {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            color: var(--win-color);
            padding: 4px 0;
            opacity: 0;
            transition: opacity 0.4s;
        }
        #winDisplay.visible {
            opacity: 1;
            animation: winGlow 1.2s ease-in-out infinite alternate;
        }
        @keyframes winGlow {
            from { text-shadow: 0 0 6px rgba(46,204,113,0.4); }
            to   { text-shadow: 0 0 22px rgba(46,204,113,1.0); }
        }

        /* ── Tip Goal Bar ───────────────────────────────────────────────── */
        #tipGoalSection {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            padding: 8px 12px;
            display: none;
        }
        #tipGoalSection.visible { display: block; }
        #tipGoalLabel {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 4px;
        }
        #tipGoalBar {
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        #tipGoalFill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #00cec9);
            border-radius: 6px;
            transition: width 0.8s ease-in-out;
            width: 0%;
        }
        #tipGoalText {
            font-size: 0.75rem;
            color: #ccc;
            text-align: right;
            margin-top: 2px;
        }

        /* ── Controls ───────────────────────────────────────────────────── */
        .controls {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            padding-top: 8px;
        }
        .controls button {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .controls button:active { transform: scale(0.94); }
        #spinButton {
            background: var(--button-color);
            color: #fff;
        }
        #spinButton:hover   { background: var(--button-hover); }
        #spinButton:disabled { background: #555; cursor: default; }
        #historyButton {
            background: transparent;
            color: var(--light-text);
            border: 2px solid var(--light-text);
        }
        #historyButton:hover { background: rgba(255,255,255,0.1); }

        /* ── Leaderboard Panel ──────────────────────────────────────────── */
        #leaderboard {
            position: fixed;
            top: 50px; left: 12px;
            background: var(--panel-bg);
            border: 2px solid var(--frame-color);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.8rem;
            min-width: 160px;
            display: none;
            z-index: 100;
        }
        #leaderboard.visible { display: block; }
        #leaderboard h3 {
            font-size: 0.85rem;
            color: var(--jackpot-color);
            margin-bottom: 8px;
            text-align: center;
        }
        .lb-entry {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 3px;
        }
        .lb-entry .lb-name { color: #ccc; }
        .lb-entry .lb-score { color: var(--jackpot-color); font-weight: bold; }

        /* ── History Modal ──────────────────────────────────────────────── */
        #historyModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        #historyModal.visible { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--dark-bg);
            border: 2px solid var(--frame-color);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 460px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 14px;
        }
        .modal-header h2 { font-size: 1.25rem; }
        .modal-close-btn {
            background: none; border: none;
            color: var(--light-text);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-body { overflow-y: auto; flex: 1; }
        .modal-footer {
            border-top: 1px solid #333;
            padding-top: 12px;
            margin-top: 12px;
            text-align: right;
        }
        #clearHistoryButton {
            background: #c0392b; color: #fff;
            border: none; border-radius: 5px;
            padding: 8px 16px; cursor: pointer;
            font-weight: bold;
        }
        #clearHistoryButton:hover { background: #e74c3c; }

        .history-list { list-style: none; }
        .history-item {
            background: var(--darker-bg);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .history-item.win { border-left: 4px solid var(--win-color); }
        .history-item.jackpot { border-left: 4px solid var(--jackpot-color); }
        .history-item-user { font-weight: bold; margin-bottom: 2px; }
        .history-item-details { color: #9b9b9b; font-size: 0.78rem; }

        /* ── Confetti particles ─────────────────────────────────────────── */
        .confetti-piece {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 999;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ── New Follower Pop ─────────────────────────────────────────── */
        #followerAlert {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: #fff;
            border-radius: 30px;
            padding: 10px 22px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            z-index: 300;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(233, 30, 99, 0.6);
        }
        #followerAlert.pop { transform: translateX(-50%) scale(1); }
    </style>
</head>
<body>

    <!-- Jackpot Ticker at top -->
    <div id="jackpotTicker">💰 JACKPOT: Loading... 💰</div>

    <!-- Streak Banner (shown when user has active streak) -->
    <div id="streakBanner">🔥 Streak: 0</div>

    <!-- Top Leaderboard (left side, optional) -->
    <div id="leaderboard">
        <h3>🏆 TOP SPINNERS</h3>
        <div id="leaderboardEntries">Loading...</div>
    </div>

    <!-- Main Slot Machine -->
    <div id="slotMachineContainer">
        <div id="slotMachine">
            <div id="reelsContainer">
                <!-- Reels injected by JS -->
            </div>
            <div id="winLine"></div>
            <div id="resultDisplay">
                <span id="statusText">Waiting for config...</span>
            </div>
            <div id="winDisplay"></div>

            <!-- Tip Goal progress bar -->
            <div id="tipGoalSection">
                <div id="tipGoalLabel">🎯 Show Goal</div>
                <div id="tipGoalBar"><div id="tipGoalFill"></div></div>
                <div id="tipGoalText">0 / 0</div>
            </div>

            <div class="controls">
                <button id="spinButton">🎰 Test Spin</button>
                <button id="historyButton">📜 History</button>
            </div>
        </div>
    </div>

    <!-- New Follower Alert Pop -->
    <div id="followerAlert">❤️ New Follower!</div>

    <!-- History Modal -->
    <div id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📜 Spin History</h2>
                <button class="modal-close-btn" id="modalCloseBtn">×</button>
            </div>
            <div class="modal-body">
                <ul class="history-list" id="historyList">
                    <li style="color:#888; text-align:center;">No history yet.</li>
                </ul>
            </div>
            <div class="modal-footer">
                <button id="clearHistoryButton">🗑 Clear History</button>
            </div>
        </div>
    </div>

</body>
</html>
