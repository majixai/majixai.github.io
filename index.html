<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2c3e50">
  <link rel="manifest" href="manifest.webmanifest">
  <title>MajixAI Project Directory Menu</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- W3CSS CDN -->
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      overflow-x: hidden;
    }
    .parallax {
      background-image: url('https://www.transparenttextures.com/patterns/diamond-upholstery.png');
      min-height: 300px;
      background-attachment: fixed;
      background-position: center;
      background-repeat: repeat;
      background-size: cover;
    }
    .project-card {
      transition: transform 0.3s cubic-bezier(.25,.8,.25,1), box-shadow 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-radius: 1rem;
      overflow: hidden;
      background: #fff;
      position: relative;
    }
    .project-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      z-index: 2;
    }
    .project-svg {
      width: 100%;
      height: 80px;
      display: block;
      background: linear-gradient(90deg, #e0eafc 0%, #cfdef3 100%);
    }
    .project-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0.5rem 0 0.2rem 0;
      color: #2a3a4a;
      text-align: center;
    }
    .project-desc {
      font-size: 0.95rem;
      color: #555;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .animated-bg {
      animation: bgmove 8s linear infinite alternate;
    }
    @keyframes bgmove {
      0% { background-position: 0 0; }
      100% { background-position: 100px 100px; }
    }
    .menu-header {
      background: rgba(44,62,80,0.95);
      color: #fff;
      padding: 2rem 0 1rem 0;
      text-align: center;
      letter-spacing: 0.1em;
      font-size: 2.2rem;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .w3-animate-opacity { animation: opac 1.2s; }
    @keyframes opac { from {opacity:0} to {opacity:1} }
    .project-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      margin: 2rem auto;
      max-width: 1400px;
    }
    .project-card {
      flex: 1 1 260px;
      min-width: 260px;
      max-width: 320px;
      margin: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      border: 1px solid #e0eafc;
    }
    .svg-anim {
      cursor: pointer;
      transition: filter 0.3s;
    }
    .svg-anim:hover {
      filter: drop-shadow(0 0 8px #6ec6ff);
    }
    .footer {
      text-align: center;
      color: #888;
      padding: 1.5rem 0 0.5rem 0;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="parallax w3-animate-opacity">
    <div class="menu-header">MajixAI Project Directory Menu</div>
  </div>
  <main>
    <div class="container-fluid">
      <div id="projectGrid" class="project-grid"></div>
    </div>
  </main>
  <div class="footer">&copy; 2025 MajixAI | <span id="projectCount"></span> Projects</div>
  <script>
    const PROJECTS = [
      { name: 'BoxStore Returns', path: 'boxstore/policy/', desc: 'Returns policy for BoxStore' },
      { name: '7t', path: '7t/', desc: 'Experimental text and alpha tools' },
      { name: 'best', path: 'best/', desc: 'Best strategies and alpha' },
      { name: 'beta', path: 'beta/', desc: 'Beta features and scripts' },
      { name: 'chat', path: 'chat/', desc: 'Chat and indicators' },
      { name: 'chaturbate_app', path: 'chaturbate_app/', desc: 'Chaturbate event handlers' },
      { name: 'church_school_lesson_plan', path: 'church_school_lesson_plan/', desc: 'Church school lesson plans' },
      { name: 'csv', path: 'csv/', desc: 'Stock CSV data' },
      { name: 'etrade_client', path: 'etrade_client/', desc: 'Etrade API client' },
      { name: 'fun_hotel_reservation', path: 'fun_hotel_reservation/', desc: 'Colorful hotel reservation experience' },
      { name: 'Gridiron', path: 'Gridiron/', desc: 'Football analytics' },
      { name: 'jinx', path: 'jinx/', desc: 'Jinx core' },
      { name: 'jinx_strategy', path: 'jinx_strategy/', desc: 'Jinx strategies' },
      { name: 'jinxcasino', path: 'jinxcasino/', desc: 'Jinx casino' },
      { name: 'json', path: 'json/', desc: 'JSON data' },
      { name: 'link_indexer', path: 'link_indexer/', desc: 'Link indexer' },
      { name: 'market', path: 'market/', desc: 'Market tools' },
      { name: 'nfl', path: 'nfl/', desc: 'NFL data' },
      { name: 'nfl_offensive_playbook', path: 'nfl_offensive_playbook/', desc: 'NFL playbook' },
      { name: 'option', path: 'option/', desc: 'Options tools' },
      { name: 'options', path: 'options/', desc: 'Options strategies' },
      { name: 'pj', path: 'pj/', desc: 'PJ tools' },
      { name: 'playbook', path: 'playbook/', desc: 'Football playbook' },
      { name: 'playbook_app', path: 'playbook_app/', desc: 'Playbook app' },
      { name: 'referrals', path: 'referrals/', desc: 'Referral system' },
      { name: 'script', path: 'script/', desc: 'Scripts' },
      { name: 'seventy', path: 'seventy/', desc: 'Seventy tools' },
      { name: 'simple', path: 'simple/', desc: 'Simple tools' },
      { name: 'stays', path: 'stays/', desc: 'Stay management' },
      { name: 'stock', path: 'stock/', desc: 'Stock tools' },
      { name: 'stock_analyzer', path: 'stock_analyzer/', desc: 'Stock analyzer' },
      { name: 'stock_fetcher', path: 'stock_fetcher/', desc: 'Stock fetcher' },
      { name: 'study', path: 'study/', desc: 'Study tools' },
      { name: 'style', path: 'style/', desc: 'Style resources' },
      { name: 'texas_holdem', path: 'texas_holdem/', desc: 'Texas Holdem' },
      { name: 'ticker', path: 'ticker/', desc: 'Ticker tools' },
      { name: 'tickers', path: 'tickers/', desc: 'Tickers' },
      { name: 'Trades', path: 'Trades/', desc: 'Trade logs' },
      { name: 'whatsapp_integration', path: 'whatsapp_integration/', desc: 'WhatsApp integration' }
    ];

    class CompressionDatabase {
      static dbName = 'MajixAIOfflineDB';
      static dbVersion = 2;
      static storeName = 'compressed_records';
      static chunkSize = 500000;
      static db = null;

      static async open() {
        if (CompressionDatabase.db) return CompressionDatabase.db;
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(CompressionDatabase.dbName, CompressionDatabase.dbVersion);
          request.onupgradeneeded = event => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(CompressionDatabase.storeName)) {
              db.createObjectStore(CompressionDatabase.storeName, { keyPath: 'key' });
            }
          };
          request.onsuccess = event => {
            CompressionDatabase.db = event.target.result;
            resolve(CompressionDatabase.db);
          };
          request.onerror = event => reject(event.target.error);
        });
      }

      static async writeRaw(record) {
        const db = await CompressionDatabase.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(CompressionDatabase.storeName, 'readwrite');
          const store = tx.objectStore(CompressionDatabase.storeName);
          store.put(record);
          tx.oncomplete = () => resolve();
          tx.onerror = event => reject(event.target.error);
        });
      }

      static async readRaw(key) {
        const db = await CompressionDatabase.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(CompressionDatabase.storeName, 'readonly');
          const store = tx.objectStore(CompressionDatabase.storeName);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = event => reject(event.target.error);
        });
      }

      static async gzipToBase64(text) {
        if (typeof CompressionStream === 'undefined') {
          return btoa(unescape(encodeURIComponent(text)));
        }
        const stream = new Blob([text]).stream().pipeThrough(new CompressionStream('gzip'));
        const compressedBlob = await new Response(stream).blob();
        const buffer = await compressedBlob.arrayBuffer();
        const bytes = new Uint8Array(buffer);
        let binary = '';
        bytes.forEach(b => {
          binary += String.fromCharCode(b);
        });
        return btoa(binary);
      }

      static async base64ToText(base64Text, isGzip) {
        const binary = atob(base64Text);
        const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
        if (!isGzip || typeof DecompressionStream === 'undefined') {
          return decodeURIComponent(escape(binary));
        }
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        return await new Response(stream).text();
      }

      static chunkString(text) {
        const chunks = [];
        for (let i = 0; i < text.length; i += CompressionDatabase.chunkSize) {
          chunks.push(text.slice(i, i + CompressionDatabase.chunkSize));
        }
        return chunks;
      }

      static async setCompressed(key, value) {
        const json = JSON.stringify(value);
        const payload = await CompressionDatabase.gzipToBase64(json);
        const chunks = CompressionDatabase.chunkString(payload);
        const chunkKeys = [];

        for (let i = 0; i < chunks.length; i += 1) {
          const chunkKey = `${key}::chunk::${i}`;
          chunkKeys.push(chunkKey);
          await CompressionDatabase.writeRaw({ key: chunkKey, type: 'chunk', value: chunks[i] });
        }

        await CompressionDatabase.writeRaw({
          key,
          type: 'manifest',
          chunkKeys,
          totalChunks: chunks.length,
          compressed: true,
          updatedAt: new Date().toISOString()
        });
      }

      static async getCompressed(key) {
        const manifest = await CompressionDatabase.readRaw(key);
        if (!manifest || manifest.type !== 'manifest') return null;

        let combined = '';
        for (const chunkKey of manifest.chunkKeys) {
          const chunk = await CompressionDatabase.readRaw(chunkKey);
          if (!chunk) return null;
          combined += chunk.value;
        }

        const json = await CompressionDatabase.base64ToText(combined, manifest.compressed);
        return JSON.parse(json);
      }

      static async listDataKeys() {
        const db = await CompressionDatabase.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(CompressionDatabase.storeName, 'readonly');
          const store = tx.objectStore(CompressionDatabase.storeName);
          const request = store.getAllKeys();
          request.onsuccess = () => {
            const keys = request.result.filter(key => !String(key).includes('::chunk::'));
            resolve(keys);
          };
          request.onerror = event => reject(event.target.error);
        });
      }
    }

    class ProjectCard {
      static svgIcons = [
        '<svg class="svg-anim" viewBox="0 0 80 80"><circle cx="40" cy="40" r="30" fill="#6ec6ff"><animate attributeName="r" values="30;35;30" dur="2s" repeatCount="indefinite"/></circle></svg>',
        '<svg class="svg-anim" viewBox="0 0 80 80"><rect x="15" y="15" width="50" height="50" rx="12" fill="#ffd166"><animate attributeName="rx" values="12;30;12" dur="2s" repeatCount="indefinite"/></rect></svg>',
        '<svg class="svg-anim" viewBox="0 0 80 80"><polygon points="40,10 70,70 10,70" fill="#06d6a0"><animate attributeName="points" values="40,10 70,70 10,70;40,20 70,60 10,60;40,10 70,70 10,70" dur="2s" repeatCount="indefinite"/></polygon></svg>'
      ];

      #project;
      #iconIdx;

      constructor(project, iconIdx = 0) {
        this.#project = project;
        this.#iconIdx = iconIdx;
      }

      get name() {
        return this.#project.name;
      }

      get path() {
        return this.#project.path;
      }

      get desc() {
        return this.#project.desc;
      }

      get icon() {
        return ProjectCard.svgIcons[this.#iconIdx % ProjectCard.svgIcons.length];
      }

      render() {
        console.log('[LOG] render called for project:', this.name);
        const card = document.createElement('div');
        card.className = 'project-card w3-animate-opacity';
        card.innerHTML = `
          <a href="${this.path}" style="text-decoration:none; color:inherit;">
            <div class="project-svg animated-bg">${this.icon}</div>
            <div class="project-title">${this.name}</div>
            <div class="project-desc">${this.desc}</div>
          </a>
        `;
        return card;
      }
    }

    function* projectCardGenerator(projects) {
      let idx = 0;
      for (const project of projects) {
        yield new ProjectCard(project, idx);
        idx += 1;
      }
    }

    async function loadProjects() {
      const key = 'projects.catalog.v1';
      let projects = await CompressionDatabase.getCompressed(key).catch(() => null);
      if (!Array.isArray(projects) || !projects.length) {
        projects = PROJECTS;
        await CompressionDatabase.setCompressed(key, projects);
      }
      return projects;
    }

    let animating = true;
    function toggleAnimations() {
      animating = !animating;
      $('.svg-anim animate').each(function() {
        if (this[animating ? 'beginElement' : 'endElement']) {
          this[animating ? 'beginElement' : 'endElement']();
        }
      });
      $('.animated-bg').css('animation-play-state', animating ? 'running' : 'paused');
    }

    async function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        try {
          await navigator.serviceWorker.register('./sw.js');
        } catch (error) {
          console.error('Service worker registration failed:', error);
        }
      }
    }

    window.MajixOfflineDB = {
      saveDataset: (key, value) => CompressionDatabase.setCompressed(key, value),
      loadDataset: key => CompressionDatabase.getCompressed(key),
      listDatasetKeys: () => CompressionDatabase.listDataKeys()
    };

    $(async function() {
      await registerServiceWorker();
      const projects = await loadProjects();
      const grid = document.getElementById('projectGrid');
      const generator = projectCardGenerator(projects);

      for (const card of generator) {
        grid.appendChild(card.render());
      }

      $('#projectCount').text(projects.length);
      $('.menu-header').on('click', toggleAnimations);
    });
  </script>
</body>
</html>
