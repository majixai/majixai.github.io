    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#161b22">
    <meta name="description" content="Multi-viewer performers engine with filtering, sorting, and screen recording features.">
    <title>Jinx Gen | Best Performers Engine</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- CDNs for Frameworks -->
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/iframe-picker/iframe-open-controls.css">

    <!-- Pako Decompression Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

<body>

    <div class="app-container">
        <header class="app-header">
            <div class="header-main">
                <h1>🎭 Best Performers Engine</h1>
                <div class="header-actions">
                    <button id="toggleFilters" class="btn btn-sm btn-outline-light">Filters ▼</button>
                    <button id="toggleSnippets" class="btn btn-sm btn-outline-light">Snippets ▼</button>
                    <button id="refreshButton" class="btn btn-sm btn-primary">🔄 Refresh</button>
                    <button id="archiveButton" class="btn btn-sm btn-outline-secondary">📁 Archive</button>
                </div>
            </div>
            
            <!-- Search Bar -->
            <div class="search-container">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search performers by name, tags...">
            </div>
        </header>

        <!-- Filters Panel -->
        <div id="filtersPanel" class="filters-panel" style="display: none;">
            <div class="filters-row">
                <div class="filter-group">
                    <label for="sortBy">Sort By:</label>
                    <select id="sortBy" class="form-select form-select-sm">
                        <option value="viewers_desc">Most Viewers</option>
                        <option value="viewers_asc">Least Viewers</option>
                        <option value="age_asc">Youngest First</option>
                        <option value="age_desc">Oldest First</option>
                        <option value="name_asc">Name (A-Z)</option>
                        <option value="name_desc">Name (Z-A)</option>
                        <option value="new_first">New Models First</option>
                        <option value="rank_score">Ranking Score</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="filterGender">Gender:</label>
                    <select id="filterGender" class="form-select form-select-sm">
                        <option value="">All</option>
                        <option value="f" selected>Female</option>
                        <option value="m">Male</option>
                        <option value="c">Couples</option>
                        <option value="s">Trans</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="filterAgeMin">Age Min:</label>
                    <input type="number" id="filterAgeMin" class="form-control form-control-sm" min="18" max="99" value="18">
                </div>
                
                <div class="filter-group">
                    <label for="filterAgeMax">Age Max:</label>
                    <input type="number" id="filterAgeMax" class="form-control form-control-sm" min="18" max="99" value="99">
                </div>
                
                <div class="filter-group">
                    <label for="filterTags">Tags (comma separated):</label>
                    <input type="text" id="filterTags" class="form-control form-control-sm" placeholder="asian, blonde...">
                </div>
                
                <div class="filter-group">
                    <label for="viewerLayoutSelect">Viewer Layout:</label>
                    <select id="viewerLayoutSelect" class="form-select form-select-sm">
                        <option value="1">1 Viewer</option>
                        <option value="2">2 Viewers</option>
                        <option value="3">3 Viewers</option>
                        <option value="4" selected>4 Viewers (2x2)</option>
                        <option value="6">6 Viewers (2x3)</option>
                        <option value="9">9 Viewers (3x3)</option>
                    </select>
                </div>
                
                <div class="filter-group filter-actions">
                    <button id="applyFilters" class="btn btn-sm btn-success">Apply Filters</button>
                    <button id="resetFilters" class="btn btn-sm btn-secondary">Reset</button>
                </div>
            </div>
            
            <!-- Quick Filter Buttons -->
            <div class="quick-filters">
                <span class="quick-label">Quick:</span>
                <button class="quick-filter-btn" data-filter="age" data-value="18">Age 18</button>
                <button class="quick-filter-btn" data-filter="tag" data-value="asian">Asian</button>
                <button class="quick-filter-btn" data-filter="tag" data-value="blonde">Blonde</button>
                <button class="quick-filter-btn" data-filter="tag" data-value="bigboobs">Bigboobs</button>
                <button class="quick-filter-btn" data-filter="tag" data-value="latina">Latina</button>
                <button class="quick-filter-btn" data-filter="new" data-value="true">New Models</button>
            </div>

            <!-- Shape Engine Controls -->
            <div class="shape-engine-controls">
                <span class="quick-label">Shape Overlays:</span>
                <div class="shape-toggle-group">
                    <label class="toggle-label">
                        <input type="checkbox" id="shapesEnabledToggle"> Shapes
                    </label>
                    <label class="toggle-label">
                        <input type="checkbox" id="mlShapesToggle"> GPU/ML/Tensor
                    </label>
                </div>
                <div class="shape-toggle-group">
                    <label class="toggle-label" for="performerModeSelect">Mode:</label>
                    <select id="performerModeSelect" class="form-select form-select-sm">
                        <option value="none">No Performers</option>
                        <option value="single">1 Performer</option>
                        <option value="many" selected>Many Performers</option>
                    </select>
                </div>
                <div class="shape-toggle-group">
                    <label class="toggle-label" for="shapeComplexity">Complexity:</label>
                    <input type="range" id="shapeComplexity" class="form-range" min="1" max="10" value="3">
                </div>
            </div>
        </div>

        <!-- Snippet Manager Panel -->
        <div id="snippetsPanel" class="snippets-panel" style="display: none;">
            <div class="snippet-input-group">
                <textarea id="newSnippetInput" class="form-control" rows="2" placeholder="Enter a new chat snippet for autocomplete..."></textarea>
                <button id="saveSnippetButton" class="btn btn-sm btn-primary">Add Snippet</button>
            </div>
            <div class="snippets-list">
                <h6>Saved Snippets (click to copy):</h6>
                <div id="snippetsList">
                    <p class="text-muted">No snippets saved yet.</p>
                </div>
            </div>
            <div id="snippetStatus" class="snippet-status" style="display: none;"></div>

            <div class="recording-panel">
                <h6>Screen Recording</h6>
                <div class="recording-actions">
                    <button id="startRecordingBtn" class="btn btn-sm btn-danger">⏺ Start</button>
                    <button id="stopRecordingBtn" class="btn btn-sm btn-outline-light" disabled>⏹ Stop</button>
                    <button id="refreshRecordingsBtn" class="btn btn-sm btn-outline-info">↻ Refresh</button>
                </div>
                <div class="recording-actions">
                    <select id="recordingList" class="form-select form-select-sm">
                        <option value="">No recordings</option>
                    </select>
                    <button id="playRecordingBtn" class="btn btn-sm btn-outline-success">▶ Play</button>
                    <button id="downloadRecordingBtn" class="btn btn-sm btn-outline-primary">⬇ Download</button>
                    <button id="deleteRecordingBtn" class="btn btn-sm btn-outline-warning">🗑 Delete</button>
                </div>
                <video id="recordingPreview" class="recording-preview" controls preload="metadata"></video>
                <div id="recordingStatus" class="snippet-status" style="display: none;"></div>
            </div>
            
            <!-- Main text area with autocomplete -->
            <div class="main-text-area-container">
                <label for="mainTextArea">Compose Message (type <code>{{</code> for autocomplete):</label>
                <textarea id="mainTextArea" class="form-control" rows="3" placeholder="Type your message... use {{ to trigger snippets"></textarea>
                <div id="autocompleteSuggestions" class="autocomplete-suggestions" style="display: none;"></div>
            </div>
        </div>

        <!-- Status Bar -->

            <span id="performerCount">Loading performers...</span>
            <span id="onlineStatus" class="online-indicator">●</span>
            <span id="lastUpdate"></span>
        </div>

                </div>
                <div class="archive-pagination-controls">
                    <button id="archivePrevPage" type="button" class="archive-page-btn" aria-label="Previous archive page">←</button>
                    <span id="archivePageInfo" class="archive-page-info">Page 1 / 1</span>
                    <button id="archiveNextPage" type="button" class="archive-page-btn" aria-label="Next archive page">→</button>
                </div>
                <button class="close-button" id="closeArchiveModal">&times;</button>
            </div>
            <div id="archiveGrid" class="archive-grid">
                <p class="text-muted archive-loading">Loading archive...</p>
            </div>
        </div>
    </div>

    <!-- Engine Scripts -->
    <script src="../shared/lazy-loader.js"></script>
    <script src="engine/config.js"></script>
    <script src="engine/cache.js"></script>
    <script src="engine/api.js"></script>
    <script src="engine/model.js"></script>
    <script src="engine/shapes.js"></script>
    <script src="/iframe-picker/iframe-open-controls.js"></script>
    <script src="engine/ui.js"></script>
    <script src="engine/main.js"></script>
    <script>
    // Register parent service worker for PWA functionality
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js', { scope: '../' })
        .then(registration => console.log('SW registered:', registration.scope))
        .catch(error => console.error('SW registration failed:', error));
    }
    </script>

<script>
// Iframe size/type toggles for performers page
document.querySelectorAll('.iframe-toggle-bar .size-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const slot = this.dataset.slot;
        const wrapper = document.querySelector(`.iframe-wrapper[data-slot="${slot}"]`);
        if (!wrapper) return;
        wrapper.classList.remove('size-compact', 'size-normal', 'size-large');
        wrapper.classList.add(`size-${this.dataset.size}`);
        this.closest('.iframe-toggle-bar').querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
    });
});

document.querySelectorAll('.iframe-toggle-bar .type-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const slot = this.dataset.slot;
        const wrapper = document.querySelector(`.iframe-wrapper[data-slot="${slot}"]`);
        if (!wrapper) return;
        wrapper.classList.remove('type-stream', 'type-thumbnail');
        wrapper.classList.add(`type-${this.dataset.type}`);
        this.closest('.iframe-toggle-bar').querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
    });
});

// ==================== Archive ====================
(function() {
    const archivePageSize = 48;
    let allArchiveNames = [];
    let filteredArchiveNames = [];
    let archiveLoaded = false;
    let activeSlideshows = [];
    let archivePage = 1;

    const archiveBtn = document.getElementById('archiveButton');
    const archiveModal = document.getElementById('archiveModal');
    const closeArchiveBtn = document.getElementById('closeArchiveModal');
    const archiveSearch = document.getElementById('archiveSearch');
    const archiveGrid = document.getElementById('archiveGrid');
    const archiveCount = document.getElementById('archiveCount');
    const archivePrevPage = document.getElementById('archivePrevPage');
    const archiveNextPage = document.getElementById('archiveNextPage');
    const archivePageInfo = document.getElementById('archivePageInfo');

    function stopAllArchiveSlideshows() {
        activeSlideshows.forEach(t => clearInterval(t));
        activeSlideshows = [];
    }

    function startArchiveSlideshow(carousel, imgEl, urls) {
        if (carousel._archiveTimer) clearInterval(carousel._archiveTimer);
        let idx = 0;
        const dur = 3500;
        const progressBar = carousel.querySelector('.slide-progress');
        const counterEl = carousel.querySelector('.slide-counter');
        if (progressBar) {
            progressBar.style.transition = `width ${dur}ms linear`;
            progressBar.style.width = '100%';
        }
        const timer = setInterval(() => {
            idx = (idx + 1) % urls.length;
            if (progressBar) {
                progressBar.style.transition = 'none'; progressBar.style.width = '0%';
                void progressBar.offsetWidth;
                progressBar.style.transition = `width ${dur}ms linear`; progressBar.style.width = '100%';
            }
            imgEl.style.opacity = '0.4';
            setTimeout(() => {
                imgEl.src = urls[idx];
                imgEl.style.opacity = '1';
                if (counterEl) counterEl.textContent = `${idx + 1}/${urls.length}`;
            }, 280);
        }, dur);
        carousel._archiveTimer = timer;
        activeSlideshows.push(timer);
    }

    function createArchiveCard(username) {
        const card = document.createElement('div');
        card.className = 'archive-card';
        card.dataset.username = username;

        const carousel = document.createElement('div');
        carousel.className = 'archive-carousel slideshow-carousel';

        const img = document.createElement('img');
        img.alt = username;
        img.loading = 'lazy';
        img.className = 'slide-img archive-img';
        img.src = `https://cdn3.imlive.com/pics/${username}/preview.jpg`;
        img.onerror = function() { this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="90"><rect width="120" height="90" fill="%23333"/><text x="50%" y="50%" font-size="11" fill="%23aaa" text-anchor="middle" dominant-baseline="middle">No image</text></svg>'; };

        const progressBar = document.createElement('div');
        progressBar.className = 'slide-progress';

        const counter = document.createElement('span');
        counter.className = 'slide-counter';
        counter.style.display = 'none';

        const overlayLabel = document.createElement('div');
        overlayLabel.className = 'archive-overlay-label';
        overlayLabel.textContent = username;

        carousel.appendChild(img);
        carousel.appendChild(progressBar);
        carousel.appendChild(counter);
        carousel.appendChild(overlayLabel);
        card.appendChild(carousel);

        const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                obs.disconnect();
                fetch(`../history/${encodeURIComponent(username)}.dat`)
                    .then(r => r.ok ? r.arrayBuffer() : Promise.reject())
                    .then(buffer => {
                        const urls = [...new Set(JSON.parse(pako.inflate(new Uint8Array(buffer), { to: 'string' })).filter(Boolean))];
                        if (urls.length > 0) img.src = urls[0];
                        if (urls.length > 1) {
                            counter.textContent = `1/${urls.length}`;
                            counter.style.display = 'block';
                            startArchiveSlideshow(carousel, img, urls);
                        }
                    })
                    .catch(() => {});
            });
        }, { rootMargin: '300px' });
        observer.observe(card);

        card.addEventListener('click', () => {
            const targetVal = document.getElementById('targetSlot')?.value || 'auto';
            let targetIframe = null;
            if (targetVal === 'auto') {
                for (let i = 1; i <= 9; i++) {
                    const f = document.getElementById(`iframe${i}`);
                    if (f && (!f.src || f.src === 'about:blank')) { targetIframe = f; break; }
                }
                if (!targetIframe) targetIframe = document.getElementById('iframe1');
            } else {
                targetIframe = document.getElementById(`iframe${targetVal}`);
            }
            if (targetIframe) {
                targetIframe.src = `https://chaturbate.com/embed/${username}/?tour=dU9X&campaign=9cg6A&disable_sound=1&bgcolor=black`;
            }
            archiveModal.classList.remove('open');
            stopAllArchiveSlideshows();
        });

        return card;
    }

    function getArchiveTotalPages() {
        return Math.max(1, Math.ceil(filteredArchiveNames.length / archivePageSize));
    }

    function updateArchivePagination(totalPages, totalItems) {
        if (totalItems <= 0) {
            archivePageInfo.textContent = 'Page 0 / 0';
            archivePrevPage.disabled = true;
            archiveNextPage.disabled = true;
            return;
        }
        archivePageInfo.textContent = `Page ${archivePage} / ${totalPages}`;
        archivePrevPage.disabled = archivePage <= 1;
        archiveNextPage.disabled = archivePage >= totalPages;
    }

    function renderArchive() {
        stopAllArchiveSlideshows();
        archiveGrid.innerHTML = '';
        if (filteredArchiveNames.length === 0) {
            archiveGrid.innerHTML = '<p class="text-muted archive-loading">No performers found.</p>';
            archiveCount.textContent = '';
            updateArchivePagination(0, 0);
            return;
        }
        const totalPages = getArchiveTotalPages();
        archivePage = Math.min(Math.max(1, archivePage), totalPages);
        const start = (archivePage - 1) * archivePageSize;
        const pageItems = filteredArchiveNames.slice(start, start + archivePageSize);
        archiveCount.textContent = `${filteredArchiveNames.length} performer${filteredArchiveNames.length !== 1 ? 's' : ''}`;
        updateArchivePagination(totalPages, filteredArchiveNames.length);
        const frag = document.createDocumentFragment();
        pageItems.forEach(name => frag.appendChild(createArchiveCard(name)));
        archiveGrid.appendChild(frag);
    }

    function setArchiveResults(names) {
        filteredArchiveNames = names;
        archivePage = 1;
        renderArchive();
    }

    async function loadArchive() {
        if (archiveLoaded) return;
        archiveGrid.innerHTML = '<p class="text-muted archive-loading">Loading archive index...</p>';
        try {
            const resp = await fetch('../history_index.json');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            allArchiveNames = await resp.json();
            archiveLoaded = true;
            setArchiveResults(allArchiveNames);
        } catch (e) {
            archiveGrid.innerHTML = `<p class="text-muted archive-loading">Failed to load archive: ${e.message}</p>`;
        }
    }

    archiveBtn?.addEventListener('click', () => {
        archiveModal.classList.add('open');
        loadArchive();
    });

    closeArchiveBtn?.addEventListener('click', () => {
        archiveModal.classList.remove('open');
        stopAllArchiveSlideshows();
    });

    archiveModal?.addEventListener('click', e => {
        if (e.target === archiveModal) {
            archiveModal.classList.remove('open');
            stopAllArchiveSlideshows();
        }
    });

    let searchDebounce;
    archiveSearch?.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
            const q = archiveSearch.value.trim().toLowerCase();
            setArchiveResults(q ? allArchiveNames.filter(n => n.toLowerCase().includes(q)) : allArchiveNames);
        }, 250);
    });

    archivePrevPage?.addEventListener('click', () => {
        if (archivePage <= 1) return;
        archivePage -= 1;
        renderArchive();
    });

    archiveNextPage?.addEventListener('click', () => {
        if (archivePage >= getArchiveTotalPages()) return;
        archivePage += 1;
        renderArchive();
    });
})();
</script>
