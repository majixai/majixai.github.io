<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#191c22" />
  <meta name="description" content="Compressed Image Database Viewer with offline support and slideshow features." />
  <title>Best Compressed Image DB Viewer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    body { background: #101114; color: #f0f2f5; }
    .wrap { max-width: 100%; margin: 0 auto; padding: 8px; min-height: 100%; }
    h2 { margin: 4px 0 2px; font-size: 1.3rem; }
    p { margin: 0 0 6px; }
    .stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .stat { background: #191c22; border-radius: 6px; padding: 6px 8px; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .card { background: #191c22; border-radius: 8px; overflow: hidden; border: 1px solid #2a2f39; }
    .card img { width: 100%; height: 200px; object-fit: cover; background: #0f1115; }
    .meta { padding: 8px; font-size: 12px; line-height: 1.35; }
    .name { font-weight: 700; font-size: 14px; }
    .muted { color: #a8afbb; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .toolbar input { min-width: 260px; }
    .slideshow { position: relative; border: 1px solid #2a2f39; border-radius: 10px; overflow: hidden; background: #0b0d11; margin-bottom: 8px; }
    .slideshow img { width: 100%; height: 44vh; min-height: 280px; object-fit: cover; display: block; }
    .slide-caption { position: absolute; left: 0; right: 0; bottom: 0; padding: 8px 10px; background: linear-gradient(transparent, rgba(0, 0, 0, 0.78)); font-size: 13px; }
    .slide-nav { position: absolute; top: 50%; transform: translateY(-50%); border: none; background: rgba(0, 0, 0, 0.55); color: #fff; width: 32px; height: 32px; border-radius: 16px; cursor: pointer; }
    .slide-prev { left: 8px; }
    .slide-next { right: 8px; }
    .interest-panel { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .pill { border: 1px solid #2f3a48; background: #171b22; color: #e7ebf0; border-radius: 999px; padding: 2px 8px; font-size: 11px; }
    .tag-chip { border: 1px solid #354258; background: #1b2432; color: #dce6ff; border-radius: 999px; padding: 1px 7px; font-size: 11px; margin: 3px 4px 0 0; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 class="w3-margin-top">Best Compressed Image DB Viewer</h2>
    <p class="muted">Data source: <code>best/dbs/performer_images_manifest.dat</code></p>

    <div class="toolbar">
      <input id="searchInput" class="w3-input w3-round" placeholder="Search username, tags, display name" />
      <button id="reloadBtn" class="w3-button w3-round w3-blue">Reload</button>
      <span id="status" class="muted">Loading...</span>
      <span id="offlineIndicator" class="muted" style="display:none;">📴 Offline Mode</span>
    </div>

    <div id="interestPanel" class="interest-panel"></div>

    <div class="slideshow" id="slideshow">
      <img id="slideImage" src="" alt="Featured" loading="eager" />
      <button class="slide-nav slide-prev" id="slidePrev" aria-label="Previous image">‹</button>
      <button class="slide-nav slide-next" id="slideNext" aria-label="Next image">›</button>
      <div id="slideCaption" class="slide-caption"></div>
    </div>

    <div class="stats">
      <div class="stat">Performers: <strong id="performerCount">0</strong></div>
      <div class="stat">Images Cached: <strong id="imageCount">0</strong></div>
      <div class="stat">Offline Images: <strong id="offlineImageCount">0</strong></div>
      <div class="stat">Generated: <strong id="generatedAt">-</strong></div>
      <div class="stat">Visible: <strong id="visibleCount">0</strong></div>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script>
    const state = {
      payload: null,
      filtered: [],
      slideshowIndex: 0,
      slideshowTimer: null,
      interests: {},
      isOffline: !navigator.onLine,
      offlineDb: null
    };

    // IndexedDB for offline slideshow data
    const DB_NAME = 'best-slideshow-db';
    const DB_VERSION = 1;
    const STORE_NAME = 'slideshow-data';

    async function initOfflineDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          state.offlineDb = request.result;
          resolve(request.result);
        };
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
      });
    }

    async function saveOfflineData(payload) {
      if (!state.offlineDb) return;
      const tx = state.offlineDb.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      store.put({ id: 'manifest', data: payload, savedAt: Date.now() });
      return new Promise((resolve) => {
        tx.oncomplete = resolve;
        tx.onerror = resolve;
      });
    }

    async function loadOfflineData() {
      if (!state.offlineDb) return null;
      const tx = state.offlineDb.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.get('manifest');
      return new Promise((resolve) => {
        request.onsuccess = () => resolve(request.result?.data || null);
        request.onerror = () => resolve(null);
      });
    }

    // Proactively cache slideshow images for offline access
    async function cacheImagesForOffline(items, maxImages = 100) {
      if (!('caches' in window)) return 0;
      const cache = await caches.open('best-viewer-v2-slideshow');
      let cachedCount = 0;
      const imagesToCache = items.slice(0, maxImages);
      
      await Promise.allSettled(
        imagesToCache.map(async (item) => {
          if (!item.image_url) return;
          try {
            const cached = await cache.match(item.image_url);
            if (!cached) {
              const response = await fetch(item.image_url, { mode: 'no-cors' });
              await cache.put(item.image_url, response);
            }
            cachedCount++;
          } catch {
            // Ignore individual image cache failures
          }
        })
      );
      return cachedCount;
    }

    // Count offline cached images and update UI
    async function updateOfflineImageCount() {
      if (!('caches' in window)) return;
      try {
        const cache = await caches.open('best-viewer-v2-slideshow');
        const keys = await cache.keys();
        document.getElementById('offlineImageCount').textContent = String(keys.length);
      } catch {
        document.getElementById('offlineImageCount').textContent = '0';
      }
    }

    // Update offline status indicator
    function updateOfflineStatus() {
      state.isOffline = !navigator.onLine;
      const indicator = document.getElementById('offlineIndicator');
      indicator.style.display = state.isOffline ? 'inline' : 'none';
    }

    window.addEventListener('online', updateOfflineStatus);
    window.addEventListener('offline', updateOfflineStatus);

    function esc(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function fmtTs(ts) {
      if (!ts) return '-';
      const d = new Date(ts * 1000);
      return Number.isNaN(d.getTime()) ? '-' : d.toLocaleString();
    }

    function cardHtml(item) {
      const tags = Array.isArray(item.tags) ? item.tags.slice(0, 8) : [];
      const tagsHtml = tags.map((tag) => `<button class="tag-chip" data-tag="${esc(tag)}">${esc(tag)}</button>`).join('');
      return `
        <div class="card">
          <img src="${esc(item.image_url)}" alt="${esc(item.username)}" loading="lazy" />
          <div class="meta">
            <div class="name">${esc(item.display_name || item.username)}</div>
            <div class="muted">@${esc(item.username)}</div>
            <div>Age: ${item.age ?? 'N/A'} · Viewers: ${item.num_viewers ?? 0}</div>
            <div>${tagsHtml}</div>
            <div class="muted">Bytes: ${item.byte_size ?? 0}</div>
            <div class="muted">Seen: ${fmtTs(item.last_seen)}</div>
          </div>
        </div>
      `;
    }

    function loadInterests() {
      try {
        const saved = JSON.parse(localStorage.getItem('best_user_interests') || '{}');
        state.interests = saved && typeof saved === 'object' ? saved : {};
      } catch {
        state.interests = {};
      }
    }

    function saveInterests() {
      localStorage.setItem('best_user_interests', JSON.stringify(state.interests));
    }

    function trackInterest(key) {
      const normalized = String(key || '').trim().toLowerCase();
      if (!normalized) return;
      state.interests[normalized] = (state.interests[normalized] || 0) + 1;
      saveInterests();
      renderInterests();
    }

    function renderInterests() {
      const panel = document.getElementById('interestPanel');
      const top = Object.entries(state.interests)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);

      if (!top.length) {
        panel.innerHTML = '<span class="muted">Interest profile: click tags to capture interaction insights.</span>';
        return;
      }

      panel.innerHTML = `<span class="muted">Interest profile:</span>${top
        .map(([k, v]) => `<span class="pill">${esc(k)} · ${v}</span>`)
        .join('')}`;
    }

    function setSlideshowIndex(nextIndex) {
      if (!state.filtered.length) {
        document.getElementById('slideImage').src = '';
        document.getElementById('slideCaption').textContent = 'No results for slideshow';
        return;
      }

      state.slideshowIndex = ((nextIndex % state.filtered.length) + state.filtered.length) % state.filtered.length;
      const item = state.filtered[state.slideshowIndex];
      const img = document.getElementById('slideImage');
      img.src = item.image_url || '';
      img.alt = item.username || 'featured image';
      document.getElementById('slideCaption').textContent = `${item.display_name || item.username} · @${item.username} · viewers ${item.num_viewers ?? 0}`;
    }

    function startSlideshow() {
      if (state.slideshowTimer) clearInterval(state.slideshowTimer);
      state.slideshowTimer = setInterval(() => {
        setSlideshowIndex(state.slideshowIndex + 1);
      }, 2500);
    }

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = state.filtered.map(cardHtml).join('');
      document.getElementById('visibleCount').textContent = String(state.filtered.length);
      setSlideshowIndex(0);
      startSlideshow();
    }

    function applySearch() {
      const query = (document.getElementById('searchInput').value || '').trim().toLowerCase();
      const items = state.payload?.items || [];
      if (!query) {
        state.filtered = items;
        render();
        return;
      }
      state.filtered = items.filter((item) => {
        const tags = Array.isArray(item.tags) ? item.tags.join(' ').toLowerCase() : '';
        return (
          String(item.username || '').toLowerCase().includes(query) ||
          String(item.display_name || '').toLowerCase().includes(query) ||
          tags.includes(query)
        );
      });
      render();
    }

    async function loadManifest() {
      const status = document.getElementById('status');
      status.textContent = 'Loading...';
      
      // Initialize offline database
      try {
        await initOfflineDb();
      } catch {
        console.warn('IndexedDB not available for offline storage');
      }
      
      updateOfflineStatus();
      
      try {
        const res = await fetch(`dbs/performer_images_manifest.dat?t=${Date.now()}`);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const compressed = await res.arrayBuffer();
        const decompressed = pako.inflate(new Uint8Array(compressed), { to: 'string' });
        const payload = JSON.parse(decompressed);
        state.payload = payload;
        state.filtered = payload.items || [];

        document.getElementById('performerCount').textContent = String(payload.performer_count || 0);
        document.getElementById('imageCount').textContent = String(payload.image_count || 0);
        document.getElementById('generatedAt').textContent = fmtTs(payload.generated_at);
        render();
        status.textContent = `Loaded ${state.filtered.length} entries`;
        
        // Save data for offline use and proactively cache images
        saveOfflineData(payload);
        cacheImagesForOffline(payload.items || []).then(() => updateOfflineImageCount());
        
      } catch (error) {
        // Try to load from offline cache
        const offlinePayload = await loadOfflineData();
        if (offlinePayload) {
          state.payload = offlinePayload;
          state.filtered = offlinePayload.items || [];
          document.getElementById('performerCount').textContent = String(offlinePayload.performer_count || 0);
          document.getElementById('imageCount').textContent = String(offlinePayload.image_count || 0);
          document.getElementById('generatedAt').textContent = fmtTs(offlinePayload.generated_at);
          render();
          status.textContent = `📴 Offline: ${state.filtered.length} cached entries`;
          updateOfflineImageCount();
        } else {
          status.textContent = `Failed: ${error.message}`;
          document.getElementById('grid').innerHTML = '<div class="w3-panel w3-red">Unable to load data. No offline cache available.</div>';
        }
      }
    }

    document.getElementById('reloadBtn').addEventListener('click', loadManifest);
    document.getElementById('searchInput').addEventListener('input', applySearch);
    document.getElementById('slidePrev').addEventListener('click', () => setSlideshowIndex(state.slideshowIndex - 1));
    document.getElementById('slideNext').addEventListener('click', () => setSlideshowIndex(state.slideshowIndex + 1));
    document.getElementById('grid').addEventListener('click', (event) => {
      const btn = event.target.closest('.tag-chip');
      if (!btn) return;
      const tag = btn.getAttribute('data-tag');
      trackInterest(tag);
    });

    loadInterests();
    renderInterests();
    loadManifest();
  </script>
  <script src="main.js"></script>
</body>
</html>
