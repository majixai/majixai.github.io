<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a472a">
    <meta name="description" content="Room Viewer application with modular architecture - Gamma version with enhanced logging, event bus, filtering, and retry logic.">
    <title>Room Viewer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

    <style>
        /* --- Performer Card Overlay Styles --- */
.performer-card {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 8px;
    margin-bottom: 10px;
    background: #000;
}

.performer-card img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.3s;
}

.performer-card .performer-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 4px 8px;
    font-size: 0.85rem;
    transform: translateY(100%); /* Hidden by default */
    transition: transform 0.3s ease;
    display: flex;
    justify-content: space-between;
}

/* Show overlay on hover or default if preferred */
.performer-card:hover .performer-overlay,
.performer-card.always-show-text .performer-overlay {
    transform: translateY(0);
}

/* --- Dynamic Grid for User Lists --- */
.user-list {
    display: grid;
    gap: 10px;
    /* Default to 2 columns, overridden by JS */
    grid-template-columns: repeat(2, 1fr); 
}

/* --- Layout Toggle Classes --- */
.main-content {
    display: flex;
    flex-direction: row;
    transition: all 0.3s ease;
}

.view-performers-only .iframe-column {
    display: none;
}
.view-performers-only .user-column {
    flex: 1; /* Expand to fill */
}

.view-iframes-only .user-column {
    display: none;
}
.view-iframes-only .iframe-column {
    flex: 1;
    width: 100%;
}

    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-controls">
            <h1>Room Viewer</h1>
            
            <div class="view-controls" style="margin: 0 15px; padding: 5px; background: #eee; border-radius: 5px;">
                <strong>View:</strong>
                <button id="viewSplitBtn">Split</button>
                <button id="viewPerformersBtn">Performers Only</button>
                <button id="viewIframesBtn">Iframes Only</button>
                
                <strong style="margin-left: 10px;">Columns:</strong>
                <select id="gridColumnCount">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>

            <div class="control-buttons">
                <button id="settingsButton">Settings</button>
                <button id="storageButton">Chat Storage</button>
                <button id="toggleControlsButton">Toggle Controls</button>
            </div>
        </div>

        <div class="main-content" id="mainContentArea">
            <div class="user-column" id="previousUsers">
                <h2>History (Online Now)</h2>
                <button id="clearPreviousUsers" class="clear-history-btn">Clear History</button>
                <div class="user-list" id="historyUserList">
                    <p class="text-muted w3-center">Loading history...</p>
                </div>
            </div>

            <div class="iframe-column" id="iframeColumn">
                <div class="iframe-selector">
                    <label>Target Slot:</label>
                    <select id="targetSlot" class="form-select form-select-sm" style="display:inline-block; width:auto; margin-left:10px;">
                        <option value="mainIframe">Slot 1</option>
                        <option value="mainIframe2">Slot 2</option>
                    </select>
                </div>
                <div class="iframe-container">
                    <div class="iframe-header">
                        <span class="slot-number">#1</span>
                        <span class="performer-name" id="iframe1Name">-</span>
                        <button class="close-iframe-btn" data-iframe="mainIframe" title="Clear">&times;</button>
                    </div>
                    <iframe id="mainIframe" src="about:blank" title="Main Viewer" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms allow-popups allow-modals allow-downloads"></iframe>
                </div>
                <div class="iframe-container">
                    <div class="iframe-header">
                        <span class="slot-number">#2</span>
                        <span class="performer-name" id="iframe2Name">-</span>
                        <button class="close-iframe-btn" data-iframe="mainIframe2" title="Clear">&times;</button>
                    </div>
                    <iframe id="mainIframe2" src="about:blank" title="Secondary Viewer" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms allow-popups allow-modals allow-downloads"></iframe>
                </div>
            </div>

            <div class="user-column" id="onlineUsers">
                <h2>Online Users</h2>
                <div id="onlineLoadingIndicator" class="loading-indicator" style="display: none;">Loading...</div>
                <div id="onlineErrorDisplay" class="error-message" style="display: none;"></div>
                <div class="user-list" id="onlineUserList"></div>
            </div>
        </div>
        
        </div>

    <script src="config.js"></script>
    <script src="logger.js"></script>
    <script src="events.js"></script>
    <script src="filters.js"></script>
    <script src="api.js"></script>
    <script src="storage.js"></script>
    <script src="mappers.js"></script>
    <script src="decorators.js"></script>
    <script src="ui.js"></script>
    <script src="script.js"></script>
    <script>
        $(document).ready(function() {
    // --- 1. Target Slot Iframe Loading ---
    // When you click a performer, read the selected target slot and update that specific iframe
    $(document).on('click', '.performer-card', function() {
        const performerUsername = $(this).data('username');
        const targetIframeId = $('#targetSlot').val(); // Gets 'mainIframe' or 'mainIframe2'
        
        // Build your URL (adjust to match your actual stream URL structure)
        const streamUrl = `https://cbxyz.com/in/?tour=dU9X&campaign=9cg6A&track=embed&signup_notice=1&disable_sound=1&mobileRedirect=never&room=${performerUsername}`;
        
        // Update the targeted iframe
        $(`#${targetIframeId}`).attr('src', streamUrl);
        
        // Update the header text for that slot
        if(targetIframeId === 'mainIframe') {
            $('#iframe1Name').text(performerUsername);
        } else {
            $('#iframe2Name').text(performerUsername);
        }
    });

    // --- 2. View Toggles ---
    $('#viewSplitBtn').click(() => {
        $('#mainContentArea').removeClass('view-performers-only view-iframes-only');
    });
    
    $('#viewPerformersBtn').click(() => {
        $('#mainContentArea').removeClass('view-iframes-only').addClass('view-performers-only');
    });
    
    $('#viewIframesBtn').click(() => {
        $('#mainContentArea').removeClass('view-performers-only').addClass('view-iframes-only');
    });

    // --- 3. Grid Column Selection ---
    $('#gridColumnCount').change(function() {
        const columns = $(this).val();
        $('.user-list').css('grid-template-columns', `repeat(${columns}, 1fr)`);
    });

    // --- 4. .DAT File Slideshow Logic ---
    // Assuming the .dat file contains a JSON array of image URLs or comma-separated URLs
    async function loadPerformerSlideshow(performerElement, username) {
        try {
            // Adjust the path up two directories as requested
            const response = await fetch(`../../${username}_image_history.dat`); 
            if (!response.ok) return; // File might not exist for every performer

            const textData = await response.text();
            
            // NOTE: You will need to adjust the split/parse logic based on how your .dat file is formatted.
            // This assumes URLs are separated by newlines.
            const imageUrls = textData.split('\n').filter(url => url.trim() !== '');

            if (imageUrls.length > 1) {
                let currentIdx = 0;
                const imgElement = $(performerElement).find('img');
                
                // Change image every 3 seconds
                setInterval(() => {
                    currentIdx = (currentIdx + 1) % imageUrls.length;
                    imgElement.attr('src', imageUrls[currentIdx]);
                }, 3000);
            }
        } catch (error) {
            console.error(`Could not load slideshow for ${username}:`, error);
        }
    }

    // Example of calling the slideshow function when rendering a new performer card:
    // const newCard = $(`<div class="performer-card" data-username="jane_doe">...</div>`);
    // $('#onlineUserList').append(newCard);
    // loadPerformerSlideshow(newCard, 'jane_doe');
});

    </script>
</body>
</html>
