<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a472a">
    <meta name="description" content="Room Viewer application with modular architecture - Gamma version with enhanced logging, event bus, filtering, and retry logic.">
    <title>Room Viewer</title>

    <link rel="stylesheet" href="style.css">

    <style>
        /* --- Performer Card Overlay Styles --- */
.performer-card {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 8px;
    margin-bottom: 10px;
    background: #000;
}

.performer-card img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.3s;
}

.performer-card .performer-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 4px 8px;
    font-size: 0.85rem;
    transform: translateY(100%); /* Hidden by default */
    transition: transform 0.3s ease;
    display: flex;
    justify-content: space-between;
}

/* Show overlay on hover or default if preferred */
.performer-card:hover .performer-overlay,
.performer-card.always-show-text .performer-overlay {
    transform: translateY(0);
}

/* Iframe toggle bar */
.iframe-toggle-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 6px;
    background: rgba(0,0,0,0.75);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 6;
}
.iframe-toggle-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 0.7em;
    padding: 2px 5px;
    border-radius: 3px;
    cursor: pointer;
}
.iframe-toggle-btn.active { background: #27ae60; border-color: #27ae60; }
.iframe-container.size-compact { height: 200px !important; }
.iframe-container.size-normal { height: 340px !important; }
.iframe-container.size-large { height: 520px !important; }
.iframe-container .iframe-thumbnail {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; display: none;
}
.iframe-container.type-thumbnail iframe { display: none; }
.iframe-container.type-thumbnail .iframe-thumbnail { display: block; }

/* Slideshow on performer cards */
.performer-card .slide-progress {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: #27ae60; width: 0%;
}
.performer-card .slide-counter {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.6); color: #fff;
    font-size: 0.65em; padding: 1px 4px; border-radius: 3px;
}
.performer-card img { transition: opacity 0.3s ease; }

/* --- Dynamic Grid for User Lists --- */
.user-list {
    display: grid;
    gap: 10px;
    /* Default to 2 columns, overridden by JS */
    grid-template-columns: repeat(2, 1fr); 
}

/* --- Layout Toggle Classes --- */
.main-content {
    display: flex;
    flex-direction: row;
    transition: all 0.3s ease;
}

.view-performers-only .iframe-column {
    display: none;
}
.view-performers-only .user-column {
    flex: 1; /* Expand to fill */
}

.view-iframes-only .user-column {
    display: none;
}
.view-iframes-only .iframe-column {
    flex: 1;
    width: 100%;
}

    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-controls">
            <h1>Room Viewer</h1>
            
            <div class="view-controls" style="margin: 0 15px; padding: 5px; background: #eee; border-radius: 5px;">
                <strong>View:</strong>
                <button id="viewSplitBtn">Split</button>
                <button id="viewPerformersBtn">Performers Only</button>
                <button id="viewIframesBtn">Iframes Only</button>
                
                <strong style="margin-left: 10px;">Columns:</strong>
                <select id="gridColumnCount">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>

            <div class="control-buttons">
                <button id="settingsButton">Settings</button>
                <button id="storageButton">Chat Storage</button>
                <button id="toggleControlsButton">Toggle Controls</button>
            </div>
        </div>

        <div class="main-content" id="mainContentArea">
            <div class="user-column" id="previousUsers">
                <h2>History (Online Now)</h2>
                <button id="clearPreviousUsers" class="clear-history-btn">Clear History</button>
                <div class="user-list" id="historyUserList">
                    <p class="text-muted w3-center">Loading history...</p>
                </div>
            </div>

            <div class="iframe-column" id="iframeColumn">
                <div class="iframe-selector">
                    <label>Target Slot:</label>
                    <select id="targetSlot" class="form-select form-select-sm" style="display:inline-block; width:auto; margin-left:10px;">
                        <option value="mainIframe">Slot 1</option>
                        <option value="mainIframe2">Slot 2</option>
                    </select>
                </div>
                <div class="iframe-container">
                    <div class="iframe-header">
                        <span class="slot-number">#1</span>
                        <span class="performer-name" id="iframe1Name">-</span>
                        <button class="close-iframe-btn" data-iframe="mainIframe" title="Clear">&times;</button>
                    </div>
                    <iframe id="mainIframe" src="about:blank" title="Main Viewer" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms allow-popups allow-modals allow-downloads"></iframe>
                    <img class="iframe-thumbnail" id="mainIframeThumbnailGamma" src="" alt="">
                    <div class="iframe-toggle-bar">
                        <button class="iframe-toggle-btn size-btn active" data-iframe="mainIframe" data-size="normal">◻ Normal</button>
                        <button class="iframe-toggle-btn size-btn" data-iframe="mainIframe" data-size="compact">▪ Compact</button>
                        <button class="iframe-toggle-btn size-btn" data-iframe="mainIframe" data-size="large">⬛ Large</button>
                        <span style="color:#666;margin:0 4px;">|</span>
                        <button class="iframe-toggle-btn type-btn active" data-iframe="mainIframe" data-type="stream">📺 Stream</button>
                        <button class="iframe-toggle-btn type-btn" data-iframe="mainIframe" data-type="thumbnail">🖼 Thumb</button>
                    </div>
                </div>
                <div class="iframe-container">
                    <div class="iframe-header">
                        <span class="slot-number">#2</span>
                        <span class="performer-name" id="iframe2Name">-</span>
                        <button class="close-iframe-btn" data-iframe="mainIframe2" title="Clear">&times;</button>
                    </div>
                    <iframe id="mainIframe2" src="about:blank" title="Secondary Viewer" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms allow-popups allow-modals allow-downloads"></iframe>
                    <img class="iframe-thumbnail" id="mainIframe2ThumbnailGamma" src="" alt="">
                    <div class="iframe-toggle-bar">
                        <button class="iframe-toggle-btn size-btn active" data-iframe="mainIframe2" data-size="normal">◻ Normal</button>
                        <button class="iframe-toggle-btn size-btn" data-iframe="mainIframe2" data-size="compact">▪ Compact</button>
                        <button class="iframe-toggle-btn size-btn" data-iframe="mainIframe2" data-size="large">⬛ Large</button>
                        <span style="color:#666;margin:0 4px;">|</span>
                        <button class="iframe-toggle-btn type-btn active" data-iframe="mainIframe2" data-type="stream">📺 Stream</button>
                        <button class="iframe-toggle-btn type-btn" data-iframe="mainIframe2" data-type="thumbnail">🖼 Thumb</button>
                    </div>
                </div>
            </div>

            <div class="user-column" id="onlineUsers">
                <h2>Online Users</h2>
                <div id="onlineLoadingIndicator" class="loading-indicator" style="display: none;">Loading...</div>
                <div id="onlineErrorDisplay" class="error-message" style="display: none;"></div>
                <div class="user-list" id="onlineUserList"></div>
            </div>
        </div>
        
        </div>

    <script src="config.js"></script>
    <script src="logger.js"></script>
    <script src="events.js"></script>
    <script src="filters.js"></script>
    <script src="api.js"></script>
    <script src="storage.js"></script>
    <script src="mappers.js"></script>
    <script src="decorators.js"></script>
    <script src="ui.js"></script>
    <script src="script.js"></script>
    <script src="slideshow-manager.js"></script>
    <script>
        $(document).ready(function() {
    // --- 1. Target Slot Iframe Loading ---
    $(document).on('click', '.performer-card', function() {
        const performerUsername = $(this).data('username');
        const targetIframeId = $('#targetSlot').val();
        const streamUrl = `https://cbxyz.com/in/?tour=dU9X&campaign=9cg6A&track=embed&signup_notice=1&disable_sound=1&mobileRedirect=never&room=${performerUsername}`;
        $(`#${targetIframeId}`).attr('src', streamUrl);

        if (targetIframeId === 'mainIframe') {
            $('#iframe1Name').text(performerUsername);
            const cardImg = $(this).find('img').first().attr('src');
            if (cardImg) $('#mainIframeThumbnailGamma').attr('src', cardImg);
        } else {
            $('#iframe2Name').text(performerUsername);
            const cardImg = $(this).find('img').first().attr('src');
            if (cardImg) $('#mainIframe2ThumbnailGamma').attr('src', cardImg);
        }
    });

    // --- 2. View Toggles ---
    $('#viewSplitBtn').click(() => {
        $('#mainContentArea').removeClass('view-performers-only view-iframes-only');
    });
    
    $('#viewPerformersBtn').click(() => {
        $('#mainContentArea').removeClass('view-iframes-only').addClass('view-performers-only');
    });
    
    $('#viewIframesBtn').click(() => {
        $('#mainContentArea').removeClass('view-performers-only').addClass('view-iframes-only');
    });

    // --- 3. Grid Column Selection ---
    $('#gridColumnCount').change(function() {
        const columns = $(this).val();
        $('.user-list').css('grid-template-columns', `repeat(${columns}, 1fr)`);
    });

    // --- 4. .DAT File Slideshow Logic (via SlideshowManager) ---
    // Called externally when rendering performer cards
});

    // --- 5. Iframe Size & Type Toggles ---
    document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const iframeId = this.dataset.iframe;
            const container = document.getElementById(iframeId)?.closest('.iframe-container');
            if (!container) return;
            container.classList.remove('size-compact', 'size-normal', 'size-large');
            container.classList.add(`size-${this.dataset.size}`);
            this.closest('.iframe-toggle-bar').querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const iframeId = this.dataset.iframe;
            const container = document.getElementById(iframeId)?.closest('.iframe-container');
            if (!container) return;
            container.classList.remove('type-stream', 'type-thumbnail');
            container.classList.add(`type-${this.dataset.type}`);
            this.closest('.iframe-toggle-bar').querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    async function loadPerformerSlideshow(performerElement, username) {
        const imgElement = performerElement.querySelector('img');
        if (!imgElement) return;

        const progressBar = document.createElement('div');
        progressBar.className = 'slide-progress';
        performerElement.appendChild(progressBar);

        const counter = document.createElement('span');
        counter.className = 'slide-counter';
        performerElement.appendChild(counter);

        const manager = await SlideshowManager.fromDatFile(
            imgElement,
            `../history/${encodeURIComponent(username)}.dat`,
            { progressBar, counter }
        );
        if (manager.images.length > 1) {
            counter.textContent = `1/${manager.images.length}`;
            manager.start();
            performerElement._slideshowManager = manager;
        }
    }

    // Expose for use by script.js when creating performer cards
    window.loadPerformerSlideshow = loadPerformerSlideshow;
    </script>
</body>
</html>
