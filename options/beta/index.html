<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1d23">
    <meta name="description" content="Options Strategy Reference - Beta Viewer with live payoff diagrams and strategy filtering">
    <title>Options Strategy Reference (Beta)</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-dark bg-dark-nav sticky-top shadow">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="../">
            <i class="fa-solid fa-arrow-left"></i>
            <span class="d-none d-sm-inline">Options</span>
        </a>
        <span class="navbar-brand mx-auto fw-bold">
            <i class="fa-solid fa-chart-line me-1 text-accent"></i>
            Options Strategy Reference <span class="badge bg-accent text-dark ms-1 small">Beta</span>
        </span>
        <div class="d-flex align-items-center gap-2">
            <span id="strategy-count" class="badge bg-secondary">0 strategies</span>
        </div>
    </div>
</nav>

<!-- Toolbar -->
<div class="toolbar-strip bg-toolbar border-bottom">
    <div class="container-fluid py-2">
        <div class="row g-2 align-items-center">
            <!-- Search -->
            <div class="col-12 col-md-4">
                <div class="input-group input-group-sm">
                    <span class="input-group-text bg-input border-input">
                        <i class="fa-solid fa-magnifying-glass text-muted"></i>
                    </span>
                    <input type="text" id="search-input" class="form-control bg-input border-input text-light"
                           placeholder="Search strategies...">
                </div>
            </div>
            <!-- Category Filter -->
            <div class="col-6 col-md-3">
                <select id="category-filter" class="form-select form-select-sm bg-input border-input text-light">
                    <option value="all">All Categories</option>
                    <option value="oneLeg">1-Leg</option>
                    <option value="twoLeg">2-Leg</option>
                    <option value="threeLeg">3-Leg</option>
                    <option value="fourLeg">4-Leg</option>
                    <option value="multiLeg">Multi-Leg</option>
                </select>
            </div>
            <!-- Outlook Filter -->
            <div class="col-6 col-md-3">
                <select id="outlook-filter" class="form-select form-select-sm bg-input border-input text-light">
                    <option value="all">All Outlooks</option>
                    <option value="bullish">Bullish</option>
                    <option value="bearish">Bearish</option>
                    <option value="neutral">Neutral</option>
                    <option value="volatile">Volatile</option>
                    <option value="synthetic">Synthetic</option>
                </select>
            </div>
            <!-- View Toggle -->
            <div class="col-12 col-md-2 d-flex justify-content-md-end">
                <div class="btn-group btn-group-sm" role="group">
                    <button id="view-grid" class="btn btn-outline-accent active" title="Grid View">
                        <i class="fa-solid fa-grip"></i>
                    </button>
                    <button id="view-list" class="btn btn-outline-accent" title="List View">
                        <i class="fa-solid fa-list"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Main Content -->
<div class="container-fluid py-3">
    <!-- Category Sections -->
    <div id="strategies-container">
        <!-- Dynamically populated by script.js -->
        <div id="loading-state" class="text-center py-5">
            <div class="spinner-border text-accent" role="status"></div>
            <p class="mt-3 text-muted">Loading strategies...</p>
        </div>
    </div>
</div>

<!-- Strategy Detail Modal -->
<div class="modal fade" id="strategyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content bg-modal">
            <div class="modal-header border-bottom border-secondary">
                <div>
                    <h5 class="modal-title mb-0" id="modal-title">Strategy Name</h5>
                    <small id="modal-outlook" class="text-muted"></small>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <!-- Left: Details -->
                    <div class="col-lg-5">
                        <!-- Key Metrics -->
                        <div class="card bg-card border-secondary mb-3">
                            <div class="card-header border-secondary small text-uppercase text-muted">
                                <i class="fa-solid fa-chart-bar me-1"></i> Key Metrics
                            </div>
                            <div class="card-body p-3">
                                <div class="row g-2">
                                    <div class="col-6">
                                        <div class="metric-label">Max Profit</div>
                                        <div id="modal-max-profit" class="metric-value text-success"></div>
                                    </div>
                                    <div class="col-6">
                                        <div class="metric-label">Max Loss</div>
                                        <div id="modal-max-loss" class="metric-value text-danger"></div>
                                    </div>
                                    <div class="col-12">
                                        <div class="metric-label">Breakeven</div>
                                        <div id="modal-breakeven" class="metric-value text-warning"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Construction -->
                        <div class="card bg-card border-secondary mb-3">
                            <div class="card-header border-secondary small text-uppercase text-muted">
                                <i class="fa-solid fa-hammer me-1"></i> Construction
                            </div>
                            <div class="card-body p-3">
                                <ul id="modal-construction" class="list-unstyled mb-0 small"></ul>
                            </div>
                        </div>

                        <!-- Greeks Impact -->
                        <div class="card bg-card border-secondary mb-3">
                            <div class="card-header border-secondary small text-uppercase text-muted">
                                <i class="fa-solid fa-atom me-1"></i> Greeks Impact
                            </div>
                            <div class="card-body p-3">
                                <div id="modal-greeks" class="small"></div>
                            </div>
                        </div>

                        <!-- Example -->
                        <div class="card bg-card border-secondary">
                            <div class="card-header border-secondary small text-uppercase text-muted">
                                <i class="fa-solid fa-flask me-1"></i> Example (MES)
                            </div>
                            <div class="card-body p-3">
                                <p id="modal-example" class="small text-light mb-0"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Description + Payoff Diagram -->
                    <div class="col-lg-7">
                        <p id="modal-description" class="text-light mb-3 small lh-base"></p>
                        <!-- Parameters -->
                        <div class="card bg-card border-secondary mb-3" id="params-section">
                            <div class="card-header border-secondary small text-uppercase text-muted d-flex justify-content-between align-items-center">
                                <span><i class="fa-solid fa-sliders me-1"></i> Parameters</span>
                                <button class="btn btn-sm btn-accent" id="calc-btn">
                                    <i class="fa-solid fa-calculator me-1"></i> Calculate & Plot
                                </button>
                            </div>
                            <div class="card-body p-3">
                                <div id="modal-params" class="row g-2"></div>
                            </div>
                        </div>
                        <!-- Payoff Diagram -->
                        <div class="card bg-card border-secondary">
                            <div class="card-header border-secondary small text-uppercase text-muted">
                                <i class="fa-solid fa-wave-square me-1"></i> Payoff at Expiration
                            </div>
                            <div class="card-body p-2">
                                <div id="modal-plot" style="height: 320px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Plotly.js -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<!-- Application Script -->
<script src="script.js"></script>

</body>
</html>
