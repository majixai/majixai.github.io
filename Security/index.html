<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU ML Recognition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        #container { position: relative; margin-top: 20px; }
        canvas { position: absolute; top: 0; left: 0; }
        video { border-radius: 10px; background: #222; }
        #alert-box { height: 50px; width: 100%; text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container text-center mt-4">
    <h2>GPU Accelerated ML Recognition</h2>
    <div id="alert-box" class="alert d-none"></div>
    
    <div id="container">
        <video id="webcam" width="640" height="480" autoplay muted></video>
    </div>
    
    <p class="mt-3 text-secondary">Status: <span id="status">Loading Models...</span></p>
</div>

<script>
const video = document.getElementById('webcam');
const statusText = document.getElementById('status');
const alertBox = document.getElementById('alert-box');

// 1. Load Models from CDN
async function loadModels() {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
    await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
    startVideo();
}

// 2. Access Webcam
function startVideo() {
    navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => {
            video.srcObject = stream;
            statusText.innerText = "System Active - Processing on GPU";
        })
        .catch(err => console.error("Webcam access denied:", err));
}

// 3. Detection Loop
video.addEventListener('play', () => {
    const canvas = faceapi.createCanvasFromMedia(video);
    document.getElementById('container').append(canvas);
    const displaySize = { width: video.width, height: video.height };
    faceapi.matchDimensions(canvas, displaySize);

    setInterval(async () => {
        // Use TinyFaceDetector for faster GPU performance
        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withAgeAndGender();

        const resizedDetections = faceapi.resizeResults(detections, displaySize);
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        faceapi.draw.drawDetections(canvas, resizedDetections);

        let femaleDetected = false;

        resizedDetections.forEach(detection => {
            const { gender, genderProbability } = detection;
            
            // Check for female detection with > 80% confidence
            if (gender === 'female' && genderProbability > 0.8) {
                femaleDetected = true;
            }

            // Draw Label
            new faceapi.draw.DrawTextField(
                [`${gender} (${Math.round(genderProbability * 100)}%)`],
                detection.detection.box.bottomLeft
            ).draw(canvas);
        });

        // 4. Alert Logic
        if (femaleDetected) {
            alertBox.innerText = "ALERT: Female Detected";
            alertBox.className = "alert alert-danger";
        } else {
            alertBox.className = "alert d-none";
        }

    }, 100); // Runs every 100ms
});

loadModels();
</script>

</body>
</html>
