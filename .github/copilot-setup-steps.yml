      """
      Zstandard (zstd) compressed blob store.
      Zstd provides an excellent balance of speed and compression ratio,
      with support for training custom dictionaries for domain-specific data.
      Ideal for the high-frequency market data pipeline.
      """
      import asyncio
      import hashlib
      import json
      import os
      import sqlite3
      import zstandard as zstd
      from datetime import datetime, timedelta

      DB_PATH = "compressed_store_zstd.db"

      SCHEMA = """
          PRAGMA journal_mode=WAL;
          PRAGMA synchronous=NORMAL;
          PRAGMA cache_size=-64000;
          PRAGMA mmap_size=134217728;

          CREATE TABLE IF NOT EXISTS blobs (
              id               INTEGER PRIMARY KEY AUTOINCREMENT,
              key              TEXT    NOT NULL UNIQUE,
              namespace        TEXT    NOT NULL DEFAULT 'default',
              content_type     TEXT    NOT NULL DEFAULT 'application/octet-stream',
              sha256           TEXT    NOT NULL,
              original_bytes   INTEGER NOT NULL,
              compressed_bytes INTEGER NOT NULL,
              compression_ratio REAL   NOT NULL,
              zstd_level       INTEGER NOT NULL DEFAULT 3,
              dict_id          INTEGER,
              created_at       TEXT    NOT NULL DEFAULT (datetime('now')),
              updated_at       TEXT    NOT NULL DEFAULT (datetime('now')),
              blob             BLOB    NOT NULL
          );

          CREATE INDEX IF NOT EXISTS idx_zstd_key       ON blobs(key);
          CREATE INDEX IF NOT EXISTS idx_zstd_namespace ON blobs(namespace);

          CREATE TABLE IF NOT EXISTS dictionaries (
              id          INTEGER PRIMARY KEY AUTOINCREMENT,
              name        TEXT    NOT NULL UNIQUE,
              namespace   TEXT    NOT NULL,
              dict_blob   BLOB    NOT NULL,
              trained_on  INTEGER NOT NULL DEFAULT 0,
              created_at  TEXT    NOT NULL DEFAULT (datetime('now'))
          );

          CREATE TABLE IF NOT EXISTS write_throughput (
              id            INTEGER PRIMARY KEY AUTOINCREMENT,
              namespace     TEXT    NOT NULL,
              batch_size    INTEGER NOT NULL,
              total_bytes   INTEGER NOT NULL,
              duration_ms   REAL    NOT NULL,
              mb_per_second REAL    NOT NULL,
              recorded_at   TEXT    NOT NULL DEFAULT (datetime('now'))
          );
      """

      def _sha256(data: bytes) -> str:
          return hashlib.sha256(data).hexdigest()

      def _compress_zstd(data: bytes, level: int = 3) -> bytes:
          cctx = zstd.ZstdCompressor(level=level)
          return cctx.compress(data)

      def _decompress_zstd(data: bytes) -> bytes:
          dctx = zstd.ZstdDecompressor()
          return dctx.decompress(data)

      def _put_zstd(db_path, key, namespace, content_type, raw, level=3):
          compressed = _compress_zstd(raw, level)
          sha = _sha256(raw)
          ratio = round(len(raw) / len(compressed), 4) if compressed else 1.0
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT INTO blobs
                      (key, namespace, content_type, sha256,
                       original_bytes, compressed_bytes, compression_ratio,
                       zstd_level, blob)
                  VALUES (?,?,?,?,?,?,?,?,?)
                  ON CONFLICT(key) DO UPDATE SET
                      blob=excluded.blob, sha256=excluded.sha256,
                      original_bytes=excluded.original_bytes,
                      compressed_bytes=excluded.compressed_bytes,
                      compression_ratio=excluded.compression_ratio,
                      updated_at=datetime('now')
              """, (key, namespace, content_type, sha,
                    len(raw), len(compressed), ratio, level,
                    sqlite3.Binary(compressed)))
              conn.commit()
          finally:
              conn.close()
          return {
              "key": key, "original_bytes": len(raw),
              "compressed_bytes": len(compressed), "ratio": ratio,
          }

      def _get_zstd(db_path, key):
          conn = sqlite3.connect(db_path)
          try:
              row = conn.execute("SELECT blob FROM blobs WHERE key=?", (key,)).fetchone()
          finally:
              conn.close()
          return _decompress_zstd(bytes(row[0])) if row else None

      async def put_async(db_path, key, ns, ct, raw, level=3):
          return await asyncio.to_thread(_put_zstd, db_path, key, ns, ct, raw, level)

      async def get_async(db_path, key):
          return await asyncio.to_thread(_get_zstd, db_path, key)

      async def main():
          conn = sqlite3.connect(DB_PATH)
          conn.executescript(SCHEMA)
          conn.commit()
          conn.close()

          import time

          # Build a large synthetic tick-level dataset
          records = []
          base_ts = datetime(2024, 1, 1)
          for symbol in ["SPY", "QQQ", "AAPL", "TSLA", "NVDA", "BTC-USD"]:
              ticks = []
              price = 200.0
              for minute in range(60 * 8):    # 8 hours of 1-minute ticks
                  ts = base_ts + timedelta(minutes=minute)
                  price = max(1.0, price + (hash((symbol, minute)) % 100 - 50) / 1000)
                  ticks.append({
                      "ts": ts.isoformat(),
                      "bid": round(price - 0.01, 4),
                      "ask": round(price + 0.01, 4),
                      "last": round(price, 4),
                      "vol": abs(hash((symbol, minute))) % 10000 + 100,
                  })
              payload = {"symbol": symbol, "interval": "1m", "ticks": ticks}
              raw = json.dumps(payload, separators=(",", ":")).encode()
              records.append((f"tick/{symbol}/1m/2024-01-01", "tick_data",
                               "application/json", raw))

          t0 = time.perf_counter()
          tasks = [put_async(DB_PATH, k, ns, ct, raw) for k, ns, ct, raw in records]
          results = await asyncio.gather(*tasks)
          elapsed_ms = (time.perf_counter() - t0) * 1000

          total_orig = sum(r["original_bytes"] for r in results)
          total_comp = sum(r["compressed_bytes"] for r in results)
          mb_s = (total_orig / 1_048_576) / (elapsed_ms / 1000) if elapsed_ms else 0

          # Log throughput
          tconn = sqlite3.connect(DB_PATH)
          tconn.execute("""
              INSERT INTO write_throughput
                  (namespace, batch_size, total_bytes, duration_ms, mb_per_second)
              VALUES (?,?,?,?,?)
          """, ("tick_data", len(records), total_orig, round(elapsed_ms, 2), round(mb_s, 2)))
          tconn.commit()
          tconn.close()

          print(
              f"[zstd store] {len(results)} blobs written  "
              f"| original={total_orig:,} B  compressed={total_comp:,} B  "
              f"| ratio={round(total_orig/total_comp,4) if total_comp else 1}x  "
              f"| throughput={round(mb_s,2)} MB/s"
          )

          for k, ns, ct, raw in records[:2]:
              recovered = await get_async(DB_PATH, k)
              assert recovered == raw, f"zstd round-trip mismatch: {k}"
          print("[zstd store] round-trip validation passed ✓")

      asyncio.run(main())
      PYEOF

