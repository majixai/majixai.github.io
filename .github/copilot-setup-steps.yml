  - name: Validate all databases (async integrity checks)
    run: |
      python - <<'PYEOF'
      """
      Runs PRAGMA integrity_check and PRAGMA foreign_key_check on every
      SQLite database created during setup. Failures are collected and
      reported before raising a final exception to fail the step.
      All checks run concurrently via asyncio.gather.
      """
      import asyncio
      import os
      import sqlite3

      DBS = [
          "links.db",
          "blog.db",
          "texas_holdem.db",
          "analytics.db",
          "market_cache.db",
          "chat.db",
          "hotel_booking.db",
          "yfinance_cache.db",
          "compressed_store_gzip.db",
          "compressed_store_lzma.db",
          "compressed_store_zlib.db",
          "compressed_store_zstd.db",
          "compressed_store_lz4.db",
          "compressed_store_brotli.db",
          "compression_benchmark.db",
          os.path.join("best", "image_cache.db"),
      ]

      def _check_db(db_path: str) -> dict:
          if not os.path.exists(db_path):
              return {"path": db_path, "status": "MISSING", "errors": []}
          conn = sqlite3.connect(db_path)
          try:
              ic = conn.execute("PRAGMA integrity_check").fetchall()
              fk = conn.execute("PRAGMA foreign_key_check").fetchall()
              tbl_count = conn.execute(
                  "SELECT COUNT(*) FROM sqlite_master WHERE type='table'"
              ).fetchone()[0]
              size_kb = os.path.getsize(db_path) // 1024
          finally:
              conn.close()

          errors = []
          if ic != [("ok",)]:
              errors.append(f"integrity_check: {ic}")
          if fk:
              errors.append(f"foreign_key violations: {fk}")

          return {
              "path": db_path,
              "status": "OK" if not errors else "FAIL",
              "tables": tbl_count,
              "size_kb": size_kb,
              "errors": errors,
          }

      async def check_db_async(db_path: str) -> dict:
          return await asyncio.to_thread(_check_db, db_path)

      async def main():
          tasks   = [check_db_async(p) for p in DBS]
          results = await asyncio.gather(*tasks)

          print(f"\n{'DB PATH':<48} {'STATUS':<8} {'TABLES':>6} {'SIZE KB':>8}")
          print("-" * 76)
          failures = []
          for r in results:
              status = r["status"]
              tables = r.get("tables", "-")
              size   = r.get("size_kb", "-")
              print(f"{r['path']:<48} {status:<8} {str(tables):>6} {str(size):>8}")
              if r["errors"]:
                  for err in r["errors"]:
                      print(f"  !! {err}")
                  failures.append(r["path"])

          print()
          if failures:
              raise RuntimeError(
                  f"{len(failures)} database(s) failed integrity check: {failures}"
              )
          print(f"All {len(results)} databases passed integrity check ✓")

      asyncio.run(main())
      PYEOF

