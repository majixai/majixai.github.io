  - name: Create and populate lz4 compressed SQLite blob store
    run: |
      python - <<'PYEOF'
      """
      LZ4-backed compressed blob store.
      LZ4 is the fastest compressor available and is preferred for
      latency-sensitive caches such as real-time WebSocket message buffers
      and sub-second API response caches.
      """
      import asyncio
      import hashlib
      import json
      import os
      import sqlite3
      import lz4.frame
      import lz4.block
      from datetime import datetime, timedelta

      DB_PATH = "compressed_store_lz4.db"

      SCHEMA = """
          PRAGMA journal_mode=WAL;
          PRAGMA synchronous=NORMAL;

          CREATE TABLE IF NOT EXISTS blobs (
              id               INTEGER PRIMARY KEY AUTOINCREMENT,
              key              TEXT    NOT NULL UNIQUE,
              namespace        TEXT    NOT NULL DEFAULT 'default',
              content_type     TEXT    NOT NULL DEFAULT 'application/octet-stream',
              sha256           TEXT    NOT NULL,
              original_bytes   INTEGER NOT NULL,
              compressed_bytes INTEGER NOT NULL,
              compression_ratio REAL   NOT NULL,
              lz4_mode         TEXT    NOT NULL DEFAULT 'frame',
              created_at       TEXT    NOT NULL DEFAULT (datetime('now')),
              blob             BLOB    NOT NULL
          );

          CREATE INDEX IF NOT EXISTS idx_lz4_key       ON blobs(key);
          CREATE INDEX IF NOT EXISTS idx_lz4_namespace ON blobs(namespace);

          CREATE TABLE IF NOT EXISTS latency_samples (
              id             INTEGER PRIMARY KEY AUTOINCREMENT,
              operation      TEXT    NOT NULL,
              blob_key       TEXT    NOT NULL,
              blob_bytes     INTEGER NOT NULL,
              duration_us    REAL    NOT NULL,
              recorded_at    TEXT    NOT NULL DEFAULT (datetime('now'))
          );
      """

      def _sha256(data: bytes) -> str:
          return hashlib.sha256(data).hexdigest()

      def _compress_lz4(data: bytes) -> bytes:
          return lz4.frame.compress(data, compression_level=lz4.frame.COMPRESSIONLEVEL_MINHC)

      def _decompress_lz4(data: bytes) -> bytes:
          return lz4.frame.decompress(data)

      def _put_lz4(db_path, key, namespace, content_type, raw):
          import time
          t0 = time.perf_counter()
          compressed = _compress_lz4(raw)
          compress_us = (time.perf_counter() - t0) * 1e6
          sha = _sha256(raw)
          ratio = round(len(raw) / len(compressed), 4) if compressed else 1.0
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT INTO blobs
                      (key, namespace, content_type, sha256,
                       original_bytes, compressed_bytes, compression_ratio, blob)
                  VALUES (?,?,?,?,?,?,?,?)
                  ON CONFLICT(key) DO UPDATE SET
                      blob=excluded.blob, sha256=excluded.sha256,
                      original_bytes=excluded.original_bytes,
                      compressed_bytes=excluded.compressed_bytes,
                      compression_ratio=excluded.compression_ratio
              """, (key, namespace, content_type, sha,
                    len(raw), len(compressed), ratio,
                    sqlite3.Binary(compressed)))
              conn.execute("""
                  INSERT INTO latency_samples (operation, blob_key, blob_bytes, duration_us)
                  VALUES ('compress', ?, ?, ?)
              """, (key, len(raw), round(compress_us, 2)))
              conn.commit()
          finally:
              conn.close()
          return {"key": key, "original_bytes": len(raw),
                  "compressed_bytes": len(compressed), "ratio": ratio,
                  "compress_us": compress_us}

      def _get_lz4(db_path, key):
          import time
          conn = sqlite3.connect(db_path)
          try:
              row = conn.execute("SELECT blob FROM blobs WHERE key=?", (key,)).fetchone()
          finally:
              conn.close()
          if not row:
              return None
          t0 = time.perf_counter()
          data = _decompress_lz4(bytes(row[0]))
          decomp_us = (time.perf_counter() - t0) * 1e6
          return data

      async def put_async(db_path, key, ns, ct, raw):
          return await asyncio.to_thread(_put_lz4, db_path, key, ns, ct, raw)

      async def get_async(db_path, key):
          return await asyncio.to_thread(_get_lz4, db_path, key)

      async def main():
          conn = sqlite3.connect(DB_PATH)
          conn.executescript(SCHEMA)
          conn.commit()
          conn.close()

          # WebSocket message payloads (small, latency-critical)
          ws_records = []
          for i in range(200):
              msg = {
                  "id": i,
                  "type": ["quote", "trade", "orderbook", "news"][i % 4],
                  "symbol": ["SPY", "QQQ", "BTC-USD", "AAPL"][i % 4],
                  "ts": (datetime(2024, 1, 1) + timedelta(seconds=i)).isoformat(),
                  "payload": {
                      "bid": round(100 + i * 0.01, 4),
                      "ask": round(100 + i * 0.01 + 0.02, 4),
                      "size": i * 100,
                  },
              }
              raw = json.dumps(msg, separators=(",", ":")).encode()
              ws_records.append((f"ws/msg/{i:04d}", "websocket", "application/json", raw))

          tasks = [put_async(DB_PATH, k, ns, ct, raw) for k, ns, ct, raw in ws_records]
          results = await asyncio.gather(*tasks)

          total_orig = sum(r["original_bytes"] for r in results)
          total_comp = sum(r["compressed_bytes"] for r in results)
          avg_us = sum(r["compress_us"] for r in results) / len(results)
          print(
              f"[lz4 store]  {len(results)} blobs written  "
              f"| original={total_orig:,} B  compressed={total_comp:,} B  "
              f"| ratio={round(total_orig/total_comp,4) if total_comp else 1}x  "
              f"| avg compress={round(avg_us,1)} µs/blob"
          )

          for k, ns, ct, raw in ws_records[:3]:
              recovered = await get_async(DB_PATH, k)
              assert recovered == raw, f"lz4 round-trip mismatch: {k}"
          print("[lz4 store]  round-trip validation passed ✓")

      asyncio.run(main())
      PYEOF

