steps:

  # ================================================================
  # SECTION 1 — PYTHON ENVIRONMENT
  # ================================================================

  - name: Set up Python 3.11
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'
      cache: 'pip'

  - name: Upgrade pip, setuptools and wheel
    run: |
      python -m pip install --upgrade pip setuptools wheel

  - name: Install async I/O and concurrency packages
    run: |
      pip install \
        aiosqlite>=0.19.0 \
        aiohttp>=3.9.0 \
        aiofiles>=23.2.0 \
        anyio>=4.3.0 \
        uvloop>=0.19.0

  - name: Install compression libraries
    run: |
      pip install \
        brotli>=1.1.0 \
        zstandard>=0.22.0 \
        lz4>=4.3.0

  - name: Install main project Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Install flask_app dependencies
    run: pip install -r flask_app/requirements.txt

  - name: Install market_prediction dependencies
    run: pip install -r market_prediction/requirements.txt

  - name: Install hotel_booking_app dependencies
    run: pip install -r hotel_booking_app/requirements.txt

  - name: Install hotel_reservation_system dependencies
    run: pip install -r hotel_reservation_system/requirements.txt

  - name: Install simple_flask_app dependencies
    run: pip install -r simple_flask_app/requirements.txt

  - name: Install visa_api dependencies
    run: pip install -r visa_api/requirements.txt

  - name: Install google_analytics dependencies
    run: pip install -r google_analytics/requirements.txt

  - name: Install yfinance_data dependencies
    run: pip install -r yfinance_data/requirements.txt

  - name: Install chat_server dependencies
    run: pip install -r chat_server/requirements.txt

  - name: Install sp_closing_projection dependencies
    run: pip install -r sp_closing_projection/requirements.txt

  - name: Install development and testing tools
    run: |
      pip install \
        flake8>=7.0.0 \
        black>=24.0.0 \
        mypy>=1.8.0 \
        isort>=5.13.0 \
        pytest>=8.0.0 \
        pytest-asyncio>=0.23.0 \
        pytest-cov>=4.1.0

  # ================================================================
  # SECTION 2 — NODE.JS ENVIRONMENT
  # ================================================================

  - name: Set up Node.js 20
    uses: actions/setup-node@v4
    with:
      node-version: '20'
      cache: 'npm'

  - name: Install Node.js dependencies
    run: npm ci

  # ================================================================
  # SECTION 3 — SYSTEM-LEVEL TOOLING
  # ================================================================

  - name: Install system compression and database utilities
    run: |
      sudo apt-get update -qq
      sudo apt-get install -y --no-install-recommends \
        sqlite3 \
        libsqlite3-dev \
        zlib1g-dev \
        liblzma-dev \
        libbz2-dev \
        libzstd-dev \
        liblz4-dev \
        libbrotli-dev

  # ================================================================
  # SECTION 4 — ASYNC DATABASE SCHEMA INITIALIZATION
  # ================================================================

  - name: Initialize links database (async)
    run: |
      python - <<'PYEOF'
      import asyncio
      import aiosqlite
      import os

      DB_PATH = "links.db"

      async def init_links_db():
          async with aiosqlite.connect(DB_PATH) as db:
              await db.executescript("""
                  PRAGMA journal_mode=WAL;
                  PRAGMA synchronous=NORMAL;
                  PRAGMA cache_size=-32000;
                  PRAGMA temp_store=MEMORY;

                  CREATE TABLE IF NOT EXISTS links (
                      id        INTEGER PRIMARY KEY AUTOINCREMENT,
                      text      TEXT    NOT NULL,
                      url       TEXT    NOT NULL UNIQUE,
                      click_count INTEGER NOT NULL DEFAULT 0,
                      created_at  TEXT  NOT NULL DEFAULT (datetime('now')),
                      updated_at  TEXT  NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_links_url   ON links(url);
                  CREATE INDEX IF NOT EXISTS idx_links_clicks ON links(click_count DESC);

                  CREATE TABLE IF NOT EXISTS link_events (
                      id         INTEGER PRIMARY KEY AUTOINCREMENT,
                      link_id    INTEGER NOT NULL REFERENCES links(id) ON DELETE CASCADE,
                      event_type TEXT    NOT NULL DEFAULT 'click',
                      user_agent TEXT,
                      ip_hash    TEXT,
                      occurred_at TEXT NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_events_link ON link_events(link_id);
                  CREATE INDEX IF NOT EXISTS idx_events_time ON link_events(occurred_at);

                  CREATE TABLE IF NOT EXISTS link_tags (
                      link_id INTEGER NOT NULL REFERENCES links(id) ON DELETE CASCADE,
                      tag     TEXT    NOT NULL,
                      PRIMARY KEY (link_id, tag)
                  );
              """)
              await db.commit()
              print(f"[links.db] schema initialised at {os.path.abspath(DB_PATH)}")

      asyncio.run(init_links_db())
      PYEOF

  - name: Initialize blog database (async)
    run: |
      python - <<'PYEOF'
      import asyncio
      import aiosqlite
      import os

      DB_PATH = "blog.db"

      async def init_blog_db():
          async with aiosqlite.connect(DB_PATH) as db:
              await db.executescript("""
                  PRAGMA journal_mode=WAL;
                  PRAGMA synchronous=NORMAL;
                  PRAGMA cache_size=-64000;
                  PRAGMA temp_store=MEMORY;

                  CREATE TABLE IF NOT EXISTS posts (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      title       TEXT    NOT NULL,
                      slug        TEXT    NOT NULL UNIQUE,
                      body        TEXT    NOT NULL DEFAULT '',
                      summary     TEXT    NOT NULL DEFAULT '',
                      author      TEXT    NOT NULL DEFAULT 'admin',
                      published   INTEGER NOT NULL DEFAULT 0,
                      view_count  INTEGER NOT NULL DEFAULT 0,
                      created_at  TEXT    NOT NULL DEFAULT (datetime('now')),
                      updated_at  TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_posts_slug      ON posts(slug);
                  CREATE INDEX IF NOT EXISTS idx_posts_published ON posts(published);
                  CREATE INDEX IF NOT EXISTS idx_posts_author    ON posts(author);

                  CREATE TABLE IF NOT EXISTS comments (
                      id         INTEGER PRIMARY KEY AUTOINCREMENT,
                      post_id    INTEGER NOT NULL REFERENCES posts(id) ON DELETE CASCADE,
                      author     TEXT    NOT NULL DEFAULT 'anonymous',
                      body       TEXT    NOT NULL,
                      approved   INTEGER NOT NULL DEFAULT 0,
                      created_at TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_comments_post ON comments(post_id);

                  CREATE TABLE IF NOT EXISTS categories (
                      id   INTEGER PRIMARY KEY AUTOINCREMENT,
                      name TEXT NOT NULL UNIQUE,
                      slug TEXT NOT NULL UNIQUE
                  );

                  CREATE TABLE IF NOT EXISTS post_categories (
                      post_id     INTEGER NOT NULL REFERENCES posts(id)       ON DELETE CASCADE,
                      category_id INTEGER NOT NULL REFERENCES categories(id)  ON DELETE CASCADE,
                      PRIMARY KEY (post_id, category_id)
                  );

                  CREATE TABLE IF NOT EXISTS tags (
                      id   INTEGER PRIMARY KEY AUTOINCREMENT,
                      name TEXT NOT NULL UNIQUE
                  );

                  CREATE TABLE IF NOT EXISTS post_tags (
                      post_id INTEGER NOT NULL REFERENCES posts(id) ON DELETE CASCADE,
                      tag_id  INTEGER NOT NULL REFERENCES tags(id)  ON DELETE CASCADE,
                      PRIMARY KEY (post_id, tag_id)
                  );
              """)
              await db.commit()
              print(f"[blog.db] schema initialised at {os.path.abspath(DB_PATH)}")

      asyncio.run(init_blog_db())
      PYEOF

  - name: Initialize texas_holdem database (async)
    run: |
      python - <<'PYEOF'
      import asyncio
      import aiosqlite
      import os

      DB_PATH = "texas_holdem.db"

      async def init_holdem_db():
          async with aiosqlite.connect(DB_PATH) as db:
              await db.executescript("""
                  PRAGMA journal_mode=WAL;
                  PRAGMA synchronous=NORMAL;
                  PRAGMA cache_size=-32000;

                  CREATE TABLE IF NOT EXISTS players (
                      id         INTEGER PRIMARY KEY AUTOINCREMENT,
                      username   TEXT    NOT NULL UNIQUE,
                      chips      INTEGER NOT NULL DEFAULT 1000,
                      wins       INTEGER NOT NULL DEFAULT 0,
                      losses     INTEGER NOT NULL DEFAULT 0,
                      hands_played INTEGER NOT NULL DEFAULT 0,
                      created_at TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_players_username ON players(username);
                  CREATE INDEX IF NOT EXISTS idx_players_chips    ON players(chips DESC);

                  CREATE TABLE IF NOT EXISTS games (
                      id         INTEGER PRIMARY KEY AUTOINCREMENT,
                      state      TEXT    NOT NULL DEFAULT 'waiting',
                      pot        INTEGER NOT NULL DEFAULT 0,
                      community_cards TEXT NOT NULL DEFAULT '[]',
                      created_at TEXT    NOT NULL DEFAULT (datetime('now')),
                      ended_at   TEXT
                  );

                  CREATE TABLE IF NOT EXISTS game_players (
                      game_id   INTEGER NOT NULL REFERENCES games(id)   ON DELETE CASCADE,
                      player_id INTEGER NOT NULL REFERENCES players(id) ON DELETE CASCADE,
                      hole_cards TEXT    NOT NULL DEFAULT '[]',
                      bet       INTEGER NOT NULL DEFAULT 0,
                      folded    INTEGER NOT NULL DEFAULT 0,
                      position  INTEGER NOT NULL DEFAULT 0,
                      PRIMARY KEY (game_id, player_id)
                  );

                  CREATE TABLE IF NOT EXISTS hand_history (
                      id         INTEGER PRIMARY KEY AUTOINCREMENT,
                      game_id    INTEGER NOT NULL REFERENCES games(id),
                      player_id  INTEGER NOT NULL REFERENCES players(id),
                      action     TEXT    NOT NULL,
                      amount     INTEGER NOT NULL DEFAULT 0,
                      phase      TEXT    NOT NULL DEFAULT 'preflop',
                      occurred_at TEXT   NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_history_game   ON hand_history(game_id);
                  CREATE INDEX IF NOT EXISTS idx_history_player ON hand_history(player_id);
              """)
              await db.commit()
              print(f"[texas_holdem.db] schema ready at {os.path.abspath(DB_PATH)}")

      asyncio.run(init_holdem_db())
      PYEOF

  - name: Initialize analytics events database (async)
    run: |
      python - <<'PYEOF'
      import asyncio
      import aiosqlite
      import os

      DB_PATH = "analytics.db"

      async def init_analytics_db():
          async with aiosqlite.connect(DB_PATH) as db:
              await db.executescript("""
                  PRAGMA journal_mode=WAL;
                  PRAGMA synchronous=NORMAL;
                  PRAGMA cache_size=-64000;
                  PRAGMA temp_store=MEMORY;

                  CREATE TABLE IF NOT EXISTS events (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      session_id  TEXT    NOT NULL,
                      event_type  TEXT    NOT NULL,
                      page        TEXT    NOT NULL DEFAULT '/',
                      referrer    TEXT,
                      user_agent  TEXT,
                      ip_hash     TEXT,
                      duration_ms INTEGER,
                      metadata    TEXT    NOT NULL DEFAULT '{}',
                      occurred_at TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_events_session  ON events(session_id);
                  CREATE INDEX IF NOT EXISTS idx_events_type     ON events(event_type);
                  CREATE INDEX IF NOT EXISTS idx_events_page     ON events(page);
                  CREATE INDEX IF NOT EXISTS idx_events_time     ON events(occurred_at);

                  CREATE TABLE IF NOT EXISTS sessions (
                      id          TEXT    PRIMARY KEY,
                      first_seen  TEXT    NOT NULL DEFAULT (datetime('now')),
                      last_seen   TEXT    NOT NULL DEFAULT (datetime('now')),
                      page_views  INTEGER NOT NULL DEFAULT 0,
                      events_count INTEGER NOT NULL DEFAULT 0
                  );

                  CREATE TABLE IF NOT EXISTS click_data (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      element_id  TEXT,
                      element_class TEXT,
                      page        TEXT    NOT NULL DEFAULT '/',
                      x_pos       REAL,
                      y_pos       REAL,
                      session_id  TEXT,
                      occurred_at TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_click_page    ON click_data(page);
                  CREATE INDEX IF NOT EXISTS idx_click_session ON click_data(session_id);

                  CREATE TABLE IF NOT EXISTS page_performance (
                      id              INTEGER PRIMARY KEY AUTOINCREMENT,
                      page            TEXT    NOT NULL,
                      load_time_ms    INTEGER,
                      ttfb_ms         INTEGER,
                      fcp_ms          INTEGER,
                      lcp_ms          INTEGER,
                      cls_score       REAL,
                      session_id      TEXT,
                      occurred_at     TEXT    NOT NULL DEFAULT (datetime('now'))
                  );
              """)
              await db.commit()
              print(f"[analytics.db] schema initialised at {os.path.abspath(DB_PATH)}")

      asyncio.run(init_analytics_db())
      PYEOF

  - name: Initialize market data cache database (async)
    run: |
      python - <<'PYEOF'
      import asyncio
      import aiosqlite
      import os

      DB_PATH = "market_cache.db"

      async def init_market_db():
          async with aiosqlite.connect(DB_PATH) as db:
              await db.executescript("""
                  PRAGMA journal_mode=WAL;
                  PRAGMA synchronous=NORMAL;
                  PRAGMA cache_size=-128000;
                  PRAGMA temp_store=MEMORY;
                  PRAGMA mmap_size=268435456;

                  CREATE TABLE IF NOT EXISTS tickers (
                      symbol      TEXT    PRIMARY KEY,
                      name        TEXT,
                      sector      TEXT,
                      industry    TEXT,
                      market_cap  REAL,
                      currency    TEXT    NOT NULL DEFAULT 'USD',
                      exchange    TEXT,
                      updated_at  TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE TABLE IF NOT EXISTS ohlcv (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      symbol      TEXT    NOT NULL REFERENCES tickers(symbol) ON DELETE CASCADE,
                      interval    TEXT    NOT NULL DEFAULT '1d',
                      ts          TEXT    NOT NULL,
                      open        REAL    NOT NULL,
                      high        REAL    NOT NULL,
                      low         REAL    NOT NULL,
                      close       REAL    NOT NULL,
                      volume      INTEGER NOT NULL DEFAULT 0,
                      adj_close   REAL,
                      UNIQUE (symbol, interval, ts)
                  );

                  CREATE INDEX IF NOT EXISTS idx_ohlcv_symbol   ON ohlcv(symbol);
                  CREATE INDEX IF NOT EXISTS idx_ohlcv_interval ON ohlcv(symbol, interval);
                  CREATE INDEX IF NOT EXISTS idx_ohlcv_ts       ON ohlcv(ts DESC);

                  CREATE TABLE IF NOT EXISTS indicators (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      symbol      TEXT    NOT NULL,
                      interval    TEXT    NOT NULL DEFAULT '1d',
                      ts          TEXT    NOT NULL,
                      indicator   TEXT    NOT NULL,
                      value       REAL    NOT NULL,
                      UNIQUE (symbol, interval, ts, indicator)
                  );

                  CREATE INDEX IF NOT EXISTS idx_indicators_symbol ON indicators(symbol, indicator);

                  CREATE TABLE IF NOT EXISTS predictions (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      symbol      TEXT    NOT NULL,
                      model       TEXT    NOT NULL,
                      horizon     INTEGER NOT NULL DEFAULT 5,
                      predicted_at TEXT   NOT NULL DEFAULT (datetime('now')),
                      target_date TEXT,
                      predicted_close REAL,
                      confidence  REAL,
                      metadata    TEXT    NOT NULL DEFAULT '{}'
                  );

                  CREATE INDEX IF NOT EXISTS idx_predictions_symbol ON predictions(symbol, model);

                  CREATE TABLE IF NOT EXISTS monte_carlo_runs (
                      id              INTEGER PRIMARY KEY AUTOINCREMENT,
                      symbol          TEXT    NOT NULL,
                      simulations     INTEGER NOT NULL DEFAULT 10000,
                      horizon_days    INTEGER NOT NULL DEFAULT 252,
                      mean_return     REAL,
                      std_dev         REAL,
                      var_95          REAL,
                      var_99          REAL,
                      cvar_95         REAL,
                      sharpe_ratio    REAL,
                      max_drawdown    REAL,
                      ran_at          TEXT    NOT NULL DEFAULT (datetime('now'))
                  );
              """)

              # Pre-seed ticker list with canonical index symbols
              symbols = [
                  ("SPY",  "SPDR S&P 500 ETF",      "ETF",        "Index Fund",  None, "USD", "ARCA"),
                  ("QQQ",  "Invesco QQQ Trust",      "ETF",        "Index Fund",  None, "USD", "NASDAQ"),
                  ("DIA",  "SPDR Dow Jones ETF",     "ETF",        "Index Fund",  None, "USD", "ARCA"),
                  ("IWM",  "iShares Russell 2000",   "ETF",        "Index Fund",  None, "USD", "ARCA"),
                  ("GLD",  "SPDR Gold Shares",       "Commodity",  "Gold",        None, "USD", "ARCA"),
                  ("TLT",  "iShares 20+ Yr Treasury","Fixed Income","Bonds",      None, "USD", "NASDAQ"),
                  ("VIX",  "CBOE Volatility Index",  "Index",      "Volatility",  None, "USD", "CBOE"),
                  ("BTC-USD","Bitcoin USD",          "Crypto",     "Digital Asset",None,"USD", "CCC"),
                  ("ETH-USD","Ethereum USD",         "Crypto",     "Digital Asset",None,"USD", "CCC"),
                  ("AAPL", "Apple Inc.",             "Technology", "Consumer Electronics",None,"USD","NASDAQ"),
                  ("MSFT", "Microsoft Corp.",        "Technology", "Software",    None, "USD", "NASDAQ"),
                  ("GOOGL","Alphabet Inc.",          "Technology", "Internet",    None, "USD", "NASDAQ"),
                  ("AMZN", "Amazon.com Inc.",        "Consumer",   "E-Commerce",  None, "USD", "NASDAQ"),
                  ("TSLA", "Tesla Inc.",             "Consumer",   "Auto",        None, "USD", "NASDAQ"),
                  ("NVDA", "NVIDIA Corp.",           "Technology", "Semiconductors",None,"USD","NASDAQ"),
                  ("META", "Meta Platforms Inc.",    "Technology", "Social Media",None, "USD", "NASDAQ"),
              ]
              await db.executemany(
                  """INSERT OR IGNORE INTO tickers
                     (symbol, name, sector, industry, market_cap, currency, exchange)
                     VALUES (?,?,?,?,?,?,?)""",
                  symbols,
              )
              await db.commit()
              print(f"[market_cache.db] initialised with {len(symbols)} tickers at {os.path.abspath(DB_PATH)}")

      asyncio.run(init_market_db())
      PYEOF

  - name: Initialize chat server database (async)
    run: |
      python - <<'PYEOF'
      import asyncio
      import aiosqlite
      import os

      DB_PATH = "chat.db"

      async def init_chat_db():
          async with aiosqlite.connect(DB_PATH) as db:
              await db.executescript("""
                  PRAGMA journal_mode=WAL;
                  PRAGMA synchronous=NORMAL;
                  PRAGMA cache_size=-32000;

                  CREATE TABLE IF NOT EXISTS users (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      username    TEXT    NOT NULL UNIQUE,
                      password_hash TEXT,
                      display_name TEXT,
                      avatar_url  TEXT,
                      status      TEXT    NOT NULL DEFAULT 'offline',
                      last_seen   TEXT    NOT NULL DEFAULT (datetime('now')),
                      created_at  TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_users_username ON users(username);
                  CREATE INDEX IF NOT EXISTS idx_users_status   ON users(status);

                  CREATE TABLE IF NOT EXISTS rooms (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      name        TEXT    NOT NULL UNIQUE,
                      topic       TEXT,
                      is_private  INTEGER NOT NULL DEFAULT 0,
                      created_by  INTEGER REFERENCES users(id),
                      created_at  TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE TABLE IF NOT EXISTS room_members (
                      room_id     INTEGER NOT NULL REFERENCES rooms(id)  ON DELETE CASCADE,
                      user_id     INTEGER NOT NULL REFERENCES users(id)  ON DELETE CASCADE,
                      role        TEXT    NOT NULL DEFAULT 'member',
                      joined_at   TEXT    NOT NULL DEFAULT (datetime('now')),
                      PRIMARY KEY (room_id, user_id)
                  );

                  CREATE TABLE IF NOT EXISTS messages (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      room_id     INTEGER NOT NULL REFERENCES rooms(id) ON DELETE CASCADE,
                      user_id     INTEGER NOT NULL REFERENCES users(id),
                      body        TEXT    NOT NULL,
                      msg_type    TEXT    NOT NULL DEFAULT 'text',
                      is_deleted  INTEGER NOT NULL DEFAULT 0,
                      edited_at   TEXT,
                      sent_at     TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_messages_room ON messages(room_id, sent_at DESC);
                  CREATE INDEX IF NOT EXISTS idx_messages_user ON messages(user_id);

                  CREATE TABLE IF NOT EXISTS direct_messages (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      from_user   INTEGER NOT NULL REFERENCES users(id),
                      to_user     INTEGER NOT NULL REFERENCES users(id),
                      body        TEXT    NOT NULL,
                      read_at     TEXT,
                      sent_at     TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_dm_from ON direct_messages(from_user);
                  CREATE INDEX IF NOT EXISTS idx_dm_to   ON direct_messages(to_user);

                  INSERT OR IGNORE INTO rooms (name, topic) VALUES
                      ('general',  'General discussion'),
                      ('market',   'Market data and trading signals'),
                      ('dev',      'Development and code'),
                      ('offtopic', 'Off-topic conversations');
              """)
              await db.commit()
              print(f"[chat.db] schema initialised at {os.path.abspath(DB_PATH)}")

      asyncio.run(init_chat_db())
      PYEOF

  - name: Initialize hotel booking database (async)
    run: |
      python - <<'PYEOF'
      import asyncio
      import aiosqlite
      import os

      DB_PATH = "hotel_booking.db"

      async def init_hotel_db():
          async with aiosqlite.connect(DB_PATH) as db:
              await db.executescript("""
                  PRAGMA journal_mode=WAL;
                  PRAGMA synchronous=NORMAL;

                  CREATE TABLE IF NOT EXISTS hotels (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      name        TEXT    NOT NULL,
                      address     TEXT,
                      city        TEXT,
                      country     TEXT    NOT NULL DEFAULT 'US',
                      star_rating INTEGER NOT NULL DEFAULT 3,
                      amenities   TEXT    NOT NULL DEFAULT '[]',
                      created_at  TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE TABLE IF NOT EXISTS room_types (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      hotel_id    INTEGER NOT NULL REFERENCES hotels(id) ON DELETE CASCADE,
                      name        TEXT    NOT NULL,
                      description TEXT,
                      capacity    INTEGER NOT NULL DEFAULT 2,
                      base_price  REAL    NOT NULL DEFAULT 100.0,
                      total_rooms INTEGER NOT NULL DEFAULT 10
                  );

                  CREATE TABLE IF NOT EXISTS reservations (
                      id              INTEGER PRIMARY KEY AUTOINCREMENT,
                      hotel_id        INTEGER NOT NULL REFERENCES hotels(id),
                      room_type_id    INTEGER NOT NULL REFERENCES room_types(id),
                      guest_name      TEXT    NOT NULL,
                      guest_email     TEXT,
                      guest_phone     TEXT,
                      check_in        TEXT    NOT NULL,
                      check_out       TEXT    NOT NULL,
                      adults          INTEGER NOT NULL DEFAULT 1,
                      children        INTEGER NOT NULL DEFAULT 0,
                      total_price     REAL    NOT NULL DEFAULT 0.0,
                      status          TEXT    NOT NULL DEFAULT 'pending',
                      confirmation_no TEXT    UNIQUE,
                      created_at      TEXT    NOT NULL DEFAULT (datetime('now'))
                  );

                  CREATE INDEX IF NOT EXISTS idx_reservations_hotel  ON reservations(hotel_id);
                  CREATE INDEX IF NOT EXISTS idx_reservations_dates  ON reservations(check_in, check_out);
                  CREATE INDEX IF NOT EXISTS idx_reservations_status ON reservations(status);
                  CREATE INDEX IF NOT EXISTS idx_reservations_guest  ON reservations(guest_email);

                  CREATE TABLE IF NOT EXISTS reviews (
                      id           INTEGER PRIMARY KEY AUTOINCREMENT,
                      reservation_id INTEGER NOT NULL REFERENCES reservations(id),
                      rating       INTEGER NOT NULL CHECK(rating BETWEEN 1 AND 5),
                      title        TEXT,
                      body         TEXT,
                      created_at   TEXT    NOT NULL DEFAULT (datetime('now'))
                  );
              """)
              await db.commit()
              print(f"[hotel_booking.db] schema initialised at {os.path.abspath(DB_PATH)}")

      asyncio.run(init_hotel_db())
      PYEOF

  - name: Initialize yfinance symbol cache database (async)
    run: |
      python - <<'PYEOF'
      import asyncio
      import aiosqlite
      import json
      import os

      DB_PATH = "yfinance_cache.db"

      async def init_yfinance_db():
          async with aiosqlite.connect(DB_PATH) as db:
              await db.executescript("""
                  PRAGMA journal_mode=WAL;
                  PRAGMA synchronous=NORMAL;
                  PRAGMA cache_size=-128000;
                  PRAGMA mmap_size=536870912;

                  CREATE TABLE IF NOT EXISTS raw_data (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      symbol      TEXT    NOT NULL,
                      interval    TEXT    NOT NULL DEFAULT '1d',
                      period      TEXT    NOT NULL DEFAULT '1y',
                      fetched_at  TEXT    NOT NULL DEFAULT (datetime('now')),
                      row_count   INTEGER NOT NULL DEFAULT 0,
                      csv_data    TEXT    NOT NULL DEFAULT ''
                  );

                  CREATE INDEX IF NOT EXISTS idx_raw_symbol   ON raw_data(symbol, interval);
                  CREATE INDEX IF NOT EXISTS idx_raw_fetched  ON raw_data(fetched_at DESC);

                  CREATE TABLE IF NOT EXISTS compressed_blobs (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      symbol      TEXT    NOT NULL,
                      interval    TEXT    NOT NULL DEFAULT '1d',
                      codec       TEXT    NOT NULL DEFAULT 'gzip',
                      fetched_at  TEXT    NOT NULL DEFAULT (datetime('now')),
                      original_bytes  INTEGER NOT NULL DEFAULT 0,
                      compressed_bytes INTEGER NOT NULL DEFAULT 0,
                      compression_ratio REAL   NOT NULL DEFAULT 1.0,
                      blob        BLOB    NOT NULL,
                      UNIQUE (symbol, interval, codec)
                  );

                  CREATE INDEX IF NOT EXISTS idx_blobs_symbol ON compressed_blobs(symbol);
                  CREATE INDEX IF NOT EXISTS idx_blobs_codec  ON compressed_blobs(codec);

                  CREATE TABLE IF NOT EXISTS fetch_log (
                      id          INTEGER PRIMARY KEY AUTOINCREMENT,
                      symbol      TEXT    NOT NULL,
                      status      TEXT    NOT NULL DEFAULT 'ok',
                      error_msg   TEXT,
                      duration_ms INTEGER,
                      logged_at   TEXT    NOT NULL DEFAULT (datetime('now'))
                  );
              """)
              await db.commit()
              print(f"[yfinance_cache.db] initialised at {os.path.abspath(DB_PATH)}")

      asyncio.run(init_yfinance_db())
      PYEOF

  # ================================================================
