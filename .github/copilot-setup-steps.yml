  - name: Set up compressed image blob database (async)
    run: |
      python - <<'PYEOF'
      """
      Replicates the best/compressed_image_db_pipeline.py database schema
      used in production for the best-performer image cache.
      Creates the schema and populates with synthetic stub records so
      Copilot Workspace has a warm database ready on first run.
      """
      import asyncio
      import base64
      import gzip
      import hashlib
      import json
      import os
      import sqlite3
      import zlib
      from datetime import datetime

      DB_PATH = os.path.join("best", "image_cache.db")
      os.makedirs("best", exist_ok=True)

      SCHEMA = """
          PRAGMA journal_mode=WAL;
          PRAGMA synchronous=NORMAL;
          PRAGMA cache_size=-128000;
          PRAGMA mmap_size=268435456;

          CREATE TABLE IF NOT EXISTS images (
              id               INTEGER PRIMARY KEY AUTOINCREMENT,
              url_hash         TEXT    NOT NULL UNIQUE,
              source_url       TEXT    NOT NULL,
              content_type     TEXT    NOT NULL DEFAULT 'image/jpeg',
              original_bytes   INTEGER NOT NULL DEFAULT 0,
              compressed_bytes INTEGER NOT NULL DEFAULT 0,
              compression_ratio REAL   NOT NULL DEFAULT 1.0,
              codec            TEXT    NOT NULL DEFAULT 'gzip',
              width            INTEGER,
              height           INTEGER,
              fetched_at       TEXT    NOT NULL DEFAULT (datetime('now')),
              blob             BLOB    NOT NULL
          );

          CREATE INDEX IF NOT EXISTS idx_images_url_hash  ON images(url_hash);
          CREATE INDEX IF NOT EXISTS idx_images_fetched   ON images(fetched_at DESC);

          CREATE TABLE IF NOT EXISTS performer_mappings (
              username         TEXT    NOT NULL,
              image_id         INTEGER NOT NULL REFERENCES images(id) ON DELETE CASCADE,
              mapped_at        TEXT    NOT NULL DEFAULT (datetime('now')),
              PRIMARY KEY (username, image_id)
          );

          CREATE INDEX IF NOT EXISTS idx_perf_username ON performer_mappings(username);

          CREATE TABLE IF NOT EXISTS manifest (
              id               INTEGER PRIMARY KEY AUTOINCREMENT,
              generated_at     TEXT    NOT NULL DEFAULT (datetime('now')),
              total_performers INTEGER NOT NULL DEFAULT 0,
              total_images     INTEGER NOT NULL DEFAULT 0,
              total_bytes      INTEGER NOT NULL DEFAULT 0,
              manifest_json    TEXT    NOT NULL DEFAULT '{}'
          );
      """

      def _make_stub_image(seed: int, width: int = 32, height: int = 32) -> bytes:
          """Create a tiny synthetic JPEG-stub (all-gray PPM header + random bytes)."""
          # 1×1 gray pixel encoded as gzip-compressed raw bytes (simulates compressed JPEG)
          raw = bytes([abs(seed * 37 + i) % 256 for i in range(width * height * 3)])
          return gzip.compress(raw, compresslevel=6)

      def _store_image(db_path: str, url: str, blob: bytes,
                       content_type: str, width: int, height: int) -> dict:
          url_hash = hashlib.sha256(url.encode()).hexdigest()
          # Store as zlib-compressed blob on top of the pre-gzip stub
          compressed = zlib.compress(blob, 9)
          ratio = round(len(blob) / len(compressed), 4) if compressed else 1.0
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT OR IGNORE INTO images
                      (url_hash, source_url, content_type,
                       original_bytes, compressed_bytes, compression_ratio,
                       codec, width, height, blob)
                  VALUES (?,?,?,?,?,?,?,?,?,?)
              """, (url_hash, url, content_type,
                    len(blob), len(compressed), ratio,
                    "zlib", width, height,
                    sqlite3.Binary(compressed)))
              conn.commit()
              img_id = conn.execute(
                  "SELECT id FROM images WHERE url_hash=?", (url_hash,)
              ).fetchone()[0]
          finally:
              conn.close()
          return {"url": url, "url_hash": url_hash, "id": img_id,
                  "ratio": ratio, "orig": len(blob), "comp": len(compressed)}

      def _map_performer(db_path: str, username: str, image_id: int):
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT OR IGNORE INTO performer_mappings (username, image_id)
                  VALUES (?,?)
              """, (username, image_id))
              conn.commit()
          finally:
              conn.close()

      async def store_image_async(db_path, url, blob, content_type, width, height):
          return await asyncio.to_thread(
              _store_image, db_path, url, blob, content_type, width, height
          )

      async def map_performer_async(db_path, username, image_id):
          return await asyncio.to_thread(_map_performer, db_path, username, image_id)

      async def main():
          conn = sqlite3.connect(DB_PATH)
          conn.executescript(SCHEMA)
          conn.commit()
          conn.close()

          performers = [f"performer_{i:04d}" for i in range(50)]
          store_tasks = []
          for i, username in enumerate(performers):
              blob = _make_stub_image(i)
              url  = f"https://example.com/thumbs/{username}.jpg"
              store_tasks.append(
                  store_image_async(DB_PATH, url, blob, "image/jpeg", 320, 240)
              )

          store_results = await asyncio.gather(*store_tasks)

          map_tasks = [
              map_performer_async(DB_PATH, username, r["id"])
              for username, r in zip(performers, store_results)
          ]
          await asyncio.gather(*map_tasks)

          total_orig = sum(r["orig"] for r in store_results)
          total_comp = sum(r["comp"] for r in store_results)

          # Write manifest
          manifest = {
              "generated_at": datetime.utcnow().isoformat(),
              "total_performers": len(performers),
              "total_images": len(store_results),
              "total_bytes": total_comp,
          }
          conn = sqlite3.connect(DB_PATH)
          conn.execute("""
              INSERT INTO manifest
                  (total_performers, total_images, total_bytes, manifest_json)
              VALUES (?,?,?,?)
          """, (len(performers), len(store_results), total_comp,
                json.dumps(manifest)))
          conn.commit()
          conn.close()

          print(
              f"[image store] {len(store_results)} images stored  "
              f"| original={total_orig:,} B  compressed={total_comp:,} B  "
              f"| ratio={round(total_orig/total_comp,4) if total_comp else 1}x"
          )
          print("[image store] performer mappings created ✓")

      asyncio.run(main())
      PYEOF

