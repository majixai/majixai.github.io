  - name: Set up async market data pre-fetch pipeline
    run: |
      python - <<'PYEOF'
      """
      Async pipeline that concurrently pre-fetches market symbol metadata
      and stores compressed snapshots into the market_cache.db.
      Uses a semaphore-bounded asyncio task pool and exponential backoff
      for transient failures, mirroring the production collector.py pattern.
      """
      import asyncio
      import gzip
      import json
      import os
      import sqlite3
      import time
      from datetime import datetime

      MARKET_DB  = "market_cache.db"
      SYMBOL_DB  = "yfinance_cache.db"

      # Symbols seeded during Section 4 init
      SYMBOLS = [
          "SPY", "QQQ", "DIA", "IWM", "GLD", "TLT",
          "AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META",
          "BTC-USD", "ETH-USD",
      ]

      INTERVALS = ["1m", "5m", "15m", "1h", "1d"]

      # ---------- sync helpers (called via asyncio.to_thread) ----------
      def _store_compressed_snapshot(db_path: str, symbol: str,
                                     interval: str, payload: dict) -> dict:
          raw = json.dumps(payload, separators=(",", ":")).encode()
          compressed = gzip.compress(raw, compresslevel=6)
          ratio = round(len(raw) / len(compressed), 4) if compressed else 1.0
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT OR REPLACE INTO compressed_blobs
                      (symbol, interval, codec, fetched_at,
                       original_bytes, compressed_bytes, compression_ratio, blob)
                  VALUES (?,?,?,datetime('now'),?,?,?,?)
              """, (symbol, interval, "gzip",
                    len(raw), len(compressed), ratio,
                    sqlite3.Binary(compressed)))
              conn.commit()
          finally:
              conn.close()
          return {"symbol": symbol, "interval": interval,
                  "ratio": ratio, "orig": len(raw), "comp": len(compressed)}

      def _log_fetch(db_path: str, symbol: str,
                     status: str, error: str | None, duration_ms: float):
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT INTO fetch_log (symbol, status, error_msg, duration_ms)
                  VALUES (?,?,?,?)
              """, (symbol, status, error, round(duration_ms, 2)))
              conn.commit()
          finally:
              conn.close()

      # ---------- async simulation of yfinance fetch ----------
      async def _fake_fetch(symbol: str, interval: str,
                            sem: asyncio.Semaphore, delay_s: float = 0.01) -> dict:
          """
          Simulates an async yfinance fetch.
          In production this wraps asyncio.to_thread(yf.download, ...).
          """
          async with sem:
              await asyncio.sleep(delay_s)   # network I/O simulation
              price_base = abs(hash(symbol)) % 500 + 50
              rows = []
              for bar in range(60):
                  rows.append({
                      "ts": f"2024-01-01T{bar:02d}:00:00",
                      "open":  round(price_base + bar * 0.1, 4),
                      "high":  round(price_base + bar * 0.1 + 1.0, 4),
                      "low":   round(price_base + bar * 0.1 - 0.5, 4),
                      "close": round(price_base + bar * 0.1 + 0.3, 4),
                      "vol":   bar * 10_000 + 1_000,
                  })
              return {"symbol": symbol, "interval": interval,
                      "fetched_at": datetime.utcnow().isoformat(), "rows": rows}

      async def fetch_and_store(symbol: str, interval: str,
                                sem: asyncio.Semaphore) -> dict | None:
          t0 = time.perf_counter()
          try:
              payload = await _fake_fetch(symbol, interval, sem)
              result = await asyncio.to_thread(
                  _store_compressed_snapshot, MARKET_DB, symbol, interval, payload
              )
              duration_ms = (time.perf_counter() - t0) * 1000
              await asyncio.to_thread(
                  _log_fetch, SYMBOL_DB, symbol, "ok", None, duration_ms
              )
              return result
          except Exception as exc:
              duration_ms = (time.perf_counter() - t0) * 1000
              await asyncio.to_thread(
                  _log_fetch, SYMBOL_DB, symbol, "error", str(exc), duration_ms
              )
              return None

      async def main():
          sem = asyncio.Semaphore(8)   # max 8 concurrent fetches

          tasks = [
              fetch_and_store(sym, iv, sem)
              for sym in SYMBOLS
              for iv in INTERVALS
          ]

          t0 = time.perf_counter()
          results = await asyncio.gather(*tasks, return_exceptions=False)
          elapsed = (time.perf_counter() - t0) * 1000

          ok      = [r for r in results if r is not None]
          failed  = [r for r in results if r is None]
          total_orig = sum(r["orig"] for r in ok)
          total_comp = sum(r["comp"] for r in ok)
          print(
              f"[market pipeline] {len(ok)}/{len(tasks)} fetches stored  "
              f"| original={total_orig:,} B  compressed={total_comp:,} B  "
              f"| elapsed={elapsed:.0f} ms  | failures={len(failed)}"
          )

      asyncio.run(main())
      PYEOF

  # ================================================================
  # SECTION 13 — ASYNC MONTE CARLO SEED STORE
  # ================================================================

  - name: Pre-compute and store Monte Carlo simulation seeds (async)
    run: |
      python - <<'PYEOF'
      """
      Pre-computes random walk seeds for Monte Carlo simulations and stores
      them compressed in the market_cache.db monte_carlo_runs table.
      Uses asyncio.to_thread for the CPU-bound simulation steps to keep
      the event loop responsive while running parallel simulations.
      """
      import asyncio
      import gzip
      import json
      import os
      import sqlite3
      import math
      import random
      from datetime import datetime

      DB_PATH = "market_cache.db"
      SYMBOLS  = ["SPY", "QQQ", "AAPL", "TSLA", "BTC-USD", "NVDA"]
      N_SIMS   = 1000     # reduced for CI speed; production uses 10,000+
      HORIZON  = 252      # trading days

      def _run_monte_carlo(symbol: str, n: int, horizon: int) -> dict:
          """CPU-bound: pure-Python GBM Monte Carlo simulation."""
          rng = random.Random(abs(hash(symbol)))
          # Synthetic drift/vol seeded from symbol hash for reproducibility
          mu     = (abs(hash(symbol + "mu"))  % 200 - 100) / 10000   # -1% to +1% daily
          sigma  = (abs(hash(symbol + "sig")) % 100 + 10)  / 1000    # 1% to 11% daily vol

          final_prices = []
          for _ in range(n):
              price = 100.0
              for _day in range(horizon):
                  z = rng.gauss(0, 1)
                  price *= math.exp((mu - 0.5 * sigma ** 2) + sigma * z)
              final_prices.append(price)

          final_prices.sort()
          mean_r = sum(final_prices) / len(final_prices) / 100 - 1
          std_r  = math.sqrt(
              sum((p / 100 - 1 - mean_r) ** 2 for p in final_prices) / len(final_prices)
          )
          var_95 = final_prices[int(0.05 * len(final_prices))] / 100 - 1
          var_99 = final_prices[int(0.01 * len(final_prices))] / 100 - 1
          cvar_95 = (
              sum(p / 100 - 1 for p in final_prices[:int(0.05 * len(final_prices))])
              / max(1, int(0.05 * len(final_prices)))
          )
          sharpe = mean_r / std_r if std_r > 0 else 0.0
          min_path = min(final_prices)
          max_drawdown = (min_path - 100.0) / 100.0

          return {
              "symbol": symbol, "simulations": n, "horizon_days": horizon,
              "mean_return": round(mean_r, 6), "std_dev": round(std_r, 6),
              "var_95": round(var_95, 6), "var_99": round(var_99, 6),
              "cvar_95": round(cvar_95, 6), "sharpe_ratio": round(sharpe, 6),
              "max_drawdown": round(max_drawdown, 6),
          }

      def _store_mc_result(db_path: str, result: dict):
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT INTO monte_carlo_runs
                      (symbol, simulations, horizon_days,
                       mean_return, std_dev, var_95, var_99,
                       cvar_95, sharpe_ratio, max_drawdown)
                  VALUES
                      (:symbol, :simulations, :horizon_days,
                       :mean_return, :std_dev, :var_95, :var_99,
                       :cvar_95, :sharpe_ratio, :max_drawdown)
              """, result)
              conn.commit()
          finally:
              conn.close()

      async def simulate_and_store(symbol: str, n: int, horizon: int) -> dict:
          result = await asyncio.to_thread(_run_monte_carlo, symbol, n, horizon)
          await asyncio.to_thread(_store_mc_result, DB_PATH, result)
          return result

      async def main():
          import time
          t0 = time.perf_counter()
          tasks = [simulate_and_store(sym, N_SIMS, HORIZON) for sym in SYMBOLS]
          results = await asyncio.gather(*tasks)
          elapsed_ms = (time.perf_counter() - t0) * 1000

          for r in results:
              print(
                  f"[mc] {r['symbol']:<10} | mean={r['mean_return']:+.4f} "
                  f"| VaR95={r['var_95']:+.4f} | Sharpe={r['sharpe_ratio']:+.4f}"
              )
          print(
              f"\n[mc pipeline] {len(results)} symbols  "
              f"| {N_SIMS * len(results):,} total simulations  "
              f"| elapsed={elapsed_ms:.0f} ms"
          )

      asyncio.run(main())
      PYEOF

