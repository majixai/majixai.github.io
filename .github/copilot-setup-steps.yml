  - name: Create and populate zlib compressed SQLite blob store
    run: |
      python - <<'PYEOF'
      """
      zlib-backed compressed blob store.
      zlib (deflate) is the fastest of the standard compression options and
      is ideal for in-flight API response caches and short-lived session data.
      """
      import asyncio
      import hashlib
      import json
      import os
      import sqlite3
      import zlib
      from datetime import datetime

      DB_PATH = "compressed_store_zlib.db"

      SCHEMA = """
          PRAGMA journal_mode=WAL;
          PRAGMA synchronous=NORMAL;
          PRAGMA cache_size=-32000;

          CREATE TABLE IF NOT EXISTS blobs (
              id               INTEGER PRIMARY KEY AUTOINCREMENT,
              key              TEXT    NOT NULL UNIQUE,
              namespace        TEXT    NOT NULL DEFAULT 'default',
              content_type     TEXT    NOT NULL DEFAULT 'application/octet-stream',
              sha256           TEXT    NOT NULL,
              original_bytes   INTEGER NOT NULL,
              compressed_bytes INTEGER NOT NULL,
              compression_ratio REAL   NOT NULL,
              zlib_level       INTEGER NOT NULL DEFAULT 9,
              ttl_seconds      INTEGER,
              expires_at       TEXT,
              created_at       TEXT    NOT NULL DEFAULT (datetime('now')),
              blob             BLOB    NOT NULL
          );

          CREATE INDEX IF NOT EXISTS idx_zlib_key       ON blobs(key);
          CREATE INDEX IF NOT EXISTS idx_zlib_namespace ON blobs(namespace);
          CREATE INDEX IF NOT EXISTS idx_zlib_expires   ON blobs(expires_at);

          CREATE TABLE IF NOT EXISTS eviction_log (
              id          INTEGER PRIMARY KEY AUTOINCREMENT,
              blob_key    TEXT    NOT NULL,
              reason      TEXT    NOT NULL DEFAULT 'ttl_expired',
              evicted_at  TEXT    NOT NULL DEFAULT (datetime('now'))
          );
      """

      def _compress(data: bytes, level: int = 9) -> bytes:
          return zlib.compress(data, level)

      def _decompress(data: bytes) -> bytes:
          return zlib.decompress(data)

      def _sha256(data: bytes) -> str:
          return hashlib.sha256(data).hexdigest()

      def _put(db_path, key, namespace, content_type, raw, level=9, ttl=None):
          compressed = _compress(raw, level)
          sha = _sha256(raw)
          ratio = round(len(raw) / len(compressed), 4) if compressed else 1.0
          expires = None
          if ttl:
              from datetime import timedelta
              expires = (datetime.utcnow() + timedelta(seconds=ttl)).isoformat()
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT INTO blobs
                      (key, namespace, content_type, sha256,
                       original_bytes, compressed_bytes, compression_ratio,
                       zlib_level, ttl_seconds, expires_at, blob)
                  VALUES (?,?,?,?,?,?,?,?,?,?,?)
                  ON CONFLICT(key) DO UPDATE SET
                      blob=excluded.blob, sha256=excluded.sha256,
                      original_bytes=excluded.original_bytes,
                      compressed_bytes=excluded.compressed_bytes,
                      compression_ratio=excluded.compression_ratio,
                      expires_at=excluded.expires_at
              """, (key, namespace, content_type, sha,
                    len(raw), len(compressed), ratio, level,
                    ttl, expires, sqlite3.Binary(compressed)))
              conn.commit()
          finally:
              conn.close()
          return {"key": key, "ratio": ratio,
                  "original_bytes": len(raw), "compressed_bytes": len(compressed)}

      def _get(db_path, key):
          conn = sqlite3.connect(db_path)
          try:
              row = conn.execute("""
                  SELECT blob, expires_at FROM blobs WHERE key=?
              """, (key,)).fetchone()
          finally:
              conn.close()
          if not row:
              return None
          blob_data, expires_at = row
          if expires_at and expires_at < datetime.utcnow().isoformat():
              return None   # TTL expired
          return _decompress(bytes(blob_data))

      def _evict_expired(db_path):
          now = datetime.utcnow().isoformat()
          conn = sqlite3.connect(db_path)
          try:
              expired = conn.execute(
                  "SELECT key FROM blobs WHERE expires_at IS NOT NULL AND expires_at < ?",
                  (now,)
              ).fetchall()
              for (k,) in expired:
                  conn.execute("INSERT INTO eviction_log (blob_key) VALUES (?)", (k,))
                  conn.execute("DELETE FROM blobs WHERE key=?", (k,))
              conn.commit()
              return len(expired)
          finally:
              conn.close()

      async def put_async(db_path, key, namespace, content_type, raw, level=9, ttl=None):
          return await asyncio.to_thread(_put, db_path, key, namespace, content_type, raw, level, ttl)

      async def get_async(db_path, key):
          return await asyncio.to_thread(_get, db_path, key)

      async def evict_expired_async(db_path):
          return await asyncio.to_thread(_evict_expired, db_path)

      async def main():
          conn = sqlite3.connect(DB_PATH)
          conn.executescript(SCHEMA)
          conn.commit()
          conn.close()

          # API response caches – short TTLs
          api_records = []
          endpoints = [
              "/api/market/summary", "/api/tickers/SPY", "/api/tickers/QQQ",
              "/api/monte-carlo/SPY/10000", "/api/predictions/AAPL",
              "/api/analytics/events", "/api/chat/rooms",
              "/api/hotel/available", "/api/blog/posts",
          ]
          for ep in endpoints:
              data = json.dumps({
                  "endpoint": ep,
                  "cached_at": datetime.utcnow().isoformat(),
                  "status": "ok",
                  "data": {"placeholder": True, "count": 42},
              }, separators=(",", ":")).encode()
              api_records.append((
                  f"api_cache{ep.replace('/', ':')}", "api_cache",
                  "application/json", data, 9, 300,   # 5-min TTL
              ))

          tasks = [
              put_async(DB_PATH, k, ns, ct, raw, lvl, ttl)
              for k, ns, ct, raw, lvl, ttl in api_records
          ]
          results = await asyncio.gather(*tasks)

          total_orig = sum(r["original_bytes"] for r in results)
          total_comp = sum(r["compressed_bytes"] for r in results)
          print(
              f"[zlib store] {len(results)} blobs written  "
              f"| original={total_orig:,} B  compressed={total_comp:,} B  "
              f"| ratio={round(total_orig/total_comp, 4) if total_comp else 1}x"
          )

          evicted = await evict_expired_async(DB_PATH)
          print(f"[zlib store] eviction pass: {evicted} expired blobs removed")

          for k, ns, ct, raw, lvl, ttl in api_records[:3]:
              recovered = await get_async(DB_PATH, k)
              assert recovered == raw, f"zlib round-trip mismatch: {k}"
          print("[zlib store] round-trip validation passed ✓")

      asyncio.run(main())
      PYEOF

