  - name: Create and populate lzma compressed SQLite blob store
    run: |
      python - <<'PYEOF'
      """
      LZMA-backed compressed blob store.
      LZMA offers superior compression ratios at the cost of higher CPU usage.
      Ideal for archival storage of historical market data snapshots.
      """
      import asyncio
      import hashlib
      import json
      import lzma
      import os
      import sqlite3
      from datetime import datetime, timedelta

      DB_PATH = "compressed_store_lzma.db"

      SCHEMA = """
          PRAGMA journal_mode=WAL;
          PRAGMA synchronous=NORMAL;

          CREATE TABLE IF NOT EXISTS blobs (
              id               INTEGER PRIMARY KEY AUTOINCREMENT,
              key              TEXT    NOT NULL UNIQUE,
              namespace        TEXT    NOT NULL DEFAULT 'default',
              content_type     TEXT    NOT NULL DEFAULT 'application/octet-stream',
              sha256           TEXT    NOT NULL,
              original_bytes   INTEGER NOT NULL,
              compressed_bytes INTEGER NOT NULL,
              compression_ratio REAL   NOT NULL,
              lzma_preset      INTEGER NOT NULL DEFAULT 6,
              lzma_format      TEXT    NOT NULL DEFAULT 'FORMAT_XZ',
              created_at       TEXT    NOT NULL DEFAULT (datetime('now')),
              updated_at       TEXT    NOT NULL DEFAULT (datetime('now')),
              blob             BLOB    NOT NULL
          );

          CREATE INDEX IF NOT EXISTS idx_lzma_key       ON blobs(key);
          CREATE INDEX IF NOT EXISTS idx_lzma_namespace ON blobs(namespace);

          CREATE TABLE IF NOT EXISTS compression_stats (
              id            INTEGER PRIMARY KEY AUTOINCREMENT,
              namespace     TEXT    NOT NULL,
              total_entries INTEGER NOT NULL DEFAULT 0,
              total_original_bytes  INTEGER NOT NULL DEFAULT 0,
              total_compressed_bytes INTEGER NOT NULL DEFAULT 0,
              avg_ratio     REAL    NOT NULL DEFAULT 1.0,
              computed_at   TEXT    NOT NULL DEFAULT (datetime('now'))
          );
      """

      def _lzma_compress(data: bytes, preset: int = 6) -> bytes:
          return lzma.compress(data, format=lzma.FORMAT_XZ, preset=preset)

      def _lzma_decompress(data: bytes) -> bytes:
          return lzma.decompress(data)

      def _sha256(data: bytes) -> str:
          return hashlib.sha256(data).hexdigest()

      def _write_lzma_blob(db_path, key, namespace, content_type, raw, preset=6):
          compressed = _lzma_compress(raw, preset)
          sha = _sha256(raw)
          ratio = round(len(raw) / len(compressed), 4) if compressed else 1.0
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT INTO blobs
                      (key, namespace, content_type, sha256,
                       original_bytes, compressed_bytes, compression_ratio,
                       lzma_preset, blob)
                  VALUES (?,?,?,?,?,?,?,?,?)
                  ON CONFLICT(key) DO UPDATE SET
                      blob=excluded.blob,
                      sha256=excluded.sha256,
                      original_bytes=excluded.original_bytes,
                      compressed_bytes=excluded.compressed_bytes,
                      compression_ratio=excluded.compression_ratio,
                      updated_at=datetime('now')
              """, (key, namespace, content_type, sha,
                    len(raw), len(compressed), ratio, preset,
                    sqlite3.Binary(compressed)))
              conn.commit()
          finally:
              conn.close()
          return {
              "key": key, "sha256": sha,
              "original_bytes": len(raw),
              "compressed_bytes": len(compressed),
              "ratio": ratio,
          }

      def _read_lzma_blob(db_path, key):
          conn = sqlite3.connect(db_path)
          try:
              row = conn.execute("SELECT blob FROM blobs WHERE key=?", (key,)).fetchone()
          finally:
              conn.close()
          return _lzma_decompress(bytes(row[0])) if row else None

      async def write_async(db_path, key, namespace, content_type, raw, preset=6):
          return await asyncio.to_thread(
              _write_lzma_blob, db_path, key, namespace, content_type, raw, preset
          )

      async def read_async(db_path, key):
          return await asyncio.to_thread(_read_lzma_blob, db_path, key)

      async def compute_stats(db_path, namespace):
          def _stats(db_path, namespace):
              conn = sqlite3.connect(db_path)
              try:
                  row = conn.execute("""
                      SELECT COUNT(*),
                             SUM(original_bytes),
                             SUM(compressed_bytes),
                             AVG(compression_ratio)
                      FROM blobs WHERE namespace=?
                  """, (namespace,)).fetchone()
                  return row
              finally:
                  conn.close()

          row = await asyncio.to_thread(_stats, db_path, namespace)
          if row and row[0]:
              conn = sqlite3.connect(db_path)
              conn.execute("""
                  INSERT INTO compression_stats
                      (namespace, total_entries, total_original_bytes,
                       total_compressed_bytes, avg_ratio)
                  VALUES (?,?,?,?,?)
              """, (namespace, row[0], row[1] or 0, row[2] or 0, row[3] or 1.0))
              conn.commit()
              conn.close()
              return {"entries": row[0], "orig": row[1], "comp": row[2], "ratio": row[3]}
          return {}

      async def main():
          conn = sqlite3.connect(DB_PATH)
          conn.executescript(SCHEMA)
          conn.commit()
          conn.close()

          # Build large synthetic historical dataset
          records = []
          base_date = datetime(2020, 1, 1)
          for symbol in ["SPY", "QQQ", "BTC-USD", "AAPL", "MSFT", "NVDA"]:
              rows = []
              price = 300.0
              for day in range(365 * 3):   # 3 years of daily data
                  d = base_date + timedelta(days=day)
                  price = max(1.0, price * (1 + (hash((symbol, day)) % 200 - 100) / 10000))
                  rows.append({
                      "date": d.strftime("%Y-%m-%d"),
                      "open":   round(price * 0.998, 4),
                      "high":   round(price * 1.012, 4),
                      "low":    round(price * 0.987, 4),
                      "close":  round(price, 4),
                      "volume": abs(hash((symbol, day))) % 50_000_000 + 1_000_000,
                  })
              payload = {"symbol": symbol, "interval": "1d", "rows": rows}
              raw = json.dumps(payload, separators=(",", ":")).encode()
              records.append((f"archive/{symbol}/1d/3yr", "archive", "application/json", raw))

          # Write all records concurrently
          tasks = [write_async(DB_PATH, k, ns, ct, raw) for k, ns, ct, raw in records]
          results = await asyncio.gather(*tasks)

          total_orig = sum(r["original_bytes"] for r in results)
          total_comp = sum(r["compressed_bytes"] for r in results)
          print(
              f"[lzma store] {len(results)} blobs written  "
              f"| original={total_orig:,} B  compressed={total_comp:,} B  "
              f"| overall ratio={round(total_orig/total_comp,4) if total_comp else 1}x"
          )

          stats = await compute_stats(DB_PATH, "archive")
          print(f"[lzma store] archive stats: {stats}")

          # Validate round-trip
          for key, _, _, raw in records[:2]:
              recovered = await read_async(DB_PATH, key)
              assert recovered == raw, f"LZMA round-trip mismatch: {key}"
          print("[lzma store] round-trip validation passed ✓")

      asyncio.run(main())
      PYEOF

