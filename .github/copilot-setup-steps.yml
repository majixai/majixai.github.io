  - name: Create and populate gzip compressed SQLite blob store
    run: |
      python - <<'PYEOF'
      """
      Creates a gzip-backed compressed SQLite blob store.
      Used by the market data pipeline, image cache, and general
      key/value storage that benefits from streaming gzip compression.

      Design:
        - Stores arbitrary payloads (JSON, CSV, binary) as gzip-compressed BLOBs
        - Maintains a content-addressed index via SHA-256 of the original bytes
        - Tracks compression ratio for each entry
        - Async read/write helpers use asyncio.to_thread() for I/O off the main thread
      """
      import asyncio
      import gzip
      import hashlib
      import json
      import os
      import sqlite3
      import time
      from datetime import datetime

      DB_PATH = "compressed_store_gzip.db"

      # ------------------------------------------------------------------ schema
      SCHEMA = """
          PRAGMA journal_mode=WAL;
          PRAGMA synchronous=NORMAL;
          PRAGMA cache_size=-64000;

          CREATE TABLE IF NOT EXISTS blobs (
              id              INTEGER PRIMARY KEY AUTOINCREMENT,
              key             TEXT    NOT NULL UNIQUE,
              namespace       TEXT    NOT NULL DEFAULT 'default',
              content_type    TEXT    NOT NULL DEFAULT 'application/octet-stream',
              sha256          TEXT    NOT NULL,
              original_bytes  INTEGER NOT NULL,
              compressed_bytes INTEGER NOT NULL,
              compression_ratio REAL  NOT NULL,
              gzip_level      INTEGER NOT NULL DEFAULT 9,
              created_at      TEXT    NOT NULL DEFAULT (datetime('now')),
              updated_at      TEXT    NOT NULL DEFAULT (datetime('now')),
              blob            BLOB    NOT NULL
          );

          CREATE INDEX IF NOT EXISTS idx_blobs_key       ON blobs(key);
          CREATE INDEX IF NOT EXISTS idx_blobs_namespace ON blobs(namespace);
          CREATE INDEX IF NOT EXISTS idx_blobs_sha256    ON blobs(sha256);

          CREATE TABLE IF NOT EXISTS blob_metadata (
              blob_key   TEXT    NOT NULL REFERENCES blobs(key) ON DELETE CASCADE,
              meta_key   TEXT    NOT NULL,
              meta_value TEXT,
              PRIMARY KEY (blob_key, meta_key)
          );

          CREATE TABLE IF NOT EXISTS access_log (
              id         INTEGER PRIMARY KEY AUTOINCREMENT,
              blob_key   TEXT    NOT NULL,
              operation  TEXT    NOT NULL DEFAULT 'read',
              accessed_at TEXT   NOT NULL DEFAULT (datetime('now'))
          );
      """

      # ------------------------------------------------------------------ helpers
      def _compress(data: bytes, level: int = 9) -> bytes:
          return gzip.compress(data, compresslevel=level)

      def _decompress(data: bytes) -> bytes:
          return gzip.decompress(data)

      def _sha256(data: bytes) -> str:
          return hashlib.sha256(data).hexdigest()

      def _ratio(original: int, compressed: int) -> float:
          return round(original / compressed, 4) if compressed else 1.0

      # ------------------------------------------------------------------ sync DB ops (run via to_thread)
      def _write_blob(db_path: str, key: str, namespace: str,
                      content_type: str, raw: bytes, level: int = 9) -> dict:
          compressed = _compress(raw, level)
          sha = _sha256(raw)
          ratio = _ratio(len(raw), len(compressed))
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT INTO blobs
                      (key, namespace, content_type, sha256,
                       original_bytes, compressed_bytes, compression_ratio,
                       gzip_level, blob)
                  VALUES (?,?,?,?,?,?,?,?,?)
                  ON CONFLICT(key) DO UPDATE SET
                      sha256=excluded.sha256,
                      original_bytes=excluded.original_bytes,
                      compressed_bytes=excluded.compressed_bytes,
                      compression_ratio=excluded.compression_ratio,
                      blob=excluded.blob,
                      updated_at=datetime('now')
              """, (key, namespace, content_type, sha,
                    len(raw), len(compressed), ratio, level,
                    sqlite3.Binary(compressed)))
              conn.commit()
          finally:
              conn.close()
          return {
              "key": key, "sha256": sha,
              "original_bytes": len(raw), "compressed_bytes": len(compressed),
              "compression_ratio": ratio,
          }

      def _read_blob(db_path: str, key: str) -> bytes | None:
          conn = sqlite3.connect(db_path)
          try:
              row = conn.execute(
                  "SELECT blob FROM blobs WHERE key=?", (key,)
              ).fetchone()
          finally:
              conn.close()
          return _decompress(bytes(row[0])) if row else None

      # ------------------------------------------------------------------ async wrappers
      async def write_blob_async(db_path: str, key: str, namespace: str,
                                  content_type: str, raw: bytes) -> dict:
          return await asyncio.to_thread(
              _write_blob, db_path, key, namespace, content_type, raw
          )

      async def read_blob_async(db_path: str, key: str) -> bytes | None:
          return await asyncio.to_thread(_read_blob, db_path, key)

      # ------------------------------------------------------------------ init + seed
      async def main():
          # Initialise schema
          conn = sqlite3.connect(DB_PATH)
          conn.executescript(SCHEMA)
          conn.commit()
          conn.close()

          # Seed with representative market-data payloads
          sample_records = []
          for symbol in ["SPY", "QQQ", "DIA", "IWM", "BTC-USD", "ETH-USD",
                          "AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA"]:
              payload = {
                  "symbol": symbol,
                  "generated_at": datetime.utcnow().isoformat(),
                  "ohlcv": [
                      {
                          "date": f"2024-0{m:02d}-01",
                          "open": round(100 + m * 1.5, 2),
                          "high": round(102 + m * 1.5, 2),
                          "low":  round(98  + m * 1.5, 2),
                          "close": round(101 + m * 1.5, 2),
                          "volume": 1_000_000 + m * 50_000,
                      }
                      for m in range(1, 13)
                  ],
              }
              raw = json.dumps(payload, separators=(",", ":")).encode()
              sample_records.append((
                  f"market/{symbol}/1d/2024",
                  "market_data",
                  "application/json",
                  raw,
              ))

          tasks = [
              write_blob_async(DB_PATH, key, ns, ct, raw)
              for key, ns, ct, raw in sample_records
          ]
          results = await asyncio.gather(*tasks)

          total_orig = sum(r["original_bytes"] for r in results)
          total_comp = sum(r["compressed_bytes"] for r in results)
          overall_ratio = round(total_orig / total_comp, 4) if total_comp else 1.0
          print(
              f"[gzip store] {len(results)} blobs written  "
              f"| original={total_orig:,} B  compressed={total_comp:,} B  "
              f"| overall ratio={overall_ratio}x"
          )

          # Round-trip validation
          for key, _, _, raw in sample_records[:3]:
              recovered = await read_blob_async(DB_PATH, key)
              assert recovered == raw, f"Round-trip mismatch for {key}"
          print("[gzip store] round-trip validation passed ✓")

      asyncio.run(main())
      PYEOF

