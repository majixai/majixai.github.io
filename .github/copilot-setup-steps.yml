  - name: Create and populate brotli compressed SQLite blob store
    run: |
      python - <<'PYEOF'
      """
      Brotli-backed compressed blob store.
      Brotli delivers the best compression ratio for text/HTML/JSON payloads
      and is the preferred codec for static asset caching (HTML, CSS, JS).
      Used by the deploy-showcase workflow for compressed static file storage.
      """
      import asyncio
      import brotli
      import hashlib
      import json
      import os
      import sqlite3
      from datetime import datetime

      DB_PATH = "compressed_store_brotli.db"

      SCHEMA = """
          PRAGMA journal_mode=WAL;
          PRAGMA synchronous=NORMAL;

          CREATE TABLE IF NOT EXISTS blobs (
              id               INTEGER PRIMARY KEY AUTOINCREMENT,
              key              TEXT    NOT NULL UNIQUE,
              namespace        TEXT    NOT NULL DEFAULT 'default',
              content_type     TEXT    NOT NULL DEFAULT 'text/html',
              sha256           TEXT    NOT NULL,
              original_bytes   INTEGER NOT NULL,
              compressed_bytes INTEGER NOT NULL,
              compression_ratio REAL   NOT NULL,
              brotli_quality   INTEGER NOT NULL DEFAULT 11,
              brotli_mode      TEXT    NOT NULL DEFAULT 'text',
              created_at       TEXT    NOT NULL DEFAULT (datetime('now')),
              blob             BLOB    NOT NULL
          );

          CREATE INDEX IF NOT EXISTS idx_brotli_key       ON blobs(key);
          CREATE INDEX IF NOT EXISTS idx_brotli_namespace ON blobs(namespace);

          CREATE TABLE IF NOT EXISTS asset_manifest (
              key         TEXT    PRIMARY KEY,
              asset_path  TEXT    NOT NULL,
              mime_type   TEXT    NOT NULL,
              etag        TEXT    NOT NULL,
              cache_control TEXT  NOT NULL DEFAULT 'public, max-age=3600',
              last_modified TEXT  NOT NULL DEFAULT (datetime('now'))
          );
      """

      def _sha256(data: bytes) -> str:
          return hashlib.sha256(data).hexdigest()

      def _compress_brotli(data: bytes, quality: int = 11) -> bytes:
          return brotli.compress(data, quality=quality, mode=brotli.MODE_TEXT)

      def _decompress_brotli(data: bytes) -> bytes:
          return brotli.decompress(data)

      def _put(db_path, key, namespace, content_type, raw, quality=11):
          compressed = _compress_brotli(raw, quality)
          sha = _sha256(raw)
          ratio = round(len(raw) / len(compressed), 4) if compressed else 1.0
          conn = sqlite3.connect(db_path)
          try:
              conn.execute("""
                  INSERT INTO blobs
                      (key, namespace, content_type, sha256,
                       original_bytes, compressed_bytes, compression_ratio,
                       brotli_quality, blob)
                  VALUES (?,?,?,?,?,?,?,?,?)
                  ON CONFLICT(key) DO UPDATE SET
                      blob=excluded.blob, sha256=excluded.sha256,
                      original_bytes=excluded.original_bytes,
                      compressed_bytes=excluded.compressed_bytes,
                      compression_ratio=excluded.compression_ratio
              """, (key, namespace, content_type, sha,
                    len(raw), len(compressed), ratio, quality,
                    sqlite3.Binary(compressed)))
              conn.execute("""
                  INSERT OR REPLACE INTO asset_manifest
                      (key, asset_path, mime_type, etag, last_modified)
                  VALUES (?,?,?,?,datetime('now'))
              """, (key, key, content_type, sha[:16]))
              conn.commit()
          finally:
              conn.close()
          return {"key": key, "original_bytes": len(raw),
                  "compressed_bytes": len(compressed), "ratio": ratio}

      def _get(db_path, key):
          conn = sqlite3.connect(db_path)
          try:
              row = conn.execute("SELECT blob FROM blobs WHERE key=?", (key,)).fetchone()
          finally:
              conn.close()
          return _decompress_brotli(bytes(row[0])) if row else None

      async def put_async(db_path, key, ns, ct, raw, quality=11):
          return await asyncio.to_thread(_put, db_path, key, ns, ct, raw, quality)

      async def get_async(db_path, key):
          return await asyncio.to_thread(_get, db_path, key)

      async def main():
          conn = sqlite3.connect(DB_PATH)
          conn.executescript(SCHEMA)
          conn.commit()
          conn.close()

          # Synthetic static asset payloads
          assets = []
          html_template = "<!DOCTYPE html><html><head><title>{title}</title></head><body>" + \
                          "<h1>{title}</h1><p>" + "Lorem ipsum dolor sit amet. " * 50 + "</p>" + \
                          "</body></html>"
          js_template = "// Auto-generated module: {name}\n" + \
                        "const MODULE_{NAME} = (function() {{\n" + \
                        "  'use strict';\n" + \
                        ("  // placeholder\n" * 30) + \
                        "  return {{}};\n}}());\n"
          css_template = "/* {name} stylesheet */\n" + \
                         ".container {{ display: flex; flex-wrap: wrap; }}\n" * 20 + \
                         ".item {{ padding: 8px; margin: 4px; }}\n" * 20

          pages = ["index", "market", "blog", "hotel", "chat",
                   "analytics", "holdem", "showcase", "yfinance", "api-docs"]
          for page in pages:
              assets.append((
                  f"static/{page}.html",
                  "showcase",
                  "text/html; charset=utf-8",
                  html_template.format(title=page.title()).encode(),
              ))
              assets.append((
                  f"static/js/{page}.js",
                  "showcase",
                  "application/javascript",
                  js_template.format(name=page, NAME=page.upper()).encode(),
              ))
              assets.append((
                  f"static/css/{page}.css",
                  "showcase",
                  "text/css",
                  css_template.format(name=page).encode(),
              ))

          tasks = [put_async(DB_PATH, k, ns, ct, raw) for k, ns, ct, raw in assets]
          results = await asyncio.gather(*tasks)

          total_orig = sum(r["original_bytes"] for r in results)
          total_comp = sum(r["compressed_bytes"] for r in results)
          print(
              f"[brotli store] {len(results)} assets written  "
              f"| original={total_orig:,} B  compressed={total_comp:,} B  "
              f"| ratio={round(total_orig/total_comp,4) if total_comp else 1}x"
          )

          for k, ns, ct, raw in assets[:3]:
              recovered = await get_async(DB_PATH, k)
              assert recovered == raw, f"brotli round-trip mismatch: {k}"
          print("[brotli store] round-trip validation passed ✓")

      asyncio.run(main())
      PYEOF

  # ================================================================
  # SECTION 11 — MULTI-CODEC COMPRESSION BENCHMARK
  # ================================================================

  - name: Run multi-codec compression benchmark across all stores
    run: |
      python - <<'PYEOF'
      """
      Benchmarks all five compression codecs (gzip, lzma, zlib, zstd, lz4, brotli)
      against three representative payload types:
        1. JSON market data (highly compressible text)
        2. Binary float array (moderately compressible)
        3. Pre-compressed PNG stub (nearly incompressible)
      Reports compression ratio and throughput for each combination.
      """
      import asyncio
      import gzip
      import hashlib
      import json
      import lzma
      import os
      import sqlite3
      import struct
      import time
      import zlib
      from datetime import datetime

      import brotli
      import lz4.frame
      import zstandard as zstd

      DB_PATH = "compression_benchmark.db"

      SCHEMA = """
          PRAGMA journal_mode=WAL;

          CREATE TABLE IF NOT EXISTS benchmarks (
              id               INTEGER PRIMARY KEY AUTOINCREMENT,
              payload_type     TEXT    NOT NULL,
              payload_bytes    INTEGER NOT NULL,
              codec            TEXT    NOT NULL,
              compressed_bytes INTEGER NOT NULL,
              compression_ratio REAL   NOT NULL,
              compress_ms      REAL    NOT NULL,
              decompress_ms    REAL    NOT NULL,
              compress_mb_s    REAL    NOT NULL,
              decompress_mb_s  REAL    NOT NULL,
              correct          INTEGER NOT NULL DEFAULT 1,
              ran_at           TEXT    NOT NULL DEFAULT (datetime('now'))
          );

          CREATE INDEX IF NOT EXISTS idx_bench_codec   ON benchmarks(codec);
          CREATE INDEX IF NOT EXISTS idx_bench_payload ON benchmarks(payload_type);

          CREATE VIEW IF NOT EXISTS benchmark_summary AS
              SELECT
                  codec,
                  payload_type,
                  AVG(compression_ratio)   AS avg_ratio,
                  AVG(compress_mb_s)       AS avg_compress_mb_s,
                  AVG(decompress_mb_s)     AS avg_decompress_mb_s,
                  COUNT(*)                 AS runs
              FROM benchmarks
              GROUP BY codec, payload_type
              ORDER BY avg_ratio DESC;
      """

      # ---------- codec registry ----------
      CODECS = {}

      def _make_codec(name, compress_fn, decompress_fn):
          CODECS[name] = (compress_fn, decompress_fn)

      _make_codec("gzip",   lambda d: gzip.compress(d, compresslevel=9),  gzip.decompress)
      _make_codec("lzma",   lambda d: lzma.compress(d, preset=6),         lzma.decompress)
      _make_codec("zlib",   lambda d: zlib.compress(d, 9),                zlib.decompress)
      _make_codec("zstd",   lambda d: zstd.ZstdCompressor(level=3).compress(d),
                            lambda d: zstd.ZstdDecompressor().decompress(d))
      _make_codec("lz4",    lz4.frame.compress,                           lz4.frame.decompress)
      _make_codec("brotli", lambda d: brotli.compress(d, quality=11),     brotli.decompress)

      # ---------- payload generators ----------
      def make_json_payload(size_bytes: int = 200_000) -> bytes:
          rows = []
          price = 300.0
          i = 0
          out = b""
          while len(out) < size_bytes:
              price = max(1.0, price + (hash(i) % 200 - 100) / 1000)
              rows.append({"i": i, "open": round(price * 0.998, 4),
                            "high": round(price * 1.01, 4),
                            "low": round(price * 0.99, 4),
                            "close": round(price, 4),
                            "vol": abs(hash(i)) % 10_000_000})
              out = json.dumps(rows, separators=(",", ":")).encode()
              i += 1
          return out[:size_bytes]

      def make_float_payload(size_bytes: int = 200_000) -> bytes:
          import struct
          count = size_bytes // 8
          vals = [abs(hash(i)) / 1e12 for i in range(count)]
          return struct.pack(f"{count}d", *vals)

      def make_random_payload(size_bytes: int = 200_000) -> bytes:
          # Pseudorandom (hard to compress)
          import os
          return os.urandom(size_bytes)

      # ---------- benchmark runner ----------
      def _bench_one(payload: bytes, payload_type: str, codec_name: str) -> dict:
          compress_fn, decompress_fn = CODECS[codec_name]
          t0 = time.perf_counter()
          compressed = compress_fn(payload)
          compress_ms = (time.perf_counter() - t0) * 1000

          t1 = time.perf_counter()
          recovered = decompress_fn(compressed)
          decompress_ms = (time.perf_counter() - t1) * 1000

          correct = 1 if recovered == payload else 0
          ratio = round(len(payload) / len(compressed), 4) if compressed else 1.0
          mb = len(payload) / 1_048_576
          return {
              "payload_type": payload_type,
              "payload_bytes": len(payload),
              "codec": codec_name,
              "compressed_bytes": len(compressed),
              "compression_ratio": ratio,
              "compress_ms": round(compress_ms, 4),
              "decompress_ms": round(decompress_ms, 4),
              "compress_mb_s": round(mb / (compress_ms / 1000), 2) if compress_ms else 0,
              "decompress_mb_s": round(mb / (decompress_ms / 1000), 2) if decompress_ms else 0,
              "correct": correct,
          }

      async def bench_async(payload, payload_type, codec_name):
          return await asyncio.to_thread(_bench_one, payload, payload_type, codec_name)

      async def main():
          conn = sqlite3.connect(DB_PATH)
          conn.executescript(SCHEMA)
          conn.commit()
          conn.close()

          payloads = [
              ("json_market_data", make_json_payload(150_000)),
              ("binary_floats",    make_float_payload(160_000)),
              ("pseudorandom",     make_random_payload(100_000)),
          ]

          tasks = []
          for payload_type, payload in payloads:
              for codec_name in CODECS:
                  tasks.append(bench_async(payload, payload_type, codec_name))

          results = await asyncio.gather(*tasks)

          conn = sqlite3.connect(DB_PATH)
          conn.executemany("""
              INSERT INTO benchmarks
                  (payload_type, payload_bytes, codec, compressed_bytes,
                   compression_ratio, compress_ms, decompress_ms,
                   compress_mb_s, decompress_mb_s, correct)
              VALUES
                  (:payload_type, :payload_bytes, :codec, :compressed_bytes,
                   :compression_ratio, :compress_ms, :decompress_ms,
                   :compress_mb_s, :decompress_mb_s, :correct)
          """, results)
          conn.commit()

          # Print summary table
          summary = conn.execute("SELECT * FROM benchmark_summary").fetchall()
          conn.close()

          print("\n{'='*72}")
          print(f"{'CODEC':<10} {'PAYLOAD':<22} {'RATIO':>7} {'COMP MB/s':>11} {'DECOMP MB/s':>12}")
          print("-" * 72)
          for row in summary:
              codec, ptype, avg_ratio, avg_comp, avg_decomp, runs = row
              print(f"{codec:<10} {ptype:<22} {avg_ratio:>7.4f} {avg_comp:>11.1f} {avg_decomp:>12.1f}")
          print("=" * 72)

          failed = [r for r in results if not r["correct"]]
          if failed:
              print(f"WARNING: {len(failed)} round-trip failures detected!")
          else:
              print(f"All {len(results)} codec/payload combinations validated ✓")

      asyncio.run(main())
      PYEOF

