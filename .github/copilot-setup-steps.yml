steps:
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'
      cache: 'pip'

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'
      cache: 'npm'

  - name: Install Node.js dependencies
    run: npm ci
