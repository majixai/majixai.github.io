  - name: Verify async imports and event-loop compatibility
    run: |
      python - <<'PYEOF'
      """
      Verifies that all async packages installed during setup are importable
      and that the event loop infrastructure (uvloop, anyio, asyncio) works
      correctly by running a small end-to-end async test.
      """
      import asyncio
      import sys

      async def _check_imports():
          results = {}

          packages = [
              "aiosqlite", "aiohttp", "aiofiles", "anyio",
              "brotli", "zstandard", "lz4.frame", "lz4.block",
          ]
          for pkg in packages:
              try:
                  mod = __import__(pkg.split(".")[0])
                  ver = getattr(mod, "__version__", "unknown")
                  results[pkg] = ("OK", ver)
              except ImportError as e:
                  results[pkg] = ("MISSING", str(e))

          # Test aiosqlite round-trip
          try:
              import aiosqlite, tempfile, os
              with tempfile.NamedTemporaryFile(suffix=".db", delete=False) as f:
                  tmp = f.name
              async with aiosqlite.connect(tmp) as db:
                  await db.execute("CREATE TABLE t (x INTEGER)")
                  await db.execute("INSERT INTO t VALUES (42)")
                  await db.commit()
                  row = await db.execute_fetchall("SELECT x FROM t")
              os.unlink(tmp)
              assert row == [(42,)]
              results["aiosqlite:roundtrip"] = ("OK", "passed")
          except Exception as e:
              results["aiosqlite:roundtrip"] = ("FAIL", str(e))

          # Test anyio task group
          try:
              import anyio
              async def _grp():
                  results_inner = []
                  async with anyio.create_task_group() as tg:
                      async def _work(n):
                          await anyio.sleep(0)
                          results_inner.append(n)
                      for i in range(5):
                          tg.start_soon(_work, i)
                  return results_inner
              inner = await _grp()
              assert len(inner) == 5
              results["anyio:task_group"] = ("OK", "passed")
          except Exception as e:
              results["anyio:task_group"] = ("FAIL", str(e))

          return results

      async def main():
          results = await _check_imports()

          print(f"\n{'PACKAGE':<30} {'STATUS':<8} VERSION/DETAIL")
          print("-" * 70)
          failures = []
          for pkg, (status, detail) in results.items():
              print(f"{pkg:<30} {status:<8} {detail}")
              if status not in ("OK",):
                  failures.append(pkg)

          print()
          if failures:
              print(f"WARNING: {len(failures)} import(s) failed: {failures}")
              sys.exit(1)
          else:
              print(f"All {len(results)} import checks passed ✓")

      asyncio.run(main())
      PYEOF

