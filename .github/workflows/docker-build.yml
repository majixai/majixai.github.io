name: Object Detection Docker Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "object_detection/**"
      - ".github/workflows/docker-build.yml"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: object_detection
          file: object_detection/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/object-detection:latest
            ghcr.io/${{ github.repository }}/object-detection:${{ github.sha }}
