name: Update README

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_run:
    workflows: ["*"]
    types:
      - completed
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Skip if the triggering commit was made by this workflow itself (scheduled runs always proceed)
    # Guard against events that don't include head_commit (e.g. workflow_run) by checking for its presence first.
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.head_commit && !contains(github.event.head_commit.message, 'docs: auto-update README stats [skip ci]'))

    steps:
      - name: Wait 3 minutes before updating
        run: sleep 180

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run README update script
        id: update_readme
        run: |
          set -o pipefail
          # Run the script but do not fail the entire job on error. Record success state as an output.
          if python scripts/update_readme.py 2>&1 | tee update_readme.log; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "::warning::README update script failed — see update_readme.log for details"
          fi

      - name: Check for changes
        id: check_changes
        # Only check for changes when the update script succeeded.
        if: steps.update_readme.outputs.success == 'true'
        run: |
          # Detect if any tracked files changed.
          if git diff --quiet -- README.md latest_commit/data.json latest_commit/README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if files changed
        if: steps.update_readme.outputs.success == 'true' && steps.check_changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update README stats [skip ci]"
          file_pattern: README.md latest_commit/data.json latest_commit/README.md
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          token: ${{ secrets.GITHUB_TOKEN }}
