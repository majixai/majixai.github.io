name: GPU Processing Pipeline

on:
  workflow_dispatch:
    inputs:
      kernel:
        description: 'Kernel to run (e.g. tensor_ops.hosvd, matrix_ops.pca, or "all")'
        required: false
        default: 'all'
      backend:
        description: 'Backend override (cuda | mps | tensorflow | cpu | auto)'
        required: false
        default: 'auto'
  schedule:
    # Run daily at 02:00 UTC to refresh GPU-accelerated outputs
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  gpu-processing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install GPU Dependencies
        run: |
          python -m pip install --upgrade pip
          # Core numerical stack (always available)
          pip install numpy pandas scipy
          # TensorFlow GPU support (falls back to CPU if no GPU runner)
          pip install tensorflow || echo "TensorFlow install failed — continuing with CPU"

      - name: Detect GPU Backend
        id: detect_gpu
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from gpu.manager import GPUManager
          mgr = GPUManager()
          print(f"backend={mgr.backend}")
          mgr.log_status()
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as fh:
              fh.write(f"backend={mgr.backend}\n")
          EOF

      - name: Run GPU Kernels — All
        if: ${{ github.event.inputs.kernel == 'all' || github.event_name == 'schedule' }}
        run: |
          python - <<'EOF'
          import sys, os, json
          from pathlib import Path
          sys.path.insert(0, os.getcwd())

          from gpu import GPUManager, GPUDispatcher
          import numpy as np

          mgr = GPUManager()
          print(f"[GPU Pipeline] backend={mgr.backend}")

          with GPUDispatcher(manager=mgr) as d:
              # ── HOSVD on synthetic feature matrix ─────────────────────────
              F = np.random.randn(30, 8).astype(np.float32)
              f_hosvd = d.submit("tensor_ops.hosvd", feature_matrix=F, rank=3)

              # ── Kalman smoother on synthetic price series ──────────────────
              prices = np.cumsum(np.random.randn(100)) + 100.0
              f_kalman = d.submit("tensor_ops.kalman_smooth", observations=prices)

              # ── Monte Carlo forecast ───────────────────────────────────────
              f_mc = d.submit("tensor_ops.monte_carlo",
                              mu=0.001, sigma=0.02, steps=20, n_paths=400)

              # ── PCA on synthetic data ──────────────────────────────────────
              X = np.random.randn(100, 10).astype(np.float32)
              f_pca = d.submit("matrix_ops.pca", data=X, n_components=3)

              # Collect results
              core, sv = f_hosvd.result()
              smoothed  = f_kalman.result()
              mc_result = f_mc.result()
              pcs, explained = f_pca.result()

          summary = {
              "backend": mgr.backend,
              "hosvd": {"core_shape": list(core.shape), "singular_values": sv.tolist()},
              "kalman": {"length": len(smoothed), "mean": float(smoothed.mean())},
              "monte_carlo": {k: v for k, v in mc_result.items() if k != "paths"},
              "pca": {"explained_variance_ratio": explained.tolist()},
              "stats": d.stats(),
          }

          out_path = Path("gpu/last_run_summary.json")
          out_path.write_text(json.dumps(summary, indent=2))
          print(json.dumps(summary, indent=2))
          print("[GPU Pipeline] all kernels completed successfully")
          EOF

      - name: Run GPU Kernels — Single
        if: ${{ github.event.inputs.kernel != 'all' && github.event_name == 'workflow_dispatch' }}
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from gpu import GPUManager, GPUDispatcher
          import numpy as np

          kernel = "${{ github.event.inputs.kernel }}"
          mgr = GPUManager()
          print(f"[GPU Pipeline] backend={mgr.backend}  kernel={kernel}")

          # Provide generic test inputs for each kernel
          test_inputs = {
              "tensor_ops.hosvd":         {"feature_matrix": np.random.randn(30, 8).astype(np.float32), "rank": 3},
              "tensor_ops.kalman_smooth": {"observations": np.cumsum(np.random.randn(100)) + 100.0},
              "tensor_ops.monte_carlo":   {"mu": 0.001, "sigma": 0.02, "steps": 20, "n_paths": 200},
              "tensor_ops.regime_softmax":{"scores": np.random.randn(30, 5)},
              "tensor_ops.haar_wavelet":  {"signal": np.random.randn(64)},
              "matrix_ops.matmul":        {"a": np.random.randn(10, 8).astype(np.float32),
                                           "b": np.random.randn(8, 5).astype(np.float32)},
              "matrix_ops.svd_truncated": {"matrix": np.random.randn(20, 8).astype(np.float32), "rank": 3},
              "matrix_ops.pca":           {"data": np.random.randn(50, 10).astype(np.float32), "n_components": 3},
              "matrix_ops.covariance":    {"matrix": np.random.randn(30, 8)},
              "matrix_ops.normalize":     {"matrix": np.random.randn(30, 8).astype(np.float32)},
              "matrix_ops.softmax":       {"logits": np.random.randn(30, 5).astype(np.float32)},
          }

          kwargs = test_inputs.get(kernel, {})
          with GPUDispatcher(manager=mgr) as d:
              future = d.submit(kernel, **kwargs)
              result = future.result()
          print(f"[GPU Pipeline] {kernel} OK — result type={type(result).__name__}")
          EOF

      - name: Commit GPU Pipeline Summary
        run: |
          git config --global user.name  "gpu-pipeline[bot]"
          git config --global user.email "gpu-pipeline[bot]@users.noreply.github.com"
          git add gpu/last_run_summary.json || true
          git commit -m "[GPU Pipeline] Update run summary $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            || echo "No changes to commit"
          git push
