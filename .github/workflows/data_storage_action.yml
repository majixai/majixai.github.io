name: Data Storage Action

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Run script
      run: |
        python - << 'PYEOF'
        import json
        new_link = {'text': 'New Link from Action', 'url': 'https://www.newlinkfromaction.com'}
        with open('menu/menu.json', 'r+') as f:
            data = json.load(f)
            data['links'].append(new_link)
            f.seek(0)
            json.dump(data, f, indent=4)
            f.truncate()
        PYEOF

    - name: Wire MajixActions into menu
      run: python3 actions/extend.py menu

    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add menu/
        if git diff --staged --quiet; then
          echo "No changes to commit."
        else
          git commit -m "data: update menu links + wire MajixActions into menu"
          git push
        fi
