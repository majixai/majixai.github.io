name: Flask App CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r flask_app/requirements.txt

      - name: Fetch SP 1h data + predict pattern
        env:
          SP_TICKER: SPY
          SP_INTERVAL: 1h
          SP_PERIOD: 7d
          SP_LOOKBACK: 48
        run: |
          python flask_app/predict_sp_1h.py

      - name: Run the application
        run: |
          python flask_app/run.py &

      - name: Verify the application is running
        run: |
          sleep 5
          curl -f http://127.0.0.1:5000/health

      - name: Wire MajixActions into flask_app
        run: python3 actions/extend.py flask_app

      - name: Commit MajixActions wiring
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add flask_app/
          if git diff --staged --quiet; then
            echo "No actions wiring changes to commit."
          else
            git commit -m "feat: wire MajixActions into flask_app"
            git push
          fi
