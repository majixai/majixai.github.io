name: JINX Live DB Sync

on:
  schedule:
    # Triggers every minute (effectively ~every 5 mins on GitHub shared runners)
    - cron: '* * * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install pako

      - name: Run Compression Script
        run: node scripts/compress_db.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dbs/performer_images_manifest.dat
          
          # Only commit if the database actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update JINX quantitative DB" && git push)
