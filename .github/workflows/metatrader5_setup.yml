name: MetaTrader5 Package Setup

on:
  workflow_dispatch:
    inputs:
      upgrade:
        description: 'Upgrade to the latest MetaTrader5 version'
        required: false
        default: false
        type: boolean

jobs:
  metatrader5_setup:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install or upgrade MetaTrader5
        run: |
          $flag = if ("${{ github.event.inputs.upgrade }}" -eq "true") { "--upgrade" } else { "" }
          if ($flag) {
            python actions/metatrader5_setup.py --upgrade
          } else {
            python actions/metatrader5_setup.py
          }
        shell: pwsh

      - name: Verify installation
        run: python -c "import MetaTrader5; print('MetaTrader5 version:', MetaTrader5.__version__)"
        shell: pwsh
