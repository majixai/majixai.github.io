name: Integrity Hash Update

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC
  workflow_dispatch:        # Manual trigger via GitHub Actions UI

permissions:
  contents: write           # Required to commit hashes.json back to repo

jobs:
  generate-hashes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate SHA-256 Hashes
        run: |
          python integrity/generate_hashes.py

      - name: Commit Updated Hashes
        run: |
          git config --global user.name  "integrity-bot[bot]"
          git config --global user.email "integrity-bot[bot]@users.noreply.github.com"
          git add -f integrity/hashes.json
          git commit -m "integrity: Update hashes.json - $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            || echo "No changes to commit"
          git push
