name: Financial Email Reports

# ─────────────────────────────────────────────────────────────────────────────
# Schedule summary (all times UTC → convert to local)
#
# Weekdays (Mon–Fri)
#   06:00 UTC  — Pre-market bull screener (stocks + crypto), today & 3-day forecast
#   09:00 UTC  — 9 AM open snapshot + 1/3-day GBM forecasts
#   10:00 UTC  — 10 AM mid-morning report
#   13:00 UTC  — 1 PM indices close summary
#
# Weekends (Sat + Sun)
#   09:00 UTC  — Morning weekly digest
#   22:00 UTC  — Evening weekly digest
#
# Default transport: GAS webhook (email/gas_mailer.gs deployed as GAS Web App)
# Override with transport=smtp for direct Python SMTP sending.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # ── Weekday 6 AM UTC (pre-market open bull screener) ──────────────────────
    - cron: '0 6 * * 1-5'
    # ── Weekday 9 AM UTC ──────────────────────────────────────────────────────
    - cron: '0 9 * * 1-5'
    # ── Weekday 10 AM UTC ─────────────────────────────────────────────────────
    - cron: '0 10 * * 1-5'
    # ── Weekday 1 PM UTC (indices close report) ───────────────────────────────
    - cron: '0 13 * * 1-5'
    # ── Saturday 9 AM UTC ─────────────────────────────────────────────────────
    - cron: '0 9 * * 6'
    # ── Saturday 10 PM UTC ────────────────────────────────────────────────────
    - cron: '0 22 * * 6'
    # ── Sunday 9 AM UTC ───────────────────────────────────────────────────────
    - cron: '0 9 * * 0'
    # ── Sunday 10 PM UTC ──────────────────────────────────────────────────────
    - cron: '0 22 * * 0'

  workflow_dispatch:
    inputs:
      mode:
        description: >
          Report mode to send manually:
          weekday_open | weekday_9am | weekday_10am | weekday_1pm |
          weekend_9am  | weekend_10pm
        required: false
        default: 'weekday_open'
      transport:
        description: >
          Email transport.  'gas' (default) POSTs to the GAS Web App webhook
          (set GAS_WEBHOOK_URL + GAS_WEBHOOK_SECRET secrets).
          'smtp' uses Python smtplib (set SMTP_* secrets).
        required: false
        default: 'gas'
      dry_run:
        description: 'Print report without sending email (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: financial-email-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-financial-email:
    name: Send Financial Email Report
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── 3. Dependencies ──────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy scipy

      # ── 4. Determine report mode from cron schedule ──────────────────────────
      #
      #  GitHub Actions does not expose the matched cron rule directly, so we
      #  determine the mode by inspecting the current UTC hour and day-of-week.
      #
      - name: Determine report mode
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "INFO: Manual mode override: ${{ github.event.inputs.mode }}"
          else
            HOUR=$(date -u +%H)
            # ISO week-day: 1=Mon … 6=Sat … 7=Sun  (note: differs from JS Date.getDay() 0=Sun…6=Sat)
            DOW=$(date -u +%u)
            echo "INFO: UTC hour=${HOUR}  day-of-week=${DOW}"

            if [ "$DOW" -eq 6 ] || [ "$DOW" -eq 7 ]; then
              # Weekend: Sat=6, Sun=7
              if [ "$HOUR" -eq 9 ]; then
                MODE="weekend_9am"
              else
                MODE="weekend_10pm"
              fi
            else
              # Weekday
              case "$HOUR" in
                6)  MODE="weekday_open"  ;;
                9)  MODE="weekday_9am"   ;;
                10) MODE="weekday_10am"  ;;
                13) MODE="weekday_1pm"   ;;
                *)  MODE="weekday_open"  ;;
              esac
            fi
            echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
            echo "INFO: Resolved mode: ${MODE}"
          fi

      # ── 5. Generate & send report ─────────────────────────────────────────────
      #
      # Transport selection (evaluated in priority order):
      #   1. workflow_dispatch input  (transport: gas | smtp)
      #   2. EMAIL_TRANSPORT env var  (set in repo/env variables)
      #   3. Default: gas
      #
      - name: Send financial email report
        env:
          # ── GAS webhook transport (default) ──
          EMAIL_GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          EMAIL_GAS_SECRET:      ${{ secrets.GAS_WEBHOOK_SECRET }}
          RECIPIENT_EMAILS:      ${{ secrets.RECIPIENT_EMAILS }}

          # ── SMTP transport (opt-in) ───────────
          SMTP_SERVER:           ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME:         ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:         ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL:          ${{ secrets.SENDER_EMAIL }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          TRANSPORT="${{ github.event.inputs.transport || 'gas' }}"

          echo "INFO: mode=${MODE}  transport=${TRANSPORT}"

          EXTRA_FLAGS="--transport ${TRANSPORT}"
          if [ "$DRY" = "true" ]; then
            EXTRA_FLAGS="${EXTRA_FLAGS} --dry-run"
          fi

          python email/send_email.py --mode "$MODE" $EXTRA_FLAGS \
            --out /tmp/report_latest.html

          echo "SUCCESS: Email step complete."

      # ── 6. Upload HTML report as artifact (14-day retention) ─────────────────
      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: financial-report-${{ steps.mode.outputs.mode }}-${{ github.run_number }}
          path: /tmp/report_latest.html
          retention-days: 14
          if-no-files-found: ignore

      # ── 7. Optional: dispatch a GitHub repository_dispatch event back to repo ─
      # This lets other workflows or external services react to a sent report.
      # Fires only when the GAS transport is used and the run is not a dry-run.
      - name: Notify GitHub (repository_dispatch)
        if: >
          github.event.inputs.dry_run != 'true' &&
          (github.event.inputs.transport == 'gas' ||
           github.event.inputs.transport == '')
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: financial_email_sent
          client-payload: |
            {
              "mode": "${{ steps.mode.outputs.mode }}",
              "transport": "${{ github.event.inputs.transport || 'gas' }}",
              "run_id": "${{ github.run_id }}"
            }
