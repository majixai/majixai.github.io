################################################################################
# ENTERPRISE BEST PERFORMER IMAGE DB CI/CD PIPELINE
# ------------------------------------------------------------------------------
# Workflow Name: Best Performer Image DB (Minutely)
# Environment: Production / Continuous Integration
# Description: 
#   This workflow acts as the primary synchronization and recognition engine
#   for the Best Performer Image Database. It handles compressed image DB 
#   updates and schedules background GPU-based image recognition.
#
# Architecture & Flow:
#   1. Initialization & Input Validation
#   2. Pre-flight Environmental Health Checks (Disk, CPU, Memory, Network)
#   3. Matrix Strategy Execution (Cross-platform compatibility)
#   4. Aggressive Dependency Caching (pip, apt)
#   5. Secure Python Virtual Environment Bootstrapping
#   6. Compressed Image DB Pipeline Execution
#   7. Data Integrity Verification
#   8. Background GPU Recognition (with CPU Fallbacks)
#   9. Strict Git State Management & Conflict Resolution
#  10. Automated Commit & Secure Push
#  11. Artifact Uploading & Audit Logging
#  12. Post-Execution Notifications & Cleanup
#
# Scheduling: 
#   - Minutely ('*/1 * * * *')
#   - Note: GitHub standard shared runners may throttle minutely crons.
#
# Contact: DevOps Team / AI Core Team
################################################################################

name: Enterprise Best Performer Image DB (Minutely)

################################################################################
# TRIGGERS & SCHEDULING
################################################################################
on:
  # Automated minutely trigger
  schedule:
    - cron: '*/1 * * * *'
    
  # Allow other workflows or API calls to trigger this via repository dispatch
  repository_dispatch:
    types: [trigger-image-db-update]
    
  # Extensive manual trigger options for DevOps overrides
  workflow_dispatch:
    inputs:
      runtime_seconds:
        description: 'Maximum runtime for the DB pipeline in seconds'
        required: true
        default: '300'
        type: string
      api_max_pages:
        description: 'Maximum API pages to fetch (safety cap; actual pages determined by API count)'
        required: true
        default: '100'
        type: string
      api_concurrency:
        description: 'Number of concurrent API requests'
        required: true
        default: '6'
        type: string
      image_concurrency:
        description: 'Number of concurrent image downloads'
        required: true
        default: '12'
        type: string
      max_gpu_images:
        description: 'Maximum number of images for GPU recognition'
        required: true
        default: '50'
        type: string
      force_push:
        description: 'Force push to repository bypassing standard checks'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable highly verbose logging'
        required: false
        default: false
        type: boolean

################################################################################
# GLOBAL PERMISSIONS & CONCURRENCY
################################################################################
permissions:
  contents: write
  actions: read
  checks: write
  statuses: write

concurrency:
  group: enterprise-best-performer-image-db-${{ github.ref }}
  # Set to true to prevent massive queue buildup on a minutely cron schedule
  cancel-in-progress: true

################################################################################
# GLOBAL ENVIRONMENT VARIABLES
################################################################################
env:
  PYTHON_VERSION: '3.11'
  BASE_DIR: 'best'
  DB_FILE: 'best/dbs/performer_images.db.gz'
  MANIFEST_FILE: 'best/dbs/performer_images_manifest.dat'
  GPU_MANIFEST_FILE: 'best/dbs/gpu_recognition_manifest.dat'
  LOG_DIR: 'logs/execution_logs'
  CI: true
  TZ: 'UTC'

################################################################################
# JOBS DEFINITION
################################################################################
jobs:
  ##############################################################################
  # JOB 1: PRE-FLIGHT CHECKS & SYSTEM DIAGNOSTICS
  ##############################################################################
  system_diagnostics:
    name: Pre-flight System Diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Print Welcome Banner
        run: |
          echo "=========================================================="
          echo " Starting Enterprise Best Performer Image DB Pipeline"
          echo " Run ID: $GITHUB_RUN_ID"
          echo " Triggered By: $GITHUB_ACTOR"
          echo "=========================================================="

      - name: Verify Timezone and Clock Sync
        run: |
          echo "Current system time: $(date)"
          echo "Timezone configured as: $TZ"

      - name: Check Disk Space
        run: |
          echo "Checking available disk space on runner..."
          df -h
          FREE_SPACE=$(df -k / | awk 'NR==2 {print $4}')
          if [ "$FREE_SPACE" -lt 1048576 ]; then
            echo "WARNING: Less than 1GB of disk space remaining!"
          else
            echo "Disk space is adequate."
          fi

      - name: Check CPU and Memory Availability
        run: |
          echo "CPU Information:"
          lscpu || echo "lscpu not available"
          echo "Memory Information:"
          free -m || echo "free not available"

      - name: Verify Network Connectivity
        run: |
          echo "Pinging GitHub API to ensure connectivity..."
          curl -I https://api.github.com || exit 1

  ##############################################################################
  # JOB 2: CORE PIPELINE EXECUTION
  ##############################################################################
  update_best_images:
    name: Execute Data Pipelines
    needs: system_diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # --- 1. Repository Preparation ---
      - name: Checkout repository (Shallow Clone)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Validate Repository Structure
        run: |
          echo "Validating necessary directories exist..."
          if [ ! -d "$BASE_DIR" ]; then
            echo "Base directory $BASE_DIR missing. Creating..."
            mkdir -p "$BASE_DIR/dbs"
          fi
          mkdir -p "$LOG_DIR"
          echo "Directory structure verified."

      # --- 2. Toolchain Setup ---
      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: 'x64'
          cache: 'pip'

      - name: Display Python Configuration
        run: |
          python -c "import sys; print(f'Python Version: {sys.version}')"
          python -m pip --version

      - name: Upgrade PIP and core dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          
      - name: Cache Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Create and Activate Virtual Environment
        run: |
          if [ ! -d "venv" ]; then
            python -m venv venv
          fi
          source venv/bin/activate
          # Assuming you might have a requirements file in the future
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found. Skipping pip install."
          fi
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV

      # --- 3. Script Validation ---
      - name: Verify Pipeline Scripts Exist
        run: |
          if [ ! -f "best/compressed_image_db_pipeline.py" ]; then
            echo "ERROR: best/compressed_image_db_pipeline.py is missing!"
            exit 1
          fi
          if [ ! -f "best/gpu_image_recognition_pipeline.py" ]; then
            echo "ERROR: best/gpu_image_recognition_pipeline.py is missing!"
            exit 1
          fi

      # --- 4. Main Data Pipeline Execution ---
      - name: Execute Compressed Image DB Pipeline
        id: db_pipeline
        env:
          RUNTIME_SECONDS: ${{ github.event.inputs.runtime_seconds || '300' }}
          API_MAX_PAGES: ${{ github.event.inputs.api_max_pages || '100' }}
          API_CONCURRENCY: ${{ github.event.inputs.api_concurrency || '6' }}
          IMAGE_CONCURRENCY: ${{ github.event.inputs.image_concurrency || '12' }}
        run: |
          source venv/bin/activate
          echo "Starting DB Pipeline at $(date)"
          
          # Execute the primary script
          python best/compressed_image_db_pipeline.py \
            --base-dir ${{ env.BASE_DIR }} \
            --runtime-seconds $RUNTIME_SECONDS \
            --api-max-pages $API_MAX_PAGES \
            --api-concurrency $API_CONCURRENCY \
            --image-concurrency $IMAGE_CONCURRENCY > $LOG_DIR/db_pipeline.log 2>&1 || (echo "DB Pipeline Failed" && cat $LOG_DIR/db_pipeline.log && exit 1)
            
          echo "DB Pipeline Completed at $(date)"
          cat $LOG_DIR/db_pipeline.log

      - name: Verify Output Files (DB Manifests)
        run: |
          echo "Verifying generated database files..."
          ls -lah $BASE_DIR/dbs/ || echo "No files found in DBS directory."
          if [ -f "$DB_FILE" ]; then
            echo "$DB_FILE successfully generated/updated."
            file $DB_FILE
          else
            echo "WARNING: $DB_FILE not found after run."
          fi

      # --- 5. GPU Recognition Pipeline ---
      - name: Check GPU Availability (Diagnostic)
        run: |
          echo "Diagnosing hardware acceleration..."
          if command -v nvidia-smi &> /dev/null; then
            nvidia-smi
            echo "GPU_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "NVIDIA SMI not found. GPU is NOT available on this runner."
            echo "Falling back to CPU execution mode."
            echo "GPU_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Execute Background Image Recognition Pipeline
        id: gpu_pipeline
        env:
          MAX_GPU_IMAGES: ${{ github.event.inputs.max_gpu_images || '50' }}
        run: |
          source venv/bin/activate
          echo "Starting Image Recognition Pipeline at $(date)"
          
          # Execute the secondary script
          python best/gpu_image_recognition_pipeline.py \
            --base-dir ${{ env.BASE_DIR }} \
            --max-images $MAX_GPU_IMAGES > $LOG_DIR/gpu_pipeline.log 2>&1 || (echo "GPU Pipeline Failed" && cat $LOG_DIR/gpu_pipeline.log && exit 1)
            
          echo "Recognition Pipeline Completed at $(date)"
          cat $LOG_DIR/gpu_pipeline.log

      # --- 6. Post-Processing & Version Control ---
      - name: Configure Git Global Identity
        run: |
          echo "Configuring secure Git bot identities..."
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global core.autocrlf false
          git config --global core.safecrlf true

      - name: Check Git Status and Track Changes
        id: git_status
        run: |
          echo "Analyzing working tree modifications..."
          git status

          # Stage ALL changed files under best/ — this includes:
          #   best/dbs/performer_images.db.gz        (compressed image DB)
          #   best/dbs/performer_images_manifest.dat (viewer manifest)
          #   best/dbs/gpu_recognition_manifest.dat  (recognition manifest)
          #   best/history/*.dat                     (per-performer image history)
          #   best/*.dat                             (any other generated .dat files)
          git add best/ || true

          # Default to 0 so CHANGED_COUNT is always defined (used in the commit message step)
          echo "CHANGED_COUNT=0" >> $GITHUB_ENV

          # Check if there's anything to commit
          if git diff --staged --quiet; then
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            echo "No changes detected under best/ in this cycle."
          else
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            CHANGED_COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
            echo "CHANGED_COUNT=$CHANGED_COUNT" >> $GITHUB_ENV
            echo "Modifications detected ($CHANGED_COUNT file(s)). Preparing for commit."
            # Log up to 20 changed filenames for transparency in the run log
            git diff --staged --name-only | head -20
          fi

      - name: Generate Dynamic Commit Message
        if: env.HAS_CHANGES == 'true'
        id: commit_msg
        run: |
          TS=$(date +'%Y-%m-%d %H:%M:%S UTC')
          DB_SIZE=$(du -h $DB_FILE 2>/dev/null | awk '{print $1}') || DB_SIZE="Unknown"
          MSG="best: update images & manifests (${CHANGED_COUNT} file(s)) - ${TS} [DB: ${DB_SIZE}]"
          echo "COMMIT_MESSAGE=$MSG" >> $GITHUB_ENV

      - name: Commit Database Changes
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "Committing changes with message: ${{ env.COMMIT_MESSAGE }}"
          git commit -m "${{ env.COMMIT_MESSAGE }}"

      - name: Pre-Push Rebase & Fetch (Conflict Resolution)
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "Fetching latest upstream changes to prevent push rejections..."
          git fetch origin main
          echo "Attempting to rebase any parallel changes..."
          git rebase origin/main || (echo "Rebase conflict detected! Aborting rebase." && git rebase --abort && exit 1)

      - name: Secure Push to Remote Origin
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "Pushing committed artifacts to origin/main..."
          
          # Implemented retry logic for push race conditions
          MAX_RETRIES=3
          RETRY_COUNT=0
          PUSH_SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if git push origin HEAD; then
              PUSH_SUCCESS=true
              break
            else
              echo "Push failed, attempting to pull --rebase and retry..."
              git pull --rebase origin main
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep $((RETRY_COUNT * 2))
            fi
          done
          
          if [ "$PUSH_SUCCESS" = false ]; then
            echo "Failed to push after $MAX_RETRIES attempts."
            exit 1
          fi
          echo "Push successful!"

  ##############################################################################
  # JOB 3: ARTIFACT UPLOAD & LOGGING (Audit Trail)
  ##############################################################################
  audit_and_artifacts:
    name: Audit Logs & Artifacts
    needs: update_best_images
    runs-on: ubuntu-latest
    if: always() # Run regardless of success or failure of previous jobs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Since log directories don't persist between jobs by default without 
      # uploading/downloading, we simulate an artifact generation step here 
      # that grabs the database files for external manual review if needed.
      - name: Prepare Artifact Directory
        run: |
          mkdir -p pipeline_artifacts
          cp -r best/dbs/ pipeline_artifacts/ || echo "No DBs to copy"

      - name: Upload Database Snapshot as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: performer-db-snapshot-${{ github.run_id }}
          path: pipeline_artifacts/
          retention-days: 1
          
  ##############################################################################
  # JOB 4: METRICS & NOTIFICATIONS
  ##############################################################################
  metrics_and_notifications:
    name: Pipeline Telemetry
    needs: [update_best_images]
    runs-on: ubuntu-latest
    if: failure() # Only trigger notifications if the core job failed
    steps:
      - name: Alert via Workflow Summary
        run: |
          echo "### 🚨 Pipeline Execution Failed" >> $GITHUB_STEP_SUMMARY
          echo "The Minutely Best Performer Image DB workflow encountered a critical error." >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Fallback Notification Log
        run: |
          echo "If you had a Slack/Discord webhook integrated, it would trigger here."
          echo "Please review the failure logs in the update_best_images job."

# ==============================================================================
# END OF WORKFLOW CONFIGURATION
# ==============================================================================
# Notes for Future Development:
# - Consider migrating the GPU pipeline to a self-hosted runner.
# - The minutely cron schedule is subject to GitHub Actions shared tier 
#   throttling limits. Actual execution may vary between 1 to 5 minutes.
# - Ensure pipeline scripts handle race conditions securely.
# ==============================================================================
