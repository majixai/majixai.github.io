name: R Language Processing

on:
  push:
    paths:
      - '**/*.R'
      - 'rlang/**'
      - '.github/workflows/rlang.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.R'
      - 'rlang/**'
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dirs:
        description: 'Colon-separated directories to scan (blank = all)'
        required: false
        default: ''
      dry_run:
        description: 'List scripts without running (1 = dry run)'
        required: false
        default: '0'
      log_level:
        description: 'Log level: DEBUG | INFO | WARN | ERROR'
        required: false
        default: 'INFO'

jobs:
  run-r-scripts:
    name: Run R Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e "
            pkgs <- c('jsonlite', 'MASS', 'Matrix', 'pracma', 'Deriv')
            missing <- pkgs[!pkgs %in% installed.packages()[,'Package']]
            if (length(missing) > 0) {
              install.packages(missing, repos = 'https://cloud.r-project.org')
            }
          "

      - name: Discover R scripts (dry run)
        run: |
          RLANG_DRY_RUN=1 \
          RLANG_LOG_LEVEL=INFO \
          Rscript rlang/runner.R

      - name: Run all R scripts
        env:
          RLANG_DIRS: ${{ github.event.inputs.dirs }}
          RLANG_DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
          RLANG_LOG_LEVEL: ${{ github.event.inputs.log_level || 'INFO' }}
          RLANG_TIMEOUT: '300'
        run: Rscript rlang/runner.R

      - name: Upload runner results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlang-runner-results
          path: rlang/runner_results.json
          if-no-files-found: ignore

      - name: Upload R script outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rlang-script-outputs
          path: |
            **/prediction_results*.json
            **/prediction_results*.csv
          if-no-files-found: ignore
