name: PWA Auto-Provision

on:
  # Run whenever files are pushed to main (catches new directories being added)
  push:
    branches:
      - main

  # Allow manual triggering (e.g. to back-fill existing directories)
  workflow_dispatch:
    inputs:
      force_reprovision:
        description: 'Re-provision even if manifest/sw already exist'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  provision_pwa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Provision standalone PWA files for new directories
        env:
          FORCE_REPROVISION: ${{ inputs.force_reprovision || 'false' }}
        run: |
          python << 'EOF'
          import os
          import json
          import re
          from pathlib import Path

          EXCLUDE_DIRS = {
              '.git', '.github', '__pycache__', 'node_modules',
              'icons', '.vscode', 'scripts'
          }

          # A palette of theme colours; one is picked deterministically per directory.
          THEME_COLORS = [
              '#2c3e50', '#3498db', '#e74c3c', '#2ecc71',
              '#9b59b6', '#f39c12', '#1abc9c', '#e67e22',
              '#16a085', '#8e44ad', '#d35400', '#27ae60',
          ]

          FORCE = os.environ.get('FORCE_REPROVISION', 'false').lower() == 'true'

          def get_title_from_html(html_path):
              try:
                  content = Path(html_path).read_text(encoding='utf-8', errors='ignore')
                  m = re.search(r'<title>([^<]+)</title>', content, re.IGNORECASE)
                  if m:
                      return m.group(1).strip()
              except Exception:
                  pass
              return None

          def dir_to_name(dir_name):
              return dir_name.replace('_', ' ').replace('-', ' ').title()

          def get_theme_color(dir_name):
              idx = sum(ord(c) for c in dir_name) % len(THEME_COLORS)
              return THEME_COLORS[idx]

          def get_icon_char(name):
              for c in name:
                  if c.strip():
                      return c.upper()
              return '?'

          def build_manifest(app_name, theme_color, icon_char):
              short_name = app_name if len(app_name) <= 12 else app_name[:12]
              # Percent-encode '#' so the data URI is valid inside JSON
              color_encoded = theme_color.replace('#', '%23')
              icon_svg = (
                  "data:image/svg+xml,"
                  "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>"
                  f"<rect fill='{color_encoded}' width='100' height='100' rx='15'/>"
                  f"<text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>"
                  f"{icon_char}</text></svg>"
              )
              return {
                  "name": app_name,
                  "short_name": short_name,
                  "description": f"{app_name} - A standalone web application",
                  "start_url": "./index.html",
                  "scope": "./",
                  "display": "standalone",
                  "background_color": "#ffffff",
                  "theme_color": theme_color,
                  "icons": [
                      {
                          "src": icon_svg,
                          "sizes": "192x192",
                          "type": "image/svg+xml",
                          "purpose": "any maskable"
                      }
                  ]
              }

          def build_sw(app_name, cache_slug):
              return """\
// Service Worker for {app_name} PWA – auto-generated by pwa_provision workflow
const CACHE_VERSION = '{cache_slug}-v1';
const APP_SHELL_CACHE = `${{CACHE_VERSION}}-shell`;
const RUNTIME_CACHE   = `${{CACHE_VERSION}}-runtime`;

const APP_SHELL_FILES = [
  './',
  './index.html',
  './manifest.json',
];

const TRUSTED_CDN_HOSTS = [
  'www.w3schools.com',
  'cdn.jsdelivr.net',
  'cdnjs.cloudflare.com',
  'code.jquery.com',
];

self.addEventListener('install', (event) => {{
  event.waitUntil(
    caches.open(APP_SHELL_CACHE)
      .then((cache) => cache.addAll(APP_SHELL_FILES))
      .then(() => self.skipWaiting())
  );
}});

self.addEventListener('activate', (event) => {{
  event.waitUntil(
    caches.keys()
      .then((keys) =>
        Promise.all(
          keys
            .filter((key) => !key.startsWith(CACHE_VERSION))
            .map((key) => caches.delete(key))
        )
      )
      .then(() => self.clients.claim())
  );
}});

async function cacheFirst(request) {{
  const cached = await caches.match(request);
  if (cached) return cached;
  const response = await fetch(request);
  if (response && response.ok) {{
    const cache = await caches.open(RUNTIME_CACHE);
    cache.put(request, response.clone());
  }}
  return response;
}}

async function networkFirst(request) {{
  try {{
    const response = await fetch(request);
    if (response && response.ok) {{
      const cache = await caches.open(RUNTIME_CACHE);
      cache.put(request, response.clone());
    }}
    return response;
  }} catch (err) {{
    const cached = await caches.match(request);
    if (cached) return cached;
    return caches.match('./index.html');
  }}
}}

self.addEventListener('fetch', (event) => {{
  const {{ request }} = event;
  if (request.method !== 'GET') return;

  const url = new URL(request.url);

  if (request.mode === 'navigate') {{
    event.respondWith(networkFirst(request));
    return;
  }}

  if (url.origin === self.location.origin) {{
    event.respondWith(cacheFirst(request));
    return;
  }}

  if (TRUSTED_CDN_HOSTS.includes(url.hostname)) {{
    event.respondWith(cacheFirst(request));
    return;
  }}

  event.respondWith(fetch(request));
}});
""".format(app_name=app_name, cache_slug=cache_slug)

          def patch_index_html(html_path, theme_color):
              """Inject manifest link, theme-color meta, and SW registration into index.html."""
              try:
                  content = Path(html_path).read_text(encoding='utf-8', errors='ignore')
              except Exception as e:
                  print(f'    Warning: could not read {html_path}: {e}')
                  return False

              modified = False

              # 1. Manifest link
              if 'manifest.json' not in content and 'manifest.webmanifest' not in content:
                  manifest_tag = '  <link rel="manifest" href="manifest.json">\n'
                  content = re.sub(
                      r'(<head(?:\s[^>]*)?>)',
                      r'\1\n' + manifest_tag,
                      content, count=1, flags=re.IGNORECASE
                  )
                  modified = True

              # 2. theme-color meta
              if 'theme-color' not in content:
                  theme_meta = f'  <meta name="theme-color" content="{theme_color}">\n'
                  content = re.sub(
                      r'(<head(?:\s[^>]*)?>)',
                      r'\1\n' + theme_meta,
                      content, count=1, flags=re.IGNORECASE
                  )
                  modified = True

              # 3. Service-worker registration (before </body>)
              if 'serviceWorker' not in content:
                  sw_script = (
                      "  <script>\n"
                      "    if ('serviceWorker' in navigator) {\n"
                      "      navigator.serviceWorker.register('./sw.js').catch((err) => console.error('SW registration failed:', err));\n"
                      "    }\n"
                      "  </script>\n"
                  )
                  if re.search(r'</body>', content, re.IGNORECASE):
                      content = re.sub(
                          r'(</body>)',
                          sw_script + r'\1',
                          content, count=1, flags=re.IGNORECASE
                      )
                  else:
                      content += '\n' + sw_script
                  modified = True

              if modified:
                  try:
                      Path(html_path).write_text(content, encoding='utf-8')
                  except Exception as e:
                      print(f'    Warning: could not write {html_path}: {e}')
                      return False

              return modified

          # ── Main scan ────────────────────────────────────────────────────────────
          base_path = os.getcwd()
          provisioned = []

          for item in sorted(os.listdir(base_path)):
              item_path = os.path.join(base_path, item)

              if not os.path.isdir(item_path):
                  continue
              if item.startswith('.') or item in EXCLUDE_DIRS:
                  continue

              index_html = os.path.join(item_path, 'index.html')
              if not os.path.exists(index_html):
                  continue  # Only provision directories that have an index.html

              manifest_path = os.path.join(item_path, 'manifest.json')
              manifest_wm   = os.path.join(item_path, 'manifest.webmanifest')
              sw_path        = os.path.join(item_path, 'sw.js')

              has_manifest = os.path.exists(manifest_path) or os.path.exists(manifest_wm)
              has_sw       = os.path.exists(sw_path)

              if has_manifest and has_sw and not FORCE:
                  continue  # Already fully provisioned

              print(f'Provisioning PWA for: {item}')

              html_title  = get_title_from_html(index_html)
              app_name    = html_title or dir_to_name(item)
              theme_color = get_theme_color(item)
              icon_char   = get_icon_char(app_name)
              cache_slug  = re.sub(r'[^a-z0-9]+', '-', item.lower()).strip('-')

              # Generate manifest.json (skip if already present unless forced)
              if not has_manifest or FORCE:
                  manifest = build_manifest(app_name, theme_color, icon_char)
                  with open(manifest_path, 'w', encoding='utf-8') as f:
                      json.dump(manifest, f, indent=2)
                  print(f'  + manifest.json')

              # Generate sw.js (skip if already present unless forced)
              if not has_sw or FORCE:
                  sw_content = build_sw(app_name, cache_slug)
                  with open(sw_path, 'w', encoding='utf-8') as f:
                      f.write(sw_content)
                  print(f'  + sw.js')

              # Patch index.html to wire up the PWA
              patched = patch_index_html(index_html, theme_color)
              if patched:
                  print(f'  ~ index.html (patched)')

              provisioned.append(item)

          print()
          if provisioned:
              print(f'Done – provisioned {len(provisioned)} director(ies): {", ".join(provisioned)}')
          else:
              print('Done – all eligible directories already have PWA files.')
          EOF

      - name: Configure Git
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and push generated PWA files
        run: |
          git add -A

          if git diff --staged --quiet; then
            echo "No new PWA files to commit."
          else
            DIRS=$(git diff --staged --name-only | grep -oE '^[^/]+' | sort -u | tr '\n' ' ')
            git commit -m "pwa: auto-provision standalone PWA files [${DIRS}]"
            git push
            echo "PWA files pushed successfully."
          fi

      - name: Summary
        run: |
          echo "## PWA Auto-Provision Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null | grep -cE '(manifest\.json|sw\.js)' || echo 0)
          echo "**PWA files committed:** $CHANGED" >> $GITHUB_STEP_SUMMARY
