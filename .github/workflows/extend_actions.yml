name: Extend Actions to New Sibling Directories

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_dir:
        description: 'Specific directory to extend (leave blank to auto-detect)'
        required: false
        default: ''
      force:
        description: 'Overwrite generated files where applicable'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  extend_actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect new directories
        id: detect
        env:
          MANUAL_TARGET: ${{ github.event.inputs.target_dir }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          manual_target = os.environ.get("MANUAL_TARGET", "").strip()
          force = os.environ.get("FORCE", "false").lower() == "true"

          EXCLUDE = {
              '.git', '.github', '__pycache__', 'node_modules', '.vscode',
              'icons', 'dbs', 'csv', '__MACOSX', 'actions'
          }

          def is_candidate(name: str) -> bool:
              p = Path(name)
              return p.is_dir() and not name.startswith('.') and name not in EXCLUDE

          if manual_target:
              targets = [manual_target] if is_candidate(manual_target) else []
          else:
              try:
                  result = subprocess.run(
                      ["git", "diff", "--name-only", "--diff-filter=A", "HEAD~1", "HEAD"],
                      capture_output=True, text=True, check=True
                  )
                  diff_output = result.stdout
              except subprocess.CalledProcessError:
                  result = subprocess.run(
                      ["git", "diff-tree", "--no-commit-id", "-r", "--name-only", "--diff-filter=A", "HEAD"],
                      capture_output=True, text=True
                  )
                  diff_output = result.stdout

              changed_dirs = {line.split("/")[0] for line in diff_output.splitlines() if line.strip()}
              targets = [d for d in sorted(changed_dirs) if is_candidate(d)]

          print(f"Candidate directories: {targets}", file=sys.stderr)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"targets={json.dumps(targets)}\n")
              fh.write(f"force={'true' if force else 'false'}\n")
              fh.write(f"has_targets={'true' if targets else 'false'}\n")
          PYEOF

      - name: Extend actions template
        if: steps.detect.outputs.has_targets == 'true'
        env:
          TARGETS: ${{ steps.detect.outputs.targets }}
          FORCE: ${{ steps.detect.outputs.force }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys

          targets = json.loads(os.environ.get("TARGETS", "[]"))
          force = os.environ.get("FORCE", "false") == "true"

          if not targets:
              print("No targets — nothing to do.")
              sys.exit(0)

          force_flag = ["--force"] if force else []

          for target in targets:
              print(f"\n{'='*60}")
              print(f"  Extending actions into: {target}")
              print(f"{'='*60}")
              result = subprocess.run(["python3", "actions/extend.py", target] + force_flag, capture_output=False)
              if result.returncode != 0:
                  print(f"ERROR: actions/extend.py failed for {target}", file=sys.stderr)
                  sys.exit(result.returncode)
          PYEOF

      - name: Commit and push actions files
        if: steps.detect.outputs.has_targets == 'true'
        env:
          TARGETS: ${{ steps.detect.outputs.targets }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .

          if git diff --staged --quiet; then
            echo "No new actions files to commit."
          else
            DIRS=$(python3 -c "
          import json, os
          t = json.loads(os.environ['TARGETS'])
          label = ', '.join(t[:3])
          if len(t) > 3:
              label += f' (+{len(t)-3} more)'
          print(label)
          ")
            git commit -m "feat: extend actions to new dirs — ${DIRS}"
            git push
            echo "Actions files committed and pushed."
          fi

      - name: Write job summary
        if: always()
        env:
          TARGETS: ${{ steps.detect.outputs.targets }}
          HAS_TARGETS: ${{ steps.detect.outputs.has_targets }}
        run: |
          {
            echo "## ⚡ Actions Extender Summary"
            echo ""
            echo "**Trigger:** \`${{ github.event_name }}\`"
            echo "**Ref:**     \`${{ github.ref }}\`"
            echo "**Time:**    $(date +'%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            if [ "$HAS_TARGETS" = "true" ]; then
              python3 -c "
          import json, os
          targets = json.loads(os.environ.get('TARGETS','[]'))
          for t in targets:
              print(f'- ✅ \`{t}/\` — actions workflow extended')
          "
            else
              echo "- ℹ️ No new directories detected — nothing to do."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
