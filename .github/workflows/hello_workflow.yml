name: Hello World Python

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.x
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Run Python Script
      run: python jinx/hello.py

    - name: Wire MajixActions into jinx
      run: python3 actions/extend.py jinx

    - name: Commit MajixActions wiring
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add jinx/
        if git diff --staged --quiet; then
          echo "No actions wiring changes to commit."
        else
          git commit -m "feat: wire MajixActions into jinx"
          git push
        fi
