name: JINXAI Tensor Forecast Engine

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Manual trigger via GitHub Actions UI

permissions:
  contents: write             # Required to commit tensor_forecast.json back to repo

jobs:
  tensor-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Tensor Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas

      - name: Run JINXAI Tensor Engine
        run: |
          python tradingview_integration/tensor_engine.py

      - name: Commit Tensor Forecast Output
        run: |
          git config --global user.name  "jinxai-tensor[bot]"
          git config --global user.email "jinxai-tensor[bot]@users.noreply.github.com"
          git add tradingview_integration/data/tensor_forecast.json
          # Use || echo to avoid failing if data hasn't changed since the last run
          git commit -m "[JINXAI Tensor] Update forecast $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            || echo "No changes to commit"
          git push
