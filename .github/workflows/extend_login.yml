name: Extend Login to New Sibling Directories

# Watches every push to main.  When new top-level directories are detected,
# it automatically copies the standalone login template (from login/) into
# each new directory and commits the result back to the branch.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_dir:
        description: 'Specific directory to extend (leave blank to auto-detect)'
        required: false
        default: ''
      force:
        description: 'Overwrite existing login files'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  extend_login:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0          # need full history to compare commits

      # ── 2. Detect new top-level directories ──────────────────────
      - name: Detect new directories
        id: detect
        env:
          MANUAL_TARGET: ${{ github.event.inputs.target_dir }}
          FORCE:         ${{ github.event.inputs.force }}
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os, sys
          from pathlib import Path

          manual_target = os.environ.get("MANUAL_TARGET", "").strip()
          force         = os.environ.get("FORCE", "false").lower() == "true"

          EXCLUDE = {
            'login', '.git', '.github', '__pycache__', 'node_modules',
            'icons', '.vscode', 'dbs', 'csv', '__MACOSX'
          }

          def is_candidate(name: str) -> bool:
              p = Path(name)
              return (
                  p.is_dir()
                  and not name.startswith('.')
                  and name not in EXCLUDE
              )

          if manual_target:
              # Honour an explicit manual target
              targets = [manual_target] if is_candidate(manual_target) else []
          else:
              # Find directories that were ADDED in this push.
              # Handle edge case where HEAD~1 may not exist (first commit / shallow clone).
              try:
                  result = subprocess.run(
                      ["git", "diff", "--name-only", "--diff-filter=A",
                       "HEAD~1", "HEAD"],
                      capture_output=True, text=True, check=True
                  )
                  diff_output = result.stdout
              except subprocess.CalledProcessError:
                  # Fallback: list all files in the current commit
                  result = subprocess.run(
                      ["git", "diff-tree", "--no-commit-id", "-r",
                       "--name-only", "--diff-filter=A", "HEAD"],
                      capture_output=True, text=True
                  )
                  diff_output = result.stdout

              changed_dirs = set()
              for line in diff_output.splitlines():
                  top = line.split("/")[0]
                  changed_dirs.add(top)

              targets = [d for d in changed_dirs if is_candidate(d)]

          print(f"Candidate directories: {targets}", file=sys.stderr)

          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"targets={json.dumps(targets)}\n")
              fh.write(f"force={'true' if force else 'false'}\n")
              fh.write(f"has_targets={'true' if targets else 'false'}\n")
          PYEOF

      # ── 3. Extend login into each new directory ───────────────────
      - name: Extend login template
        if: steps.detect.outputs.has_targets == 'true'
        env:
          TARGETS: ${{ steps.detect.outputs.targets }}
          FORCE:   ${{ steps.detect.outputs.force }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os, sys
          from pathlib import Path

          targets = json.loads(os.environ.get("TARGETS", "[]"))
          force   = os.environ.get("FORCE", "false") == "true"

          if not targets:
              print("No targets — nothing to do.")
              sys.exit(0)

          force_flag = ["--force"] if force else []

          for target in targets:
              print(f"\n{'='*60}")
              print(f"  Extending login into: {target}")
              print(f"{'='*60}")
              result = subprocess.run(
                  ["python3", "login/extend.py", target] + force_flag,
                  capture_output=False
              )
              if result.returncode != 0:
                  print(f"ERROR: extend.py failed for {target}", file=sys.stderr)
                  sys.exit(result.returncode)
          PYEOF

      # ── 4. Commit and push ────────────────────────────────────────
      - name: Commit and push login files
        if: steps.detect.outputs.has_targets == 'true'
        env:
          TARGETS: ${{ steps.detect.outputs.targets }}
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add .
          if git diff --staged --quiet; then
            echo "No new login files to commit."
          else
            DIRS=$(python3 -c "
          import json, os
          t = json.loads(os.environ['TARGETS'])
          label = ', '.join(t[:3])
          if len(t) > 3:
              label += f' (+{len(t)-3} more)'
          print(label)
          ")
            git commit -m "feat: extend login to new dirs — ${DIRS} [skip ci]"
            git push
            echo "Login files committed and pushed."
          fi

      # ── 5. Summary ────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          TARGETS:     ${{ steps.detect.outputs.targets }}
          HAS_TARGETS: ${{ steps.detect.outputs.has_targets }}
        run: |
          {
            echo "## 🔐 Login Extender Summary"
            echo ""
            echo "**Trigger:** \`${{ github.event_name }}\`"
            echo "**Ref:**     \`${{ github.ref }}\`"
            echo "**Time:**    $(date +'%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            if [ "$HAS_TARGETS" = "true" ]; then
              python3 -c "
          import json, os
          targets = json.loads(os.environ.get('TARGETS','[]'))
          for t in targets:
              print(f'- ✅ \`{t}/\` — login template extended')
          "
            else
              echo "- ℹ️ No new directories detected — nothing to do."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
