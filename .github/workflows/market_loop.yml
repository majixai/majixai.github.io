name: Tensor Calculus Market Forecaster

on:
  schedule:
    # Runs every 5 minutes. 
    # Note: 1-minute intervals (* * * * *) often get queued/throttled by GitHub on free tiers.
    - cron: '*/5 * * * *' 
  workflow_dispatch: # Allows manual trigger button

permissions:
  contents: write

jobs:
  matrix_computation:
    runs-on: ubuntu-latest
    
    # CRITICAL: This tells the action runner to enter your subfolder before running commands
    defaults:
      run:
        working-directory: jinx/Project
    
    steps:
      - name: Checkout Repository Framework
        uses: actions/checkout@v4
        with:
          # Standard token for safe checkout
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          
      - name: Initialize Python Core
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Inject Pip Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance numpy pandas tensorflow requests
          
      - name: Execute Advanced Tensor Orchestrator
        env:
          # Your PAT specifically used by the Python REST API client to push binary data
          GITHUB_PAT: ${{ secrets.MY_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        # The script is executed from within jinx/Project/ due to the defaults setting above
        run: python ai_core_orchestrator.py
