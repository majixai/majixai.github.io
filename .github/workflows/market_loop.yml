name: Tensor Calculus Market Forecaster

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering from Github UI

permissions:
  contents: write

jobs:
  matrix_computation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository Framework
        uses: actions/checkout@v4
        with:
          # Uses the exact PAT provided to bypass standard token limitations
          token: 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
          
      - name: Initialize Python Core
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Utilize advanced caching protocols
          
      - name: Inject Pip Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance numpy pandas tensorflow requests
          
      - name: Execute Advanced Tensor Orchestrator
        env:
          # Injecting secure variables
          GITHUB_PAT: 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
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python ai_core_orchestrator.py
        
      # Note: Git push is handled directly inside the Python script via REST API.
      # The script builds the GZIP files, does the bitwise mapping, and upserts directly.

