name: IXIC LSTM Forecast Engine

# ─────────────────────────────────────────────────────────────────────────────
# Runs the IXIC (NASDAQ Composite) LSTM price-forecasting pipeline.
#
# Schedule: Mon–Fri at 21:45 UTC (≈ 5:45 PM EDT — ~15 min after US market
#           close), so the model trains on a full day's data.
#
# The pipeline is split across several root-level sub-directories:
#
#   ixic_lstm_forecast/framework/  — Protocols, base classes, decorators,
#                                    iterators
#   ixic_lstm_forecast/models/     — LSTMCore (TF Keras LSTM + Dense)
#   ixic_lstm_forecast/storage/    — GitDatabaseStorage (gzip pickle)
#   ixic_lstm_forecast/workers/    — Async data pipeline + multiprocessing
#                                    distributed reporter
#   ixic_lstm_forecast/ixic_main.py — Main orchestrator (entry point)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '45 21 * * 1-5'   # Mon–Fri 21:45 UTC (after US market close)

  workflow_dispatch:
    inputs:
      symbol:
        description: 'Yahoo Finance ticker symbol (default: ^IXIC)'
        required: false
        default: '^IXIC'
      seq_length:
        description: 'LSTM look-back window in bars (default: 60)'
        required: false
        default: '60'
      epochs:
        description: 'LSTM training epochs (default: 3)'
        required: false
        default: '3'
      batch_size:
        description: 'Generator batch size (default: 256)'
        required: false
        default: '256'
      runtime_settings_json:
        description: 'Optional JSON overrides for IXIC runtime settings (can also come from repo vars/secrets)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  ixic-lstm-forecast:
    name: IXIC LSTM — ${{ github.event.inputs.symbol || '^IXIC' }}
    runs-on: ubuntu-latest

    env:
      TF_CPP_MIN_LOG_LEVEL: "3"
      TF_ENABLE_ONEDNN_OPTS: "0"
      PYTHONUNBUFFERED: "1"
      IXIC_SYMBOL:     ${{ github.event.inputs.symbol     || '^IXIC' }}
      IXIC_SEQ_LENGTH: ${{ github.event.inputs.seq_length || '60'    }}
      IXIC_EPOCHS:     ${{ github.event.inputs.epochs     || '3'     }}
      IXIC_BATCH_SIZE: ${{ github.event.inputs.batch_size || '256'   }}
      IXIC_LOG_LEVEL: "INFO"
      IXIC_TRAIN_VERBOSE: "2"
      IXIC_RUNTIME_SETTINGS_JSON: ${{ github.event.inputs.runtime_settings_json || vars.IXIC_RUNTIME_SETTINGS_JSON || secrets.IXIC_RUNTIME_SETTINGS_JSON }}

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log — repository context
        run: |
          echo "::group::Repository context"
          echo "ref        : ${{ github.ref }}"
          echo "sha        : ${{ github.sha }}"
          echo "event      : ${{ github.event_name }}"
          echo "actor      : ${{ github.actor }}"
          echo "run_id     : ${{ github.run_id }}"
          echo "run_number : ${{ github.run_number }}"
          echo "workspace  : ${{ github.workspace }}"
          echo "::endgroup::"

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ixic_lstm_forecast/requirements.txt

      - name: Log — Python environment
        run: |
          echo "::group::Python environment"
          python --version
          pip --version
          echo "sys.path preview:"
          python -c "import sys; [print(' ', p) for p in sys.path[:8]]"
          echo "::endgroup::"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          echo "::group::pip install"
          python -m pip install --upgrade pip
          pip install -r ixic_lstm_forecast/requirements.txt
          echo "::endgroup::"
          echo "::notice title=Deps::Dependencies installed successfully."

      - name: Log — installed packages
        run: |
          echo "::group::Installed packages (key)"
          pip show tensorflow numpy pandas scikit-learn yfinance 2>/dev/null \
            | grep -E "^(Name|Version):" \
            || echo "(some packages not found)"
          echo "::endgroup::"

      # ── 4. Validate sub-module imports ────────────────────────────────────
      - name: Validate framework sub-module imports
        run: |
          echo "::group::Import validation"
          python - <<'PYEOF'
          import sys, os
          sys.path.insert(0, os.getcwd())

          checks = [
              ("ixic_lstm_forecast.framework.interfaces", ["IModelForecaster", "IStorageEngine"]),
              ("ixic_lstm_forecast.framework.base",       ["QuantFrameworkBase", "Tickers", "_global_tensor_cache"]),
              ("ixic_lstm_forecast.framework.decorators", ["lifecycle_hook", "log_event"]),
              ("ixic_lstm_forecast.framework.iterators",  ["TimeSeriesIterator", "batch_generator"]),
              ("ixic_lstm_forecast.storage.git_storage",  ["GitDatabaseStorage"]),
              ("ixic_lstm_forecast.workers.pipeline",     ["async_data_pipeline"]),
              ("ixic_lstm_forecast.workers.reporter",     ["reporting_worker"]),
          ]

          all_ok = True
          for module_path, symbols in checks:
              try:
                  mod = __import__(module_path, fromlist=symbols)
                  for sym in symbols:
                      assert hasattr(mod, sym), f"missing symbol: {sym}"
                  print(f"  [OK]  {module_path}")
              except Exception as e:
                  print(f"  [FAIL] {module_path} — {e}")
                  all_ok = False

          if not all_ok:
              sys.exit(1)
          print("All framework sub-modules validated.")
          PYEOF
          echo "::endgroup::"

      # ── 5. Log pipeline configuration ─────────────────────────────────────
      - name: Log — pipeline configuration
        run: |
          echo "::group::Pipeline configuration"
          echo "IXIC_SYMBOL     : ${{ env.IXIC_SYMBOL }}"
          echo "IXIC_SEQ_LENGTH : ${{ env.IXIC_SEQ_LENGTH }}"
          echo "IXIC_EPOCHS     : ${{ env.IXIC_EPOCHS }}"
          echo "IXIC_BATCH_SIZE : ${{ env.IXIC_BATCH_SIZE }}"
          echo "IXIC_LOG_LEVEL  : ${{ env.IXIC_LOG_LEVEL }}"
          echo "IXIC_TRAIN_VERBOSE : ${{ env.IXIC_TRAIN_VERBOSE }}"
          if [ -n "${IXIC_RUNTIME_SETTINGS_JSON}" ]; then
            echo "IXIC_RUNTIME_SETTINGS_JSON: configured"
          else
            echo "IXIC_RUNTIME_SETTINGS_JSON: not configured"
          fi
          echo "Output dir      : ixic_lstm_forecast/output/"
          echo "::endgroup::"

      # ── 6. Run the LSTM forecast pipeline ─────────────────────────────────
      - name: Run IXIC LSTM Forecast pipeline
        id: run_forecast
        run: |
          echo "::group::IXIC LSTM Forecast — full run log"
          echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] Starting IXIC LSTM pipeline..."

          python ixic_lstm_forecast/ixic_main.py

          EXIT_CODE=$?
          echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] Pipeline exited with code: ${EXIT_CODE}"
          echo "::endgroup::"
          exit $EXIT_CODE

      # ── 7. Parse and log summary JSON ──────────────────────────────────────
      - name: Log — parse run summary
        if: always()
        run: |
          echo "::group::Run summary JSON"
          SUMMARY_FILE="ixic_lstm_forecast/output/ixic_summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            cat "$SUMMARY_FILE"
          else
            echo "(summary file not found — pipeline may have failed)"
          fi
          echo "::endgroup::"

      - name: Log — extract key metrics
        if: always()
        id: metrics
        run: |
          SUMMARY_FILE="ixic_lstm_forecast/output/ixic_summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            python - <<'PYEOF'
          import json, os

          with open("ixic_lstm_forecast/output/ixic_summary.json") as f:
              s = json.load(f)

          lines = [
              f"symbol={s.get('symbol','')}",
              f"recent_close={s.get('recent_close','')}",
              f"projected_close={s.get('projected_close','')}",
              f"delta={s.get('delta','')}",
              f"delta_pct={s.get('delta_pct','')}",
              f"elapsed_seconds={s.get('elapsed_seconds','')}",
          ]
          gh_out = os.environ.get("GITHUB_OUTPUT", "")
          if gh_out:
              with open(gh_out, "a") as fh:
                  for line in lines:
                      fh.write(line + "\n")
          for line in lines:
              print(f"  {line}")
          PYEOF
          else
            echo "  (no summary file)"
          fi

      # ── 8. Log the full run log file ───────────────────────────────────────
      - name: Log — ixic_forecast.log (tail)
        if: always()
        run: |
          LOG_FILE="ixic_lstm_forecast/output/ixic_forecast.log"
          if [ -f "$LOG_FILE" ]; then
            echo "::group::ixic_forecast.log (last 100 lines)"
            tail -n 100 "$LOG_FILE"
            echo "::endgroup::"
          else
            echo "::warning title=Log::Log file not found at ${LOG_FILE}"
          fi

      # ── 9. Upload artifacts ────────────────────────────────────────────────
      - name: Upload forecast artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ixic-forecast-${{ github.run_number }}
          path: |
            ixic_lstm_forecast/output/ixic_summary.json
            ixic_lstm_forecast/output/*.dat.gz
            ixic_lstm_forecast/output/*.json
            ixic_lstm_forecast/output/ixic_forecast.log
          retention-days: 30

      # ── 10. Commit results back to repository ──────────────────────────────
      - name: Commit forecast outputs
        if: success()
        run: |
          git config --global user.name  "ixic-lstm[bot]"
          git config --global user.email "ixic-lstm[bot]@users.noreply.github.com"

          git add \
            ixic_lstm_forecast/output/ixic_summary.json \
            ixic_lstm_forecast/output/*.dat.gz \
            ixic_lstm_forecast/output/*.json \
            ixic_lstm_forecast/output/ixic_forecast.log \
            || true

          if ! git diff --staged --quiet; then
            SYMBOL="${{ env.IXIC_SYMBOL }}"
            PROJECTED=$(python - <<'PYEOF'
          import json
          try:
              with open("ixic_lstm_forecast/output/ixic_summary.json") as f:
                  s = json.load(f)
              print(f"{s.get('projected_close','?'):.2f}")
          except Exception:
              print("?")
          PYEOF
            )
            git commit -m "ixic-lstm: ${SYMBOL} projected=${PROJECTED} — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "::notice title=Committed::Forecast outputs committed and pushed."
          else
            echo "No changes to commit."
          fi

      # ── 11. Write GitHub Step Summary ─────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          IXIC_SYMBOL:     ${{ env.IXIC_SYMBOL }}
          SYMBOL_OUT:      ${{ steps.metrics.outputs.symbol }}
          RECENT_CLOSE:    ${{ steps.metrics.outputs.recent_close }}
          PROJECTED_CLOSE: ${{ steps.metrics.outputs.projected_close }}
          DELTA:           ${{ steps.metrics.outputs.delta }}
          DELTA_PCT:       ${{ steps.metrics.outputs.delta_pct }}
          ELAPSED:         ${{ steps.metrics.outputs.elapsed_seconds }}
          RUN_STATUS:      ${{ steps.run_forecast.outcome }}
        run: |
          {
            echo "## 📈 IXIC LSTM Forecast — Run Summary"
            echo ""
            echo "| Field              | Value |"
            echo "|--------------------|-------|"
            echo "| **Trigger**        | \`${{ github.event_name }}\` |"
            echo "| **Ref**            | \`${{ github.ref }}\` |"
            echo "| **Run #**          | \`${{ github.run_number }}\` |"
            echo "| **Time (UTC)**     | $(date -u +'%Y-%m-%d %H:%M:%S') |"
            echo "| **Symbol**         | \`${IXIC_SYMBOL}\` |"
            echo "| **Pipeline status**| ${RUN_STATUS} |"
            echo ""

            if [ -f "ixic_lstm_forecast/output/ixic_summary.json" ]; then
              echo "### 🔢 Forecast Metrics"
              echo ""
              echo "| Metric             | Value |"
              echo "|--------------------|-------|"
              echo "| Recent close       | \`${RECENT_CLOSE}\` |"
              echo "| Projected next     | \`${PROJECTED_CLOSE}\` |"
              echo "| Delta              | \`${DELTA}\` |"
              echo "| Delta %            | \`${DELTA_PCT}%\` |"
              echo "| Elapsed (s)        | \`${ELAPSED}\` |"
              echo ""
              echo "### 📄 Full Summary JSON"
              echo ""
              echo '```json'
              cat ixic_lstm_forecast/output/ixic_summary.json
              echo '```'
            else
              echo "> ⚠️ Summary JSON not produced — check the pipeline logs."
            fi

            echo ""
            echo "### 📦 Sub-module Directory Layout"
            echo ""
            echo '```'
            echo "ixic_lstm_forecast/"
            echo "├── framework/    — Protocols, base classes, decorators, iterators"
            echo "├── models/       — LSTMCore (TF Keras LSTM + Dense)"
            echo "├── storage/      — GitDatabaseStorage (gzip pickle + JSON sidecar)"
            echo "├── workers/      — Async pipeline + multiprocessing reporter"
            echo "└── ixic_main.py  — Main orchestrator (asyncio entry point)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
