<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majix Wiki</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0f1115; color: #e6edf3; }
    header { padding: 1rem 1.25rem; border-bottom: 1px solid #2d333b; background: #161b22; }
    h1 { margin: 0; font-size: 1.35rem; }
    .wrap { display: grid; grid-template-columns: 320px 1fr; gap: 1rem; padding: 1rem; }
    .card { background: #161b22; border: 1px solid #2d333b; border-radius: 8px; padding: 0.9rem; }
    input, textarea, button { width: 100%; box-sizing: border-box; margin: 0.35rem 0; padding: 0.55rem; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; }
    textarea { min-height: 140px; resize: vertical; }
    button { cursor: pointer; background: #238636; border-color: #238636; font-weight: 600; }
    button.secondary { background: #21262d; border-color: #30363d; }
    .list { max-height: 72vh; overflow: auto; }
    .page { border: 1px solid #30363d; border-radius: 6px; padding: 0.55rem; margin-bottom: 0.55rem; }
    .page h3 { margin: 0 0 0.35rem 0; font-size: 0.96rem; }
    .meta { color: #8b949e; font-size: 0.8rem; }
    .actions { display: flex; gap: 0.35rem; margin-top: 0.4rem; }
    .actions button { width: auto; padding: 0.35rem 0.55rem; font-size: 0.8rem; margin: 0; }
    .danger { background: #da3633; border-color: #da3633; }
    .status { margin-top: 0.5rem; font-size: 0.82rem; color: #8b949e; }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>📚 Majix Wiki</h1>
  </header>

  <div class="wrap">
    <section class="card">
      <h2 style="margin-top:0;font-size:1rem;">Create / Edit Wiki Page</h2>
      <input id="page-id" type="hidden">
      <label>Title</label>
      <input id="title" placeholder="Wiki page title">
      <label>Tags (comma-separated)</label>
      <input id="tags" placeholder="docs, howto, reference">
      <label>Content</label>
      <textarea id="content" placeholder="Write wiki content..."></textarea>
      <button id="save-btn">Save Page</button>
      <button id="reset-btn" class="secondary" type="button">New Page</button>
      <div class="status" id="status">Ready.</div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;font-size:1rem;">Wiki Pages</h2>
      <input id="search" placeholder="Search wiki pages...">
      <div class="list" id="pages"></div>
    </section>
  </div>

  <script>
    window.ACTIONS_CONFIG = {
      namespace: 'wiki',
      logToConsole: false,
      persistHistory: false
    };
    window.WIKI_CONFIG = {
      namespace: 'wiki',
      storageKey: 'majixWikiPages',
      autoDispatch: false
    };
  </script>
  <script src="/actions/actions-core.js"></script>
  <script src="/wiki/wiki-core.js"></script>
  <script>
    (function () {
      var titleEl = document.getElementById('title');
      var tagsEl = document.getElementById('tags');
      var contentEl = document.getElementById('content');
      var pageIdEl = document.getElementById('page-id');
      var searchEl = document.getElementById('search');
      var pagesEl = document.getElementById('pages');
      var statusEl = document.getElementById('status');

      function setStatus(text) { statusEl.textContent = text; }

      function resetForm() {
        pageIdEl.value = '';
        titleEl.value = '';
        tagsEl.value = '';
        contentEl.value = '';
      }

      function currentPayload() {
        return {
          id: pageIdEl.value || undefined,
          title: titleEl.value.trim(),
          content: contentEl.value,
          tags: tagsEl.value.split(',').map(function (t) { return t.trim(); }).filter(Boolean)
        };
      }

      function render(list) {
        var pages = list || MajixWiki.list();
        if (!pages.length) {
          pagesEl.innerHTML = '<div class="meta">No wiki pages yet.</div>';
          return;
        }
        pagesEl.innerHTML = pages.map(function (p) {
          return (
            '<div class="page">' +
              '<h3>' + escapeHtml(p.title) + '</h3>' +
              '<div class="meta">slug: ' + escapeHtml(p.slug) + ' • updated: ' + escapeHtml(p.updatedAt || '') + '</div>' +
              '<div class="meta">' + escapeHtml((p.tags || []).join(', ')) + '</div>' +
              '<div class="actions">' +
                '<button data-edit="' + escapeHtml(p.id) + '" class="secondary">Edit</button>' +
                '<button data-del="' + escapeHtml(p.id) + '" class="danger">Delete</button>' +
              '</div>' +
            '</div>'
          );
        }).join('');
      }

      function escapeHtml(v) {
        return String(v)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function loadToForm(page) {
        if (!page) return;
        pageIdEl.value = page.id;
        titleEl.value = page.title || '';
        tagsEl.value = (page.tags || []).join(', ');
        contentEl.value = page.content || '';
      }

      document.addEventListener('DOMContentLoaded', function () {
        MajixActions.init();
        MajixWiki.init();

        MajixActions.on('page/create', function (payload) {
          MajixWiki.create(payload);
          render();
          setStatus('Page created.');
        });
        MajixActions.on('page/update', function (payload) {
          MajixWiki.update(payload.id, payload);
          render();
          setStatus('Page updated.');
        });
        MajixActions.on('page/delete', function (payload) {
          MajixWiki.remove(payload.id);
          render();
          setStatus('Page deleted.');
        });
        MajixActions.on('page/search', function (payload) {
          render(MajixWiki.search(payload.query));
          setStatus('Search complete.');
        });

        document.getElementById('save-btn').addEventListener('click', function () {
          try {
            var payload = currentPayload();
            if (!payload.title) {
              setStatus('Title is required.');
              return;
            }
            if (payload.id) MajixActions.dispatch('page/update', payload);
            else MajixActions.dispatch('page/create', payload);
            resetForm();
          } catch (e) {
            setStatus('Error: ' + e.message);
          }
        });

        document.getElementById('reset-btn').addEventListener('click', function () {
          resetForm();
          setStatus('Ready.');
        });

        searchEl.addEventListener('input', function () {
          MajixActions.dispatch('page/search', { query: searchEl.value });
        });

        pagesEl.addEventListener('click', function (e) {
          var editId = e.target.getAttribute('data-edit');
          var delId = e.target.getAttribute('data-del');
          if (editId) {
            loadToForm(MajixWiki.get(editId));
            setStatus('Editing page.');
          }
          if (delId) {
            MajixActions.dispatch('page/delete', { id: delId });
          }
        });

        render();
      });
    }());
  </script>
</body>
</html>
