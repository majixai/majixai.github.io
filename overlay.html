<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las Vegas Roulette</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: transparent !important; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .roulette-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 1000; }
        .roulette-container.active { display: block; }
        .wheel-wrapper { position: relative; width: 400px; height: 400px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 40px rgba(255,215,0,0.3); border: 8px solid #333; }
        .segment { position: absolute; width: 50%; height: 50%; top: 0; right: 0; transform-origin: 0% 100%; overflow: hidden; }
        .segment-content { position: absolute; width: 200%; height: 200%; bottom: 0; left: 0; display: flex; justify-content: center; padding-top: 20px; }
        .segment-label { font-weight: bold; font-size: 12px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); transform: rotate(90deg); white-space: nowrap; text-align: center; }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #FFD700; z-index: 10; filter: drop-shadow(0 0 5px rgba(255,215,0,0.8)); }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 50%; border: 4px solid #333; z-index: 5; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .result-display { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #FFD700; padding: 30px 50px; border-radius: 15px; font-size: 28px; font-weight: bold; text-align: center; display: none; z-index: 2000; border: 3px solid #FFD700; box-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .result-display.show { display: block; animation: resultPop 0.5s ease; }
        @keyframes resultPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .result-username { color: #4ECDC4; font-size: 20px; margin-bottom: 10px; }
        .result-prize { color: #FF6B6B; font-size: 22px; margin-top: 10px; }
        .result-tokens { color: #00FF00; font-size: 26px; margin-top: 10px; }
        .spin-indicator { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #FFD700; padding: 10px 30px; border-radius: 25px; font-size: 18px; display: none; }
        .spin-indicator.show { display: block; }
        .confetti { position: fixed; width: 10px; height: 10px; background: #FFD700; animation: confettiFall 3s ease-out forwards; }
        @keyframes confettiFall { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="roulette-container" id="rouletteContainer">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="center-circle">🎰</div>
        </div>
    </div>

    <div class="result-display" id="resultDisplay">
        <div class="result-username" id="resultUsername"></div>
        <div id="resultLabel"></div>
        <div class="result-prize" id="resultPrize"></div>
        <div class="result-tokens" id="resultTokens"></div>
    </div>

    <div class="spin-indicator shadow-sm" id="spinIndicator">🎰 Spinning...</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ✅ Webhook Configured with your Exec URL
        const GAS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxeAXR2rQTbjePO7JCnnY5BjutONkirNLYnTw7b4ZupiEkIB0jqLklsKnNLEaV8rcjnwQ/exec"; 

        let segments = [];
        let currentRotation = 0;
        let isSpinning = false;

        function initWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            if(segments.length === 0) return;
            const segmentAngle = 360 / segments.length;
            
            segments.forEach((segment, index) => {
                const segmentEl = document.createElement('div');
                segmentEl.className = 'segment';
                segmentEl.style.transform = `rotate(${index * segmentAngle}deg) skewY(${90 - segmentAngle}deg)`;
                segmentEl.style.backgroundColor = segment.color;
                
                const content = document.createElement('div');
                content.className = 'segment-content';
                content.style.transform = `skewY(${-(90 - segmentAngle)}deg) rotate(${segmentAngle / 2}deg)`;
                
                const label = document.createElement('span');
                label.className = 'segment-label';
                label.textContent = segment.label;
                
                content.appendChild(label);
                segmentEl.appendChild(content);
                wheel.appendChild(segmentEl);
            });
        }

        function spinWheel(angle, duration, callback) {
            if (isSpinning) return;
            isSpinning = true;
            
            const wheel = document.getElementById('wheel');
            const container = document.getElementById('rouletteContainer');
            const indicator = document.getElementById('spinIndicator');
            
            container.classList.add('active');
            indicator.classList.add('show');
            
            wheel.style.transition = 'none';
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            wheel.offsetHeight; 
            
            wheel.style.transition = `transform ${duration}ms cubic-bezier(0.17, 0.67, 0.12, 0.99)`;
            currentRotation += angle;
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                isSpinning = false;
                indicator.classList.remove('show');
                if (callback) callback();
            }, duration);
        }

        function showResult(username, result) {
            const display = document.getElementById('resultDisplay');
            document.getElementById('resultUsername').textContent = username;
            document.getElementById('resultLabel').textContent = result.label;
            document.getElementById('resultPrize').textContent = result.prize || '';
            document.getElementById('resultTokens').textContent = result.tokens > 0 ? `+${result.tokens} TOKENS!` : '';
            
            display.classList.add('show');
            if (result.tokens > 0) createConfetti();
            
            setTimeout(() => {
                display.classList.remove('show');
                document.getElementById('rouletteContainer').classList.remove('active');
            }, 4000);
        }

        function createConfetti() {
            const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#FF69B4', '#00FF00'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        // --- DATABASE SYNC HANDLER ---
        async function commitToGitDatabase(payload) {
            if (!GAS_WEBHOOK_URL) return;
            payload.timestamp = Date.now();
            try {
                const response = await fetch(GAS_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === "success") console.log(`Committed to Git Database.`);
            } catch (error) {
                console.error("Database sync error:", error);
            }
        }

        function handleOverlayEvent(event) {
            if (event.eventName === 'setConfig' && event.payload && event.payload.segments) {
                segments = event.payload.segments;
                initWheel();
            } else if (event.eventName === 'spin') {
                const { username, results, animation, spinsEarned } = event.payload;
                if(segments.length === 0) {
                    segments = event.payload.configSegments || [];
                    initWheel();
                }
                spinWheel(animation.angle, animation.duration, () => {
                    showResult(username, results[0]);
                    if (spinsEarned > 1 && results.length > 1) {
                        results.slice(1).forEach((result, idx) => {
                            setTimeout(() => {
                                showResult(username + ` (Spin ${idx + 2})`, result);
                            }, (idx + 1) * 5000);
                        });
                    }
                });
            } else if (event.eventName === 'DatabaseSync') {
                commitToGitDatabase(event.payload);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.CB !== 'undefined' && window.CB.overlay) {
                window.CB.overlay.on('*', handleOverlayEvent);
            }
        });
    </script>
</body>
</html>
