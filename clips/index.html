<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weighted Snippet Ledger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .snippet-card { cursor: pointer; transition: 0.3s; border-left: 5px solid #0d6efd; }
        .snippet-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .relevance-bar { height: 5px; border-radius: 2px; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <input type="text" id="userInput" class="form-control form-control-lg mb-4" placeholder="Search or add snippet..." oninput="rankSnippets()">
                <button onclick="saveSnippet()" class="btn btn-primary mb-4 w-100">Save Snippet</button>
                
                <div id="ledger" class="list-group"></div>
            </div>
        </div>
    </div>

    <script>
        let db;
        const MATCH_WEIGHT = 0.7;
        const CLICK_WEIGHT = 0.3;

        // 1. IndexedDB Setup
        const request = indexedDB.open("SmartLedger", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("snippets", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = e => { db = e.target.result; rankSnippets(); };

        // 2. Save Snippet
        function saveSnippet() {
            const text = document.getElementById('userInput').value;
            if (!text) return;
            const tx = db.transaction("snippets", "readwrite");
            tx.objectStore("snippets").add({ text, clicks: 0, timestamp: Date.now() });
            tx.oncomplete = () => {
                document.getElementById('userInput').value = '';
                rankSnippets();
            };
        }

        // 3. Track Interaction (Clicks)
        function registerClick(id, text) {
            const tx = db.transaction("snippets", "readwrite");
            const store = tx.objectStore("snippets");
            store.get(id).onsuccess = e => {
                const data = e.target.result;
                data.clicks = (data.clicks || 0) + 1;
                store.put(data);
                navigator.clipboard.writeText(text);
                rankSnippets(); // Re-rank after interaction
            };
        }

        // 4. Hybrid Ranking Algorithm
        async function rankSnippets() {
            const input = document.getElementById('userInput').value.toLowerCase().split(/\s+/).filter(w => w.length > 0);
            const tx = db.transaction("snippets", "readonly");
            const store = tx.objectStore("snippets");
            
            store.getAll().onsuccess = e => {
                let snippets = e.target.result;
                if (snippets.length === 0) return;

                // Find max clicks for normalization
                const maxClicks = Math.max(...snippets.map(s => s.clicks || 0), 1);

                const scored = snippets.map(s => {
                    const snippetWords = s.text.toLowerCase().split(/\s+/);
                    
                    // Word Match Score (0 to 100)
                    let matches = 0;
                    if (input.length > 0) {
                        input.forEach(word => { if (snippetWords.includes(word)) matches++; });
                    }
                    const matchScore = input.length > 0 ? (matches / input.length) * 100 : 0;

                    // Click Score (0 to 100 relative to most clicked item)
                    const clickScore = ((s.clicks || 0) / maxClicks) * 100;

                    // Final Weighted Total
                    const totalScore = (matchScore * MATCH_WEIGHT) + (clickScore * CLICK_WEIGHT);
                    
                    return { ...s, totalScore };
                });

                // Sort by descending score
                renderLedger(scored.sort((a, b) => b.totalScore - a.totalScore));
            };
        }

        // 5. UI Rendering
        function renderLedger(items) {
            const container = document.getElementById('ledger');
            container.innerHTML = items.map(item => `
                <div class="card mb-2 snippet-card" onclick="registerClick(${item.id}, '${item.text.replace(/'/g, "\\'")}')">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <p class="mb-1"><strong>${item.text}</strong></p>
                            <small class="text-muted">${Math.round(item.totalScore)}% Match</small>
                        </div>
                        <div class="progress relevance-bar">
                            <div class="progress-bar bg-primary" style="width: ${item.totalScore}%"></div>
                        </div>
                        <small class="text-muted" style="font-size: 0.7rem;">Clicks: ${item.clicks}</small>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
