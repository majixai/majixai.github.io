<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Of Ledger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/universal-sentence-encoder"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        body { 
            margin: 0; padding: 0;
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1920&q=80');
            background-attachment: fixed; 
            background-position: center;
            background-size: cover;
            color: #333;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.2rem; }
        
        .snippet-card { 
            transition: transform 0.2s, box-shadow 0.2s; 
            border-left: 5px solid #0d6efd; 
            cursor: pointer; 
            position: relative;
            overflow: hidden;
        }
        .snippet-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important; 
        }
        
        pre { max-height: 200px; overflow-y: auto; font-size: 0.85rem; }

        .btn-delete { 
            position: absolute; 
            top: 10px; right: 10px; 
            z-index: 10; 
            display: none; 
            padding: 0.1rem 0.4rem; 
            font-size: 0.75rem; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .snippet-card:hover .btn-delete { display: block; }
    </style>
</head>
<body class="w3-animate-opacity pb-5">

    <div class="container py-4 glass-panel mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h1 class="h2 fw-bold text-dark d-flex align-items-center gap-2">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Copy Of Ledger
            </h1>
            <div>
                <button id="cloudSyncBtn" class="w3-button w3-blue w3-round-large w3-small me-2">Force Cloud Sync</button>
                <span id="sysStatus" class="w3-tag w3-yellow w3-round">Booting Modules...</span>
            </div>
        </div>

        <div id="app-root"></div>
        <div id="ledgerGrid" class="grid-layout mt-4"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <script type="module">
        /**
         * ==========================================
         * MODULE 1: CONFIG & UTILITIES
         * ==========================================
         */
        const FLAGS = Object.freeze({
            NONE: 0,
            LOCAL: 1 << 0,  // 1
            CLOUD: 1 << 1,  // 2
            CACHED: 1 << 2, // 4
            ACTIVE: 1 << 3  // 8
        });

        const DOMStateMap = new WeakMap();

        // ** FIREBASE CONFIGURATION **
        // Replace these values with your actual Firebase Project settings
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID"
        };

        let firestoreDb = null;
        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            try {
                firebase.initializeApp(firebaseConfig);
                firestoreDb = firebase.firestore();
                console.log("[SYS] Firebase Initialized");
            } catch (e) {
                console.warn("[SYS] Firebase init failed (check config). Running local-only mode.");
            }
        }

        class Utils {
            static escape(str) { 
                return typeof str !== 'string' ? str : str.replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t] || t)); 
            }
            static performanceLogger(targetFunction) {
                return async function(...args) {
                    const start = performance.now();
                    const result = await targetFunction.apply(this, args);
                    console.log(`[SYS] ${targetFunction.name} executed in ${(performance.now() - start).toFixed(2)}ms`);
                    return result;
                };
            }
        }

        /**
         * ==========================================
         * MODULE 2: DATA STRUCTURES
         * ==========================================
         */
        class StatsStruct {
            constructor() {
                this.buffer = new ArrayBuffer(8);
                this.view = new DataView(this.buffer);
            }
            get clicks() { return this.view.getUint32(0); }
            set clicks(val) { this.view.setUint32(0, val); }
            get statusFlags() { return this.view.getUint8(4); }
            set statusFlags(val) { this.view.setUint8(4, val); }
        }

        /**
         * ==========================================
         * MODULE 3: HYBRID STORAGE SERVICE 
         * Handles IndexedDB (Local) & Firestore (Cloud)
         * ==========================================
         */
        class StorageService {
            #dbName = "SmartLedgerDB";
            #version = 7; 
            #storeName = "snippets";
            #dbInstance = null;

            async connect() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.#dbName, this.#version);
                    req.onupgradeneeded = (e) => {
                        let db = e.target.result;
                        if (!db.objectStoreNames.contains(this.#storeName)) {
                            db.createObjectStore(this.#storeName, { keyPath: "id" }); // Removed autoIncrement to sync IDs with Cloud
                        }
                    };
                    req.onsuccess = (e) => { this.#dbInstance = e.target.result; resolve(); };
                    req.onerror = (e) => reject(e.target.error);
                });
            }

            // Generate unique ID suitable for both local and cloud
            #generateId() { return Date.now().toString() + Math.random().toString(36).substr(2, 5); }

            async save(data) {
                return new Promise(async (resolve) => {
                    // 1. Assign ID if new
                    if (!data.id) data.id = this.#generateId();
                    
                    // 2. Save locally first (Optimistic UI)
                    const tx = this.#dbInstance.transaction(this.#storeName, "readwrite");
                    tx.objectStore(this.#storeName).put(data);
                    
                    tx.oncomplete = async () => {
                        resolve(data); // Resolve immediately for UI rendering
                        
                        // 3. Async Push to Firebase
                        if (firestoreDb && firebaseConfig.projectId !== "YOUR_PROJECT_ID") {
                            try {
                                await firestoreDb.collection(this.#storeName).doc(data.id).set(data);
                                
                                // 4. If cloud succeeds, update local flag to CLOUD
                                data.status = (data.status & ~FLAGS.LOCAL) | FLAGS.CLOUD;
                                const updateTx = this.#dbInstance.transaction(this.#storeName, "readwrite");
                                updateTx.objectStore(this.#storeName).put(data);
                                console.log(`[CLOUD] Synced snippet ${data.id}`);
                            } catch (e) {
                                console.error("[CLOUD] Sync failed", e);
                            }
                        }
                    };
                });
            }

            async getAll() {
                return new Promise(resolve => {
                    const tx = this.#dbInstance.transaction(this.#storeName, "readonly");
                    tx.objectStore(this.#storeName).getAll().onsuccess = e => resolve(e.target.result);
                });
            }

            async delete(id) {
                return new Promise(async (resolve) => {
                    // 1. Delete Locally
                    const tx = this.#dbInstance.transaction(this.#storeName, "readwrite");
                    tx.objectStore(this.#storeName).delete(id);
                    
                    tx.oncomplete = async () => {
                        resolve(true);
                        
                        // 2. Delete from Cloud
                        if (firestoreDb && firebaseConfig.projectId !== "YOUR_PROJECT_ID") {
                            try {
                                await firestoreDb.collection(this.#storeName).doc(id).delete();
                                console.log(`[CLOUD] Deleted snippet ${id}`);
                            } catch (e) {
                                console.error("[CLOUD] Delete failed", e);
                            }
                        }
                    };
                });
            }

            // Pull down from Cloud and update Local DB
            async syncDown() {
                if (!firestoreDb || firebaseConfig.projectId === "YOUR_PROJECT_ID") return false;
                
                try {
                    const snapshot = await firestoreDb.collection(this.#storeName).get();
                    const tx = this.#dbInstance.transaction(this.#storeName, "readwrite");
                    const store = tx.objectStore(this.#storeName);
                    
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        data.status = (data.status & ~FLAGS.LOCAL) | FLAGS.CLOUD;
                        store.put(data);
                    });
                    
                    return new Promise(resolve => {
                        tx.oncomplete = () => resolve(true);
                    });
                } catch(e) {
                    console.error("[CLOUD] Sync Down failed", e);
                    return false;
                }
            }
        }

        StorageService.prototype.save = Utils.performanceLogger(StorageService.prototype.save);

        /**
         * ==========================================
         * MODULE 4: BACKGROUND WORKERS
         * ==========================================
         */
        class DistributedWorkerService {
            constructor() {
                this.worker = this.#initWorker();
                this.worker.onmessage = this.#handleMessage;
            }

            #initWorker() {
                const workerCode = `
                    self.onmessage = function(e) {
                        const words = e.data.text.split(/\\s+/).filter(w => w.length > 0).length;
                        postMessage({ id: e.data.id, words });
                    };
                `;
                return new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' })));
            }

            #handleMessage(e) {
                console.log(`[WORKER] Analyzed snippet ${e.data.id}: ${e.data.words} words.`);
            }

            analyzePayload(id, text) {
                this.worker.postMessage({ id, text });
            }
        }

        /**
         * ==========================================
         * MODULE 5: APPLICATION CONTROLLER
         * ==========================================
         */
        class LedgerApp {
            constructor() {
                this.storage = new StorageService();
                this.workers = new DistributedWorkerService();
            }

            async bootstrap() {
                await this.storage.connect();
                this.#buildUI();
                this.#bindGlobalEvents();
                
                // Optional: Attempt to sync on boot
                await this.storage.syncDown();
                
                const sysTag = document.getElementById('sysStatus');
                sysTag.innerText = "System Ready";
                sysTag.className = "w3-tag w3-green w3-round";
                
                this.renderGrid();
            }

            #buildUI() {
                document.getElementById('app-root').innerHTML = `
                    <div class="card shadow-sm border-0 w3-animate-bottom" id="inputCard">
                        <div class="card-body">
                            <textarea id="snipInput" class="form-control mb-3 text-monospace" rows="3" placeholder="Enter HTML, CSS/Bootstrap, JS/CDN snippet..."></textarea>
                            <div class="row g-2">
                                <div class="col-md-8">
                                    <input type="text" id="catInput" class="form-control" placeholder="Category (e.g., JS, HTML)">
                                </div>
                                <div class="col-md-4">
                                    <button id="saveBtn" class="btn btn-primary w-100 fw-bold">Save Snippet</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                DOMStateMap.set(document.getElementById('inputCard'), { isMounted: true });
            }

            #bindGlobalEvents() {
                document.getElementById('saveBtn').addEventListener('click', () => this.handleSave());
                document.getElementById('cloudSyncBtn').addEventListener('click', async () => {
                    document.getElementById('sysStatus').innerText = "Syncing...";
                    document.getElementById('sysStatus').className = "w3-tag w3-blue w3-round";
                    await this.storage.syncDown();
                    this.renderGrid();
                    document.getElementById('sysStatus').innerText = "System Ready";
                    document.getElementById('sysStatus').className = "w3-tag w3-green w3-round";
                });
            }

            async handleSave() {
                const text = document.getElementById('snipInput').value.trim();
                const cat = document.getElementById('catInput').value.trim().toUpperCase() || "GENERAL";
                if (!text) return;

                const stats = new StatsStruct();
                stats.statusFlags = FLAGS.LOCAL | FLAGS.ACTIVE;

                const savedData = await this.storage.save({ 
                    text, 
                    category: cat, 
                    timestamp: Date.now(),
                    status: stats.statusFlags 
                });

                this.workers.analyzePayload(savedData.id, text);
                
                document.getElementById('snipInput').value = '';
                this.renderGrid();
            }

            async handleDelete(e, id) {
                e.stopPropagation(); 
                if (confirm("Are you sure you want to permanently delete this snippet? (Will delete from Cloud as well)")) {
                    await this.storage.delete(id);
                    this.renderGrid();
                }
            }

            handleCopy(text, cardElement) {
                navigator.clipboard.writeText(text);
                cardElement.style.opacity = '0.5';
                setTimeout(() => cardElement.style.opacity = '1', 200);
            }

            async renderGrid() {
                const snippets = await this.storage.getAll();
                const grid = document.getElementById('ledgerGrid');
                grid.innerHTML = '';

                // Generator Protocol implementation
                const generator = function*(items) {
                    for (let item of items) yield item;
                }(snippets.sort((a,b) => b.timestamp - a.timestamp));

                for (let item of generator) {
                    const card = document.createElement('div');
                    const isLocal = (item.status & FLAGS.LOCAL) !== 0;
                    const isCloud = (item.status & FLAGS.CLOUD) !== 0;
                    
                    let badgeClass = "bg-secondary";
                    let stateText = "LOCAL";
                    if (isCloud) { badgeClass = "bg-primary"; stateText = "CLOUD"; }

                    card.className = "card snippet-card shadow-sm w3-animate-zoom bg-white";
                    card.innerHTML = `
                        <button class="btn btn-danger btn-delete w3-circle" title="Delete Snippet">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                        </button>
                        <div class="card-header bg-light d-flex justify-content-between align-items-center">
                            <span class="fw-bold text-dark" style="font-size: 0.9rem;">${Utils.escape(item.category)}</span>
                            <span class="badge ${badgeClass}" style="font-size: 0.65rem;">${stateText}</span>
                        </div>
                        <div class="card-body p-0">
                            <pre class="m-0 p-3 language-javascript"><code class="language-javascript">${Utils.escape(item.text)}</code></pre>
                        </div>
                    `;
                    
                    card.addEventListener('click', () => this.handleCopy(item.text, card));
                    card.querySelector('.btn-delete').addEventListener('click', (e) => this.handleDelete(e, item.id));

                    grid.appendChild(card);
                }
                
                if(window.Prism) Prism.highlightAllUnder(grid);
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            const app = new LedgerApp();
            app.bootstrap();
        });
    </script>
</body>
</html>
