<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Live - fintst</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1"></script>

    </head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0 text-warning">BTC-USD (1m)</h2>
            <div>
                <span id="last-update" class="badge bg-secondary me-2">Syncing...</span>
                <button id="refresh-btn" class="btn btn-sm btn-outline-warning">Refresh Data</button>
            </div>
        </div>

        <div class="card bg-dark border-secondary shadow-sm mb-4">
            <div class="card-body">
                <canvas id="chartCanvas" style="height: 450px; width: 100%;"></canvas>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover table-sm">
                <thead>
                    <tr class="text-secondary">
                        <th>Time</th>
                        <th>Open</th>
                        <th>High</th>
                        <th>Low</th>
                        <th>Close</th>
                    </tr>
                </thead>
                <tbody id="data-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let btcChart = null;

        async function loadDashboard() {
            try {
                const statusBadge = document.getElementById('last-update');
                statusBadge.innerText = "Fetching...";
                statusBadge.className = "badge bg-info text-dark me-2";

                // Cache-busting parameter ensures we bypass the browser cache on refresh
                const res = await fetch('btc_data.yml?t=' + new Date().getTime());
                if (!res.ok) throw new Error("Awaiting first workflow run...");
                
                const yamlText = await res.text();
                const data = jsyaml.load(yamlText) || [];

                if (data.length === 0) return;

                statusBadge.innerText = "Last update: " + data[data.length - 1].t;
                statusBadge.className = "badge bg-secondary me-2";

                const formatted = data.map(d => ({
                    x: luxon.DateTime.fromFormat(d.t, "yyyy-MM-dd HH:mm").valueOf(),
                    o: d.o, h: d.h, l: d.l, c: d.c
                }));

                // Update existing chart or create a new one
                if (btcChart) {
                    btcChart.data.datasets[0].data = formatted;
                    btcChart.update();
                } else {
                    btcChart = new Chart(document.getElementById('chartCanvas').getContext('2d'), {
                        type: 'candlestick',
                        data: {
                            datasets: [{
                                label: 'BTC/USD',
                                data: formatted,
                                color: { up: '#26a69a', down: '#ef5350', unchanged: '#999' }
                            }]
                        },
options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { 
        x: { type: 'time', time: { unit: 'minute' } },
        y: { grace: '5%' } // <--- Add this to prevent 0.0 - 1.0 scaling
    }
}

                    });
                }

                // Populate Table (Last 10 entries)
                const tableBody = document.getElementById('data-table-body');
                tableBody.innerHTML = ''; // Clear existing rows
                
                data.slice(-10).reverse().forEach(row => {
                    const colorClass = row.c >= row.o ? 'text-success' : 'text-danger';
                    tableBody.innerHTML += `
                        <tr>
                            <td>${row.t}</td>
                            <td>$${row.o.toFixed(2)}</td>
                            <td>$${row.h.toFixed(2)}</td>
                            <td>$${row.l.toFixed(2)}</td>
                            <td class="${colorClass}"><strong>$${row.c.toFixed(2)}</strong></td>
                        </tr>`;
                });

            } catch (err) {
                const statusBadge = document.getElementById('last-update');
                statusBadge.innerText = err.message;
                statusBadge.className = "badge bg-danger me-2";
            }
        }
        
        // Event listener for the refresh button
        document.getElementById('refresh-btn').addEventListener('click', loadDashboard);
        
        // Initial load
        loadDashboard();
    </script>
</body>
</html>
