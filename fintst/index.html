<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC AI Live Forecast</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1"></script>
    <script>
        window.LOGGER_CONFIG = {
            appName: 'fintst',
            level: 'info',
            targets: ['console', 'memory', 'localStorage'],
            localStorageLimit: 100
        };
        window.ACTIONS_CONFIG = {
            namespace: 'fintst',
            logToConsole: false,
            persistHistory: true,
            storageKey: 'fintstActions',
            historyLimit: 100
        };
    </script>
    <script src="/logging/logging-core.js"></script>
    <script src="/actions/actions-core.js"></script>
</head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0 text-warning">BTC-USD <span class="badge bg-primary fs-6">AI Forecast Mode</span></h2>
            <div>
                <span id="last-update" class="badge bg-secondary me-2">Syncing Tensors...</span>
                <button id="refresh-btn" class="btn btn-sm btn-outline-warning">Refresh Data</button>
            </div>
        </div>

        <div class="card bg-dark border-secondary shadow-sm mb-4">
            <div class="card-body">
                <canvas id="chartCanvas" style="height: 450px; width: 100%;"></canvas>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover table-sm">
                <thead>
                    <tr class="text-secondary">
                        <th>Time</th>
                        <th>Type</th>
                        <th>Open</th>
                        <th>High</th>
                        <th>Low</th>
                        <th>Close</th>
                    </tr>
                </thead>
                <tbody id="data-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let btcChart = null;

        MajixLogger.init();
        MajixActions.init();
        MajixLogger.info('fintst dashboard initialized');
        MajixActions.on('dashboard/load', function (payload) {
            MajixLogger.info('fintst dashboard load requested', payload, 'dashboard');
        });
        MajixActions.on('dashboard/error', function (payload) {
            MajixLogger.error('fintst dashboard error', payload, 'dashboard');
        });
        MajixActions.on('dashboard/loaded', function (payload) {
            MajixLogger.info('fintst dashboard loaded data', payload, 'dashboard');
        });

        async function loadDashboard() {
            try {
                MajixActions.dispatch('dashboard/load', { trigger: 'manual-or-initial' });
                const statusBadge = document.getElementById('last-update');
                statusBadge.innerText = "Running Matrix Inferences...";
                statusBadge.className = "badge bg-info text-dark me-2";

                // Pulling from the unified ledger
                const res = await fetch('Copy_Of_Ledger.yml?t=' + new Date().getTime());
                if (!res.ok) throw new Error("Awaiting AI model convergence...");
                
                const yamlText = await res.text();
                const data = jsyaml.load(yamlText) || [];

                if (data.length === 0) {
                    MajixActions.dispatch('dashboard/loaded', { rows: 0, actuals: 0, forecasts: 0 });
                    return;
                }

                // Identify the last actual data point for timestamping
                const actuals = data.filter(d => d.type !== 'forecast');
                if(actuals.length > 0) {
                    statusBadge.innerText = "Last actual: " + actuals[actuals.length - 1].t;
                    statusBadge.className = "badge bg-secondary me-2";
                }

                // Format data for Chart.js
                const formatted = data.map(d => ({
                    x: luxon.DateTime.fromFormat(d.t, "yyyy-MM-dd HH:mm").valueOf(),
                    o: d.o, h: d.h, l: d.l, c: d.c
                }));

                if (btcChart) {
                    btcChart.data.datasets[0].data = formatted;
                    btcChart.update();
                } else {
                    btcChart = new Chart(document.getElementById('chartCanvas').getContext('2d'), {
                        type: 'candlestick',
                        data: {
                            datasets: [{
                                label: 'BTC/USD (Includes AI Forecast)',
                                data: formatted,
                                color: { 
                                    up: '#26a69a', 
                                    down: '#ef5350', 
                                    unchanged: '#999' 
                                }
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: true, labels: { color: '#fff'} } },
                            scales: { 
                                x: { type: 'time', time: { unit: 'minute' }, ticks: {color: '#aaa'} },
                                y: { grace: '5%', ticks: {color: '#aaa'} }
                            }
                        }
                    });
                }

                // Populate Table (Last 10 entries)
                const tableBody = document.getElementById('data-table-body');
                tableBody.innerHTML = ''; 
                
                data.slice(-10).reverse().forEach(row => {
                    const colorClass = row.c >= row.o ? 'text-success' : 'text-danger';
                    const isForecast = row.type === 'forecast';
                    const rowStyle = isForecast ? 'border-left: 4px solid #0d6efd; background-color: rgba(13, 110, 253, 0.1);' : '';
                    const badge = isForecast ? '<span class="badge bg-primary">AI PREDICT</span>' : '<span class="badge bg-secondary">ACTUAL</span>';
                    
                    tableBody.innerHTML += `
                        <tr style="${rowStyle}">
                            <td>${row.t} ${isForecast ? '🔮' : ''}</td>
                            <td>${badge}</td>
                            <td>$${row.o.toFixed(2)}</td>
                            <td>$${row.h.toFixed(2)}</td>
                            <td>$${row.l.toFixed(2)}</td>
                            <td class="${colorClass}"><strong>$${row.c.toFixed(2)}</strong></td>
                        </tr>`;
                });

                MajixActions.dispatch('dashboard/loaded', {
                    rows: data.length,
                    actuals: actuals.length,
                    forecasts: data.length - actuals.length
                });

            } catch (err) {
                const statusBadge = document.getElementById('last-update');
                statusBadge.innerText = err.message;
                statusBadge.className = "badge bg-danger me-2";
                MajixActions.dispatch('dashboard/error', { error: err.message });
            }
        }

        document.getElementById('refresh-btn').addEventListener('click', function () {
            MajixActions.dispatch('dashboard/refresh-click', { source: 'button' });
            loadDashboard();
        });
        loadDashboard();
    </script>
</body>
</html>
