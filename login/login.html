<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <span class="icon" id="login-app-icon">🔐</span>
      <h1 id="login-app-name">Login</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="alert" id="login-alert" role="alert" aria-live="polite"></div>

    <form id="login-form" novalidate autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          required
          autofocus>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required>
      </div>

      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>

    <div class="login-footer">
      <span>MajixAI &mdash; Standalone Login</span>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
